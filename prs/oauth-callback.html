<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#131313">
<meta name="robots" content="noindex, nofollow">
<title>PRS — OAuth callback</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { background-color: #131313; color: #e5e2e1; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { margin: 0; padding: max(2rem, env(safe-area-inset-top)) max(1.5rem, env(safe-area-inset-right)) max(2rem, env(safe-area-inset-bottom)) max(1.5rem, env(safe-area-inset-left)); min-height: 100dvh; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 16px; font-weight: 800; letter-spacing: 0.06em; color: #f2ca50; text-transform: uppercase; margin: 0 0 8px; }
  p { font-size: 14px; line-height: 1.6; color: #d0c5af; margin: 0 0 14px; }
  .ok { color: #8ddba2; }
  .err { color: #ffb4ab; }
  .code-box {
    background: #0e0e0e;
    border: 1px solid #4d4635;
    border-radius: 10px;
    padding: 14px 16px;
    margin: 0 0 14px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px;
    color: #e5e2e1;
    word-break: break-all;
    overflow-wrap: anywhere;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    border-radius: 8px;
    background: #f2ca50; color: #3c2f00;
    font-size: 12px; font-weight: 700; letter-spacing: 0.02em;
    border: none; cursor: pointer;
  }
  .btn:hover { opacity: 0.92; }
  .step {
    background: #1c1b1b;
    border: 1px solid #4d4635;
    border-radius: 10px;
    padding: 14px 16px;
    margin: 0 0 12px;
  }
  .step-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px;
    border-radius: 999px;
    background: #f2ca50; color: #3c2f00;
    font-size: 12px; font-weight: 800;
    margin-right: 8px; vertical-align: middle;
  }
  .step h2 { display: inline; font-size: 13px; font-weight: 700; margin: 0; color: #f2ca50; letter-spacing: 0.02em; }
  .step pre {
    background: #0e0e0e;
    border: 1px solid #4d4635;
    border-radius: 8px;
    padding: 10px 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px; line-height: 1.45;
    color: #d0c5af;
    overflow-x: auto;
    margin: 10px 0 4px;
  }
  .step .hint { font-size: 12px; color: #c8c6c5; margin-top: 8px; }
  footer { margin-top: 24px; font-size: 11px; color: #99907c; }
  a { color: #f2ca50; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <h1>OAuth callback</h1>
  <div id="root"></div>
  <footer>
    PRS Command Center · This page only runs locally in your browser — no auth code is sent anywhere automatically. Follow the steps below.
  </footer>
</div>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var code = params.get("code");
  var error = params.get("error");
  var errorDesc = params.get("error_description");
  var root = document.getElementById("root");

  if (error) {
    root.innerHTML =
      '<p class="err">Google returned an error: <strong>' + error + '</strong>' +
      (errorDesc ? ' — ' + errorDesc : '') + '</p>' +
      '<p>Re-open the auth URL from <a href="docs/METRICS_AUTOPULL_SETUP.md">METRICS_AUTOPULL_SETUP.md</a> and try again. Make sure you signed in as the PRS YouTube channel owner.</p>';
    return;
  }

  if (!code) {
    root.innerHTML =
      '<p>This page is the redirect target for the PRS YouTube Analytics OAuth flow.</p>' +
      '<p>To start the flow, follow the steps in <a href="docs/METRICS_AUTOPULL_SETUP.md">METRICS_AUTOPULL_SETUP.md</a>. When Google redirects you back here, you will see an authorization code and the next steps.</p>';
    return;
  }

  // We have a code. Show it + the next two steps (exchange + insert).
  function esc(s) { return String(s).replace(/[&<>"]/g, function (c) { return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"})[c]; }); }

  var exchangeCmd =
    'curl -X POST "https://oauth2.googleapis.com/token" \\\n' +
    '  -d "code=' + esc(code) + '" \\\n' +
    '  -d "client_id=$YT_CLIENT_ID" \\\n' +
    '  -d "client_secret=$YT_CLIENT_SECRET" \\\n' +
    '  -d "redirect_uri=https://giddyuptiger.github.io/prs/oauth-callback.html" \\\n' +
    '  -d "grant_type=authorization_code"';

  var insertSql =
    "-- Paste in Supabase SQL editor. Replace the placeholder with the\n" +
    "-- refresh_token value from the curl response above.\n" +
    "insert into prs_oauth_tokens (provider, refresh_token, scope)\n" +
    "values ('google',\n" +
    "        'PASTE_REFRESH_TOKEN_HERE',\n" +
    "        'https://www.googleapis.com/auth/yt-analytics.readonly https://www.googleapis.com/auth/youtube.readonly');";

  root.innerHTML =
    '<p class="ok">Authorization received. Two more steps and you\'re done.</p>' +
    '<div class="step">' +
      '<span class="step-num">1</span>' +
      '<h2>Copy the auth code</h2>' +
      '<div class="code-box" id="auth-code"></div>' +
      '<button class="btn" id="copy-code">Copy code</button>' +
    '</div>' +
    '<div class="step">' +
      '<span class="step-num">2</span>' +
      '<h2>Exchange it for a refresh token</h2>' +
      '<p class="hint">In your terminal, set <code>YT_CLIENT_ID</code> and <code>YT_CLIENT_SECRET</code> to the OAuth client values from Google Cloud Console, then run:</p>' +
      '<pre id="exchange-cmd"></pre>' +
      '<button class="btn" id="copy-exchange">Copy command</button>' +
      '<p class="hint">The response JSON contains a <code>refresh_token</code>. Copy that string.</p>' +
    '</div>' +
    '<div class="step">' +
      '<span class="step-num">3</span>' +
      '<h2>Store the refresh token in Supabase</h2>' +
      '<p class="hint">Open the Supabase SQL editor and run:</p>' +
      '<pre id="insert-sql"></pre>' +
      '<button class="btn" id="copy-sql">Copy SQL</button>' +
      '<p class="hint">After that, set <code>YT_CLIENT_ID</code>, <code>YT_CLIENT_SECRET</code>, and <code>YT_CHANNEL_ID</code> as secrets on the <code>youtube-analytics-sync</code> edge function and invoke it once to confirm. See <a href="docs/METRICS_AUTOPULL_SETUP.md">METRICS_AUTOPULL_SETUP.md</a> for the full sequence.</p>' +
    '</div>';

  document.getElementById("auth-code").textContent = code;
  document.getElementById("exchange-cmd").textContent = exchangeCmd;
  document.getElementById("insert-sql").textContent = insertSql;

  function bindCopy(btnId, text) {
    var btn = document.getElementById(btnId);
    btn.addEventListener("click", function () {
      navigator.clipboard.writeText(text).then(function () {
        var orig = btn.textContent;
        btn.textContent = "Copied ✓";
        setTimeout(function () { btn.textContent = orig; }, 1500);
      });
    });
  }
  bindCopy("copy-code", code);
  bindCopy("copy-exchange", exchangeCmd);
  bindCopy("copy-sql", insertSql);
})();
</script>
</body>
</html>
