<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PRS Command">
<meta name="theme-color" content="#131313">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>PRS Command Center</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#f2ca50",
          "primary-container": "#d4af37",
          "on-primary": "#3c2f00",
          "on-primary-container": "#554300",
          "secondary": "#c8c6c5",
          "on-surface": "#e5e2e1",
          "on-surface-variant": "#d0c5af",
          "surface": "#131313",
          "background": "#131313",
          "surface-container": "#201f1f",
          "surface-container-low": "#1c1b1b",
          "surface-container-lowest": "#0e0e0e",
          "surface-container-high": "#2a2a2a",
          "outline": "#99907c",
          "outline-variant": "#4d4635",
          "error": "#ffb4ab",
          "error-container": "#93000a",
          "on-error-container": "#ffdad6"
        },
        fontFamily: { "sans": ["Inter", "system-ui", "sans-serif"] }
      }
    }
  };
</script>
<style>
  html, body { background-color: #131313; }
  body {
    font-family: 'Inter', sans-serif;
    color: #e5e2e1;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    display: inline-block; vertical-align: middle; user-select: none;
  }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  details[open] > summary .chev { transform: rotate(90deg); }
  .chev { transition: transform 0.18s ease; display: inline-block; }
  .cb {
    appearance: none; -webkit-appearance: none;
    width: 20px; height: 20px;
    border: 1.5px solid #99907c;
    border-radius: 5px;
    background: transparent;
    cursor: pointer; flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cb:checked { background: #f2ca50; border-color: #f2ca50; }
  .cb:checked::after {
    content: ""; width: 6px; height: 10px;
    border: solid #131313; border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px,-1px);
  }
  /* Owner chip next to role-group section title */
  .owner-chip {
    display: inline-flex; align-items: center;
    margin-left: 8px;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(212, 175, 55, 0.08);
    border: 1px solid rgba(212, 175, 55, 0.35);
    color: #d4af37;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.02em; text-transform: none;
    line-height: 1.4; white-space: nowrap;
  }
  /* Header back arrow (per-episode view only) */
  .back-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px;
    border-radius: 8px;
    color: #c8c6c5;
    transition: background 0.15s, color 0.15s;
    text-decoration: none;
    margin-right: 4px;
  }
  .back-btn:hover { background: #2a2a2a; color: #f2ca50; }
  /* Per-episode metrics tile grid */
  .metric-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
  @media (min-width: 640px) { .metric-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); } }
  .metric-tile {
    background: #0e0e0e;
    border: 1px solid rgba(77,70,53,0.6);
    border-radius: 10px;
    padding: 10px 11px;
    display: flex; flex-direction: column; gap: 2px;
    min-width: 0;
  }
  .metric-tile .lbl {
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.08em;
    color: #c8c6c5; text-transform: uppercase;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .metric-tile .val { font-size: 17px; font-weight: 700; color: #e5e2e1; line-height: 1.15; }
  .metric-tile .val.empty { color: #6f675a; font-weight: 500; }
  /* Past episode horizontal strip (used on per-episode view) */
  .past-strip { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
  .past-strip::-webkit-scrollbar { height: 6px; }
  .past-strip::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  .past-card {
    flex: 0 0 220px;
    background: #1c1b1b;
    border: 1px solid #4d4635;
    border-radius: 10px;
    padding: 11px 12px;
    text-decoration: none; color: inherit;
    transition: border-color 0.15s, background 0.15s;
  }
  .past-card:hover { border-color: #d4af37; background: #201f1f; }
  /* Home view: aggregate strip */
  .agg-strip { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
  @media (min-width: 640px) { .agg-strip { grid-template-columns: repeat(5, minmax(0, 1fr)); } }
  .agg-tile {
    background: #1c1b1b;
    border: 1px solid #4d4635;
    border-radius: 12px;
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 4px;
    min-width: 0;
  }
  .agg-tile .lbl {
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    color: #c8c6c5; text-transform: uppercase;
  }
  .agg-tile .val { font-size: 22px; font-weight: 800; color: #f2ca50; line-height: 1.1; }
  .agg-tile .val.empty { color: #6f675a; font-weight: 600; font-size: 18px; }
  /* Home view: episode grid */
  .ep-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 640px) { .ep-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  .ep-card {
    background: #201f1f;
    border: 1px solid #4d4635;
    border-radius: 14px;
    padding: 16px 18px;
    text-decoration: none; color: inherit;
    transition: border-color 0.15s, background 0.15s, transform 0.15s;
    display: flex; flex-direction: column; gap: 14px;
  }
  .ep-card:hover { border-color: #d4af37; background: #262524; transform: translateY(-1px); }
  .ep-card .head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .ep-card .name { font-size: 17px; font-weight: 700; color: #e5e2e1; line-height: 1.2; }
  .ep-card .date { font-size: 11.5px; color: rgba(200,198,197,0.7); margin-top: 3px; }
  .ep-card .metrics { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
  .ep-card .metrics > div { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .ep-card .metrics .ml { font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em; color: #c8c6c5; text-transform: uppercase; }
  .ep-card .metrics .mv { font-size: 14px; font-weight: 700; color: #e5e2e1; }
  .ep-card .metrics .mv.empty { color: #6f675a; font-weight: 500; }
  /* Status pill */
  .pill {
    display: inline-flex; align-items: center;
    padding: 3px 9px; border-radius: 999px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; white-space: nowrap;
  }
  .pill.in-progress { background: rgba(242, 202, 80, 0.12); color: #f2ca50; border: 1px solid rgba(242, 202, 80, 0.4); }
  .pill.shipped { background: rgba(200, 198, 197, 0.08); color: #c8c6c5; border: 1px solid rgba(200, 198, 197, 0.25); }
  /* Modal */
  .modal-bd {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: flex-start; justify-content: center;
    z-index: 100; padding: 24px 16px; overflow-y: auto;
    backdrop-filter: blur(4px);
  }
  .modal-card {
    background: #201f1f;
    border: 1px solid #4d4635;
    border-radius: 14px;
    width: 100%; max-width: 460px;
    padding: 18px 18px 16px;
    color: #e5e2e1;
  }
  .modal-card h3 {
    font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
    color: #f2ca50; text-transform: uppercase; margin-bottom: 14px;
  }
  .modal-card label { font-size: 11px; color: #c8c6c5; display: block; margin-bottom: 4px; font-weight: 600; }
  .modal-card input {
    width: 100%; background: #131313; border: 1px solid #4d4635; border-radius: 8px;
    padding: 8px 10px; color: #e5e2e1; font-size: 14px;
    transition: border-color 0.15s;
  }
  .modal-card input:focus { outline: none; border-color: #f2ca50; }
</style>
</head>
<body class="bg-surface text-on-surface flex flex-col min-h-screen">

<header class="bg-surface-container border-b border-outline-variant flex justify-between items-center w-full px-5 h-16 sticky top-0 z-50 shadow-lg">
  <div class="flex items-center min-w-0">
    <a id="back-btn" href="/prs/" class="back-btn hidden" aria-label="Back to all episodes">
      <span class="material-symbols-outlined text-[22px]">arrow_back</span>
    </a>
    <div class="flex flex-col min-w-0">
      <h1 class="text-[20px] leading-tight tracking-tight text-primary font-bold">PRS COMMAND</h1>
      <p class="text-[11.5px] text-secondary mt-0.5 truncate" id="ep-line">Loading…</p>
    </div>
  </div>
  <div id="progress" class="hidden sm:flex items-center gap-2"></div>
</header>

<main class="flex-1 px-5 py-6 max-w-screen-md mx-auto w-full">
  <div id="content" class="space-y-5"></div>
</main>

<div id="modal-root"></div>

<footer class="border-t border-outline-variant/30 flex flex-col items-center gap-1.5 py-6 text-secondary/70">
  <span class="text-[11px] font-semibold tracking-widest text-primary/70">PRS COMMAND CENTER</span>
  <p class="text-[11px]">Live checklist + metrics. Anyone with the link can toggle, add items, and edit metrics.</p>
</footer>

<script>
(function () {
  // ============================================================
  // CONFIG
  // ============================================================
  var SUPABASE_URL = "https://umtckshrjeyueyzgkuwm.supabase.co";
  var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtdGNrc2hyamV5dWV5emdrdXdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MTIyODksImV4cCI6MjA5NTM4ODI4OX0.AGAixV91hWFSmUTclna1e7lwaA3CAVk8bGbHi5Zrrj4";

  var ROLE_GROUPS = [
    "Editorial",
    "Metadata & Upload",
    "Ads & Marketing",
    "Social & Clips",
    "Launch Day",
    "Post-Launch"
  ];
  var ROLE_ICONS = {
    "Editorial": "edit_note",
    "Metadata & Upload": "cloud_upload",
    "Ads & Marketing": "campaign",
    "Social & Clips": "movie",
    "Launch Day": "rocket_launch",
    "Post-Launch": "visibility"
  };
  // Team owners per role group. Fixed across episodes — hardcoded
  // because it is the team's role structure, not per-episode data.
  var OWNERS = {
    "Editorial": "Jerry",
    "Metadata & Upload": "Jerry",
    "Ads & Marketing": "Jeremy",
    "Social & Clips": "Juniper",
    "Launch Day": "Everyone",
    "Post-Launch": "Jeremy"
  };

  // The 10 KPIs that get tracked per episode.
  var METRIC_DEFS = [
    { key: "views",                 label: "Views",            fmt: "n" },
    { key: "ctr_pct",               label: "CTR",              fmt: "pct" },
    { key: "avg_view_pct",          label: "Avg % viewed",     fmt: "pct" },
    { key: "avg_view_duration_sec", label: "Avg view time",    fmt: "dur" },
    { key: "watch_time_hours",      label: "Watch hrs",        fmt: "hrs" },
    { key: "subscribers_gained",    label: "Subs gained",      fmt: "n" },
    { key: "impressions",           label: "Impressions",      fmt: "n" },
    { key: "ad_spend",              label: "Ad spend",         fmt: "usd" },
    { key: "ad_ctr_pct",            label: "Ad CTR",           fmt: "pct" },
    { key: "ad_cpv",                label: "Ad CPV",           fmt: "usd2" }
  ];
  // Headline subset used in the per-episode home cards + past-episodes strip.
  var HEADLINE_KEYS = ["views", "ctr_pct", "avg_view_pct"];

  // ============================================================
  // State + helpers
  // ============================================================
  var sb = null;
  var ep = null;
  var items = [];
  var pastEps = [];

  function el(tag, cls, text) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }
  function html(parent, tag, cls, text) {
    var e = el(tag, cls, text); parent.appendChild(e); return e;
  }
  function icon(name, cls) {
    var s = document.createElement("span");
    s.className = "material-symbols-outlined " + (cls || "");
    s.textContent = name; return s;
  }

  function fmtN(n) {
    if (n == null || isNaN(n)) return null;
    if (n >= 1000000) return (n / 1000000).toFixed(n >= 10000000 ? 0 : 1) + "M";
    if (n >= 10000)   return Math.round(n / 1000) + "k";
    return Number(n).toLocaleString();
  }
  function fmtPct(n) { return (n == null || isNaN(n)) ? null : Number(n).toFixed(1) + "%"; }
  function fmtDur(s) {
    if (s == null || isNaN(s)) return null;
    var m = Math.floor(s / 60), r = Math.floor(s % 60);
    return m + ":" + (r < 10 ? "0" + r : r);
  }
  function fmtHrs(h) { return (h == null || isNaN(h)) ? null : Math.round(Number(h)) + "h"; }
  function fmtUsd(n) { return (n == null || isNaN(n)) ? null : "$" + Math.round(Number(n)).toLocaleString(); }
  function fmtUsd2(n) { return (n == null || isNaN(n)) ? null : "$" + Number(n).toFixed(2); }
  function fmtMetric(def, value) {
    switch (def.fmt) {
      case "n":    return fmtN(value);
      case "pct":  return fmtPct(value);
      case "dur":  return fmtDur(value);
      case "hrs":  return fmtHrs(value);
      case "usd":  return fmtUsd(value);
      case "usd2": return fmtUsd2(value);
      default:     return value == null ? null : String(value);
    }
  }

  function formatUpdated(raw) {
    if (!raw) return "unknown";
    var d = new Date(raw);
    if (isNaN(d.getTime())) return raw;
    return d.toLocaleString(undefined, {
      month: "short", day: "numeric", hour: "numeric", minute: "2-digit"
    });
  }
  function shortDate(s) {
    if (!s) return "";
    var d = new Date(s);
    if (isNaN(d.getTime())) return s;
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }

  function metricsHasAnyValue(m) {
    if (!m || typeof m !== "object") return false;
    return METRIC_DEFS.some(function (def) {
      var v = m[def.key];
      return v != null && v !== "" && !(typeof v === "number" && isNaN(v));
    });
  }

  function isInProgress(e) {
    var s = e && e.status ? String(e.status).toLowerCase() : "";
    return s === "in-progress" || s === "in_progress" || s === "active";
  }
  function statusLabel(e) {
    return isInProgress(e) ? "In progress" : "Shipped";
  }

  function showMessage(title, body) {
    var c = document.getElementById("content");
    c.innerHTML = "";
    var card = el("div", "bg-surface-container rounded-xl border border-outline-variant p-6 space-y-2");
    html(card, "h2", "text-[14px] font-bold text-primary uppercase tracking-widest", title);
    html(card, "p", "text-[13px] text-on-surface-variant leading-relaxed", body);
    c.appendChild(card);
  }

  // ============================================================
  // Header chrome
  // ============================================================
  function setHeaderForHome() {
    document.getElementById("back-btn").classList.add("hidden");
    var line = document.getElementById("ep-line");
    line.textContent = "Operational dashboard";
    document.getElementById("progress").innerHTML = "";
  }
  function setHeaderForEpisode() {
    document.getElementById("back-btn").classList.remove("hidden");
    var line = document.getElementById("ep-line");
    line.textContent = "";
    if (!ep) return;
    line.appendChild(document.createTextNode(ep.guest_name || ""));
    if (ep.sheet_url) {
      line.appendChild(document.createTextNode(" · "));
      var a = el("a", "text-primary/80 hover:text-primary underline-offset-2 hover:underline", "Production sheet");
      a.href = ep.sheet_url; a.target = "_blank"; a.rel = "noopener";
      line.appendChild(a);
    }
  }
  function setProgress() {
    var total = items.length, done = items.filter(function (it) { return it.done; }).length;
    var pct = total > 0 ? Math.round(done * 100 / total) : 0;
    var p = document.getElementById("progress");
    p.innerHTML = "";
    p.appendChild(el("span", "text-[12px] text-secondary", done + " / " + total));
    var bar = el("div", "w-32 h-1.5 bg-surface-container-high rounded-full overflow-hidden");
    var fill = el("div", "h-full bg-primary transition-all duration-300");
    fill.style.width = pct + "%";
    bar.appendChild(fill);
    p.appendChild(bar);
  }

  // ============================================================
  // Home view: aggregate strip + episode grid
  // ============================================================
  function renderHome(allEps) {
    var c = document.getElementById("content");
    c.innerHTML = "";

    // Aggregate strip
    var total = allEps.length;
    var inProg = allEps.filter(isInProgress).length;
    var totalViews = 0, ctrSum = 0, ctrN = 0, avgVwSum = 0, avgVwN = 0;
    allEps.forEach(function (e) {
      var m = e.metrics || {};
      if (typeof m.views === "number" && !isNaN(m.views)) totalViews += m.views;
      if (typeof m.ctr_pct === "number" && !isNaN(m.ctr_pct)) { ctrSum += m.ctr_pct; ctrN++; }
      if (typeof m.avg_view_pct === "number" && !isNaN(m.avg_view_pct)) { avgVwSum += m.avg_view_pct; avgVwN++; }
    });
    var aggDefs = [
      { lbl: "Episodes",    val: total > 0 ? String(total) : null },
      { lbl: "In progress", val: inProg > 0 ? String(inProg) : null },
      { lbl: "Total views", val: totalViews > 0 ? fmtN(totalViews) : null },
      { lbl: "Avg CTR",     val: ctrN > 0 ? fmtPct(ctrSum / ctrN) : null },
      { lbl: "Avg view %",  val: avgVwN > 0 ? fmtPct(avgVwSum / avgVwN) : null }
    ];
    var agg = el("section", "agg-strip");
    aggDefs.forEach(function (a) {
      var tile = el("div", "agg-tile");
      html(tile, "span", "lbl", a.lbl);
      var v = el("span", "val" + (a.val == null ? " empty" : ""));
      v.textContent = a.val == null ? "—" : a.val;
      tile.appendChild(v);
      agg.appendChild(tile);
    });
    c.appendChild(agg);

    // Episodes section
    var section = el("section", "space-y-3");
    var head = el("div", "flex items-center justify-between px-1");
    var headLeft = el("div", "flex items-center gap-2");
    headLeft.appendChild(icon("podcasts", "text-primary text-[20px]"));
    html(headLeft, "h2", "text-[12px] font-bold tracking-widest text-primary uppercase", "Episodes");
    head.appendChild(headLeft);
    html(head, "span", "text-[11px] text-secondary font-medium", total + " total");
    section.appendChild(head);

    if (!allEps.length) {
      var empty = el("div", "bg-surface-container rounded-xl border border-outline-variant p-6 text-center");
      html(empty, "p", "text-[13px] text-on-surface-variant", "No episodes yet.");
      section.appendChild(empty);
      c.appendChild(section);
      return;
    }

    // Sort: in-progress first, then by premiere_at desc (fallback created_at)
    var sorted = allEps.slice().sort(function (a, b) {
      var aIp = isInProgress(a), bIp = isInProgress(b);
      if (aIp !== bIp) return aIp ? -1 : 1;
      var ad = new Date(a.premiere_at || a.created_at || 0).getTime();
      var bd = new Date(b.premiere_at || b.created_at || 0).getTime();
      return bd - ad;
    });

    var grid = el("div", "ep-grid");
    sorted.forEach(function (e) {
      var card = document.createElement("a");
      card.className = "ep-card";
      card.href = "?episode=" + encodeURIComponent(e.slug);

      var headRow = el("div", "head");
      var nameWrap = el("div", "min-w-0");
      html(nameWrap, "div", "name truncate", e.guest_name || "Untitled");
      var d = e.premiere_at || e.created_at;
      if (d) html(nameWrap, "div", "date", shortDate(d));
      headRow.appendChild(nameWrap);

      var pill = el("span", "pill " + (isInProgress(e) ? "in-progress" : "shipped"));
      pill.textContent = statusLabel(e);
      headRow.appendChild(pill);
      card.appendChild(headRow);

      var m = e.metrics || {};
      var mGrid = el("div", "metrics");
      HEADLINE_KEYS.forEach(function (key) {
        var def = METRIC_DEFS.find(function (x) { return x.key === key; });
        var cell = el("div");
        html(cell, "span", "ml truncate", def.label);
        var v = fmtMetric(def, m[key]);
        var mv = el("span", "mv" + (v == null ? " empty" : ""));
        mv.textContent = v == null ? "—" : v;
        cell.appendChild(mv);
        mGrid.appendChild(cell);
      });
      card.appendChild(mGrid);

      grid.appendChild(card);
    });
    section.appendChild(grid);
    c.appendChild(section);
  }

  // ============================================================
  // Per-episode metrics card
  // ============================================================
  function renderMetricsCard(content) {
    var section = el("section", "bg-surface-container rounded-xl border border-outline-variant overflow-hidden");
    var head = el("div", "flex items-center justify-between px-4 py-3 border-b border-outline-variant/30");
    var left = el("div", "flex items-center gap-2.5");
    left.appendChild(icon("insights", "text-primary text-[20px]"));
    html(left, "h2", "text-[12px] font-bold tracking-widest text-primary uppercase", "This Episode");
    head.appendChild(left);
    var editBtn = el("button", "text-[11px] text-secondary hover:text-primary transition-colors flex items-center gap-1");
    editBtn.appendChild(icon("edit", "text-[14px]"));
    html(editBtn, "span", null, "Edit");
    editBtn.addEventListener("click", openEditMetrics);
    head.appendChild(editBtn);
    section.appendChild(head);

    var body = el("div", "px-4 py-3");
    var m = ep && ep.metrics ? ep.metrics : {};

    if (!metricsHasAnyValue(m)) {
      var empty = el("div", "flex items-center justify-between gap-3 py-1");
      var msg = el("div", "flex items-center gap-2 text-[13px] text-secondary");
      msg.appendChild(icon("auto_graph", "text-secondary/70 text-[18px]"));
      html(msg, "span", null, "No metrics yet for this episode.");
      empty.appendChild(msg);
      var add = el("button", "text-[12px] font-semibold text-primary hover:underline");
      add.textContent = "Add metrics";
      add.addEventListener("click", openEditMetrics);
      empty.appendChild(add);
      body.appendChild(empty);
    } else {
      var grid = el("div", "metric-grid");
      METRIC_DEFS.forEach(function (def) {
        var tile = el("div", "metric-tile");
        html(tile, "span", "lbl", def.label);
        var val = fmtMetric(def, m[def.key]);
        var valEl = el("span", "val" + (val == null ? " empty" : ""));
        valEl.textContent = val == null ? "—" : val;
        tile.appendChild(valEl);
        grid.appendChild(tile);
      });
      body.appendChild(grid);
      if (ep.metrics_updated_at) {
        html(body, "p", "text-[10.5px] text-secondary/60 mt-2",
          "Updated " + formatUpdated(ep.metrics_updated_at));
      }
    }
    section.appendChild(body);
    content.appendChild(section);
  }

  // ============================================================
  // Past episodes strip (per-episode view)
  // ============================================================
  function renderPastEpisodesStrip(content) {
    var prior = (pastEps || []).filter(function (e) { return ep && e.slug !== ep.slug; });
    if (!prior.length) return;
    var section = el("section", "space-y-2");
    var head = el("div", "flex items-center gap-2 px-1");
    head.appendChild(icon("history", "text-secondary text-[18px]"));
    html(head, "h2", "text-[11px] font-bold tracking-widest text-secondary uppercase", "Past Episodes");
    section.appendChild(head);

    var strip = el("div", "past-strip");
    prior.forEach(function (e) {
      var card = document.createElement("a");
      card.className = "past-card";
      card.href = "?episode=" + encodeURIComponent(e.slug);
      var top = el("div", "flex items-center justify-between mb-2");
      html(top, "div", "text-[13px] font-bold text-on-surface truncate flex-1 min-w-0", e.guest_name);
      var d = e.premiere_at || e.created_at;
      if (d) html(top, "span", "text-[10.5px] text-secondary/70 ml-2 whitespace-nowrap", shortDate(d));
      card.appendChild(top);

      var m = e.metrics || {};
      var hasAny = metricsHasAnyValue(m);
      if (hasAny) {
        var row = el("div", "flex justify-between gap-2");
        HEADLINE_KEYS.forEach(function (key) {
          var def = METRIC_DEFS.find(function (x) { return x.key === key; });
          var cell = el("div", "flex flex-col min-w-0");
          html(cell, "span", "text-[9.5px] font-bold tracking-wider text-secondary uppercase truncate", def.label);
          var v = fmtMetric(def, m[key]);
          html(cell, "span", "text-[13px] font-semibold text-on-surface", v == null ? "—" : v);
          row.appendChild(cell);
        });
        card.appendChild(row);
      } else {
        html(card, "p", "text-[11.5px] text-secondary/70", "No metrics yet");
      }
      strip.appendChild(card);
    });
    section.appendChild(strip);
    content.appendChild(section);
  }

  // ============================================================
  // Edit metrics modal
  // ============================================================
  function openEditMetrics() {
    var root = document.getElementById("modal-root");
    root.innerHTML = "";
    var bd = el("div", "modal-bd");
    bd.addEventListener("click", function (e) { if (e.target === bd) closeModal(); });
    var card = el("div", "modal-card");
    html(card, "h3", null, "Edit Episode Metrics");

    var form = document.createElement("form");
    form.className = "space-y-3";
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var payload = {};
      METRIC_DEFS.forEach(function (def) {
        var inp = form.querySelector('input[name="' + def.key + '"]');
        var raw = inp.value.trim();
        if (raw === "") return;
        var n = Number(raw);
        if (!isNaN(n)) payload[def.key] = n;
      });
      saveMetrics(payload);
    });

    var grid = el("div", "grid grid-cols-2 gap-3");
    var m = ep && ep.metrics ? ep.metrics : {};
    METRIC_DEFS.forEach(function (def) {
      var field = document.createElement("div");
      var lbl = el("label", null, def.label);
      lbl.setAttribute("for", "mf-" + def.key);
      field.appendChild(lbl);
      var inp = document.createElement("input");
      inp.id = "mf-" + def.key;
      inp.name = def.key;
      inp.type = "number";
      inp.step = (def.fmt === "pct" || def.fmt === "usd2") ? "0.01" : "any";
      inp.placeholder = "—";
      if (m[def.key] != null) inp.value = m[def.key];
      field.appendChild(inp);
      grid.appendChild(field);
    });
    form.appendChild(grid);

    var actions = el("div", "flex justify-end gap-2 mt-4");
    var cancel = el("button", "px-4 py-2 text-[12px] font-semibold text-secondary hover:text-on-surface transition-colors");
    cancel.type = "button"; cancel.textContent = "Cancel";
    cancel.addEventListener("click", closeModal);
    actions.appendChild(cancel);
    var save = el("button", "px-4 py-2 text-[12px] font-bold bg-primary text-on-primary rounded-lg hover:opacity-90 transition-opacity");
    save.type = "submit"; save.textContent = "Save";
    actions.appendChild(save);
    form.appendChild(actions);

    card.appendChild(form);
    bd.appendChild(card);
    root.appendChild(bd);
  }
  function closeModal() {
    var root = document.getElementById("modal-root");
    root.innerHTML = "";
  }
  function saveMetrics(payload) {
    sb.from("prs_episodes").update({
      metrics: payload,
      metrics_updated_at: new Date().toISOString()
    }).eq("id", ep.id).select().single().then(function (r) {
      if (r.error) { alert("Save failed: " + r.error.message); return; }
      ep = r.data;
      closeModal();
      render();
      loadPastEpisodes();
    });
  }

  // ============================================================
  // Checklist
  // ============================================================
  function renderItem(item) {
    var row = document.createElement("details");
    row.className = "border-t border-outline-variant/30";

    var summary = document.createElement("summary");
    summary.className = "flex items-center gap-3 px-4 py-3 hover:bg-surface-container-high transition-colors";

    var cbWrap = el("label", "flex-shrink-0 cursor-pointer flex items-center");
    cbWrap.addEventListener("click", function (e) { e.stopPropagation(); });
    var cb = document.createElement("input");
    cb.type = "checkbox";
    cb.className = "cb";
    cb.checked = !!item.done;
    cb.addEventListener("change", function () { toggleItem(item); });
    cbWrap.appendChild(cb);
    summary.appendChild(cbWrap);

    var titleEl = el("span",
      "flex-1 min-w-0 text-[14px] " + (item.done ? "text-secondary line-through" : "text-on-surface"),
      item.title);
    summary.appendChild(titleEl);

    summary.appendChild(icon("chevron_right", "chev text-outline text-[20px] flex-shrink-0"));
    row.appendChild(summary);

    if (item.instructions_md) {
      var detail = el("div", "px-4 pb-3 pl-12 text-[13px] text-on-surface-variant leading-relaxed whitespace-pre-wrap");
      detail.textContent = item.instructions_md;
      row.appendChild(detail);
    }
    var actions = el("div", "px-4 pb-3 pl-12 flex gap-3 items-center");
    var del = el("button", "text-[11px] text-secondary hover:text-error transition-colors", "Delete");
    del.addEventListener("click", function (e) { e.stopPropagation(); deleteItem(item); });
    actions.appendChild(del);
    if (item.done_at) {
      var done = el("span", "text-[11px] text-secondary/60");
      try { done.textContent = "checked " + new Date(item.done_at).toLocaleString(undefined, { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }); } catch (e) {}
      actions.appendChild(done);
    }
    row.appendChild(actions);

    return row;
  }
  function renderGroup(group, groupItems) {
    var section = el("section", "bg-surface-container rounded-xl border border-outline-variant overflow-hidden");
    var head = el("div", "flex items-center justify-between px-4 py-3 border-b border-outline-variant/30");
    var left = el("div", "flex items-center gap-2.5 min-w-0");
    left.appendChild(icon(ROLE_ICONS[group] || "task_alt", "text-primary text-[20px] flex-shrink-0"));
    html(left, "h2", "text-[12px] font-bold tracking-widest text-primary uppercase whitespace-nowrap", group);
    var owner = OWNERS[group];
    if (owner) html(left, "span", "owner-chip", owner);
    head.appendChild(left);
    var gdone = groupItems.filter(function (it) { return it.done; }).length;
    html(head, "span", "text-[11px] text-secondary font-medium flex-shrink-0", gdone + " / " + groupItems.length);
    section.appendChild(head);

    groupItems.forEach(function (it) { section.appendChild(renderItem(it)); });

    var addBtn = el("button", "w-full px-4 py-3 text-left text-[12px] text-secondary hover:bg-surface-container-high hover:text-primary transition-colors flex items-center gap-2 border-t border-outline-variant/30");
    addBtn.appendChild(icon("add", "text-[18px]"));
    html(addBtn, "span", null, "Add an item");
    addBtn.addEventListener("click", function () { addItem(group); });
    section.appendChild(addBtn);

    return section;
  }

  // ============================================================
  // Per-episode render
  // ============================================================
  function render() {
    setHeaderForEpisode();
    setProgress();

    var c = document.getElementById("content");
    c.innerHTML = "";

    if (ep) renderMetricsCard(c);
    renderPastEpisodesStrip(c);

    var byGroup = {};
    items.forEach(function (it) {
      var g = it.role_group || "Other";
      if (!byGroup[g]) byGroup[g] = [];
      byGroup[g].push(it);
    });
    var rendered = {};
    ROLE_GROUPS.forEach(function (g) {
      if (byGroup[g]) { c.appendChild(renderGroup(g, byGroup[g])); rendered[g] = true; }
    });
    Object.keys(byGroup).forEach(function (g) {
      if (!rendered[g]) c.appendChild(renderGroup(g, byGroup[g]));
    });

    if (!items.length) {
      var card = el("div", "bg-surface-container rounded-xl border border-outline-variant p-6 space-y-3");
      html(card, "h2", "text-[14px] font-bold text-primary uppercase tracking-widest", "No items yet");
      html(card, "p", "text-[13px] text-on-surface-variant", "This episode's checklist is empty.");
      c.appendChild(card);
    }
  }

  // ============================================================
  // Mutations
  // ============================================================
  function toggleItem(item) {
    var newDone = !item.done;
    item.done = newDone;
    item.done_at = newDone ? new Date().toISOString() : null;
    render();
    sb.from("prs_checklist_items").update({
      done: newDone,
      done_at: newDone ? new Date().toISOString() : null
    }).eq("id", item.id).then(function (r) {
      if (r.error) { console.error(r.error); alert("Toggle failed: " + r.error.message); load(); }
    });
  }
  function addItem(group) {
    var title = prompt("New item for " + group + ":");
    if (!title || !title.trim()) return;
    var groupItems = items.filter(function (it) { return it.role_group === group; });
    var maxSort = groupItems.reduce(function (m, it) { return Math.max(m, it.sort_order || 0); }, 0);
    sb.from("prs_checklist_items").insert({
      episode_id: ep.id, role_group: group, title: title.trim(),
      sort_order: maxSort + 10, done: false
    }).then(function (r) { if (r.error) alert("Add failed: " + r.error.message); });
  }
  function deleteItem(item) {
    if (!confirm("Delete this item?\n\n" + item.title)) return;
    sb.from("prs_checklist_items").delete().eq("id", item.id).then(function (r) {
      if (r.error) alert("Delete failed: " + r.error.message);
    });
  }

  // ============================================================
  // Load + realtime
  // ============================================================
  function loadItems() {
    return sb.from("prs_checklist_items")
      .select("*").eq("episode_id", ep.id).order("sort_order", { ascending: true })
      .then(function (r) {
        if (r.error) { console.error(r.error); showMessage("Error", r.error.message); return; }
        items = r.data || [];
      });
  }
  function loadPastEpisodes() {
    return sb.from("prs_episodes")
      .select("id,slug,guest_name,status,premiere_at,created_at,metrics,metrics_updated_at")
      .order("premiere_at", { ascending: false, nullsFirst: false })
      .limit(8)
      .then(function (r) {
        if (r.error) { console.error(r.error); pastEps = []; return; }
        pastEps = r.data || [];
      });
  }
  function loadAllEpisodes() {
    return sb.from("prs_episodes")
      .select("id,slug,guest_name,status,premiere_at,created_at,metrics,metrics_updated_at")
      .order("created_at", { ascending: false, nullsFirst: false })
      .then(function (r) {
        if (r.error) { console.error(r.error); return []; }
        return r.data || [];
      });
  }
  function subscribeRealtime() {
    sb.channel("prs-items-" + ep.id)
      .on("postgres_changes",
          { event: "*", schema: "public", table: "prs_checklist_items", filter: "episode_id=eq." + ep.id },
          function () { loadItems().then(render); })
      .subscribe();
    sb.channel("prs-ep-" + ep.id)
      .on("postgres_changes",
          { event: "UPDATE", schema: "public", table: "prs_episodes", filter: "id=eq." + ep.id },
          function (payload) { if (payload && payload.new) { ep = payload.new; render(); } })
      .subscribe();
  }

  // ============================================================
  // Init
  // ============================================================
  function init() {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    var params = new URLSearchParams(window.location.search);
    var slug = params.get("episode");

    if (!slug) {
      // HOME VIEW
      setHeaderForHome();
      var c = document.getElementById("content");
      c.innerHTML = "";
      var skel = el("div", "text-[13px] text-secondary/70 px-1", "Loading episodes…");
      c.appendChild(skel);
      loadAllEpisodes().then(function (all) { renderHome(all); });
      return;
    }

    // PER-EPISODE VIEW
    sb.from("prs_episodes").select("*").eq("slug", slug).single().then(function (r) {
      if (r.error || !r.data) {
        document.getElementById("back-btn").classList.remove("hidden");
        document.getElementById("ep-line").textContent = "Episode not found";
        showMessage("Episode not found",
          "We couldn't find that episode. Head back to the dashboard to pick one.");
        return;
      }
      ep = r.data;
      Promise.all([loadItems(), loadPastEpisodes()]).then(function () {
        render();
        subscribeRealtime();
      });
    });
  }

  init();
})();
</script>
</body>
</html>
