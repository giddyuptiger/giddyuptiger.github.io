<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Command Center">
<meta name="theme-color" content="#b07d3a">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Project Command Center</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f5f3ef;
    color: #1e1b16;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding: env(safe-area-inset-top) 0 0 0;
  }
  .wrap { max-width: 620px; margin: 0 auto; padding: 18px 14px 44px; }

  header { margin-bottom: 18px; }
  h1 { font-size: 21px; font-weight: 700; letter-spacing: -0.01em; }
  .updated { font-size: 13px; color: #8a8175; margin-top: 3px; }

  .card {
    background: #fffdfa;
    border: 1px solid #e7e2d9;
    border-radius: 14px;
    padding: 16px 16px 14px;
    margin-bottom: 14px;
    box-shadow: 0 1px 2px rgba(40,33,20,0.04);
  }
  .card h2 {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.07em; color: #b07d3a; margin-bottom: 4px;
  }

  /* your to-do */
  .need {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 11px 0 9px;
    border-top: 1px solid #f0ece3;
  }
  .need:first-of-type { border-top: none; }
  .need-num {
    flex: 0 0 auto; padding: 3px 7px; border-radius: 7px;
    background: #b07d3a; color: #fffdfa; font-size: 11px; font-weight: 700;
    letter-spacing: 0.02em; line-height: 1; margin-top: 1px; white-space: nowrap;
  }
  .need-body { flex: 1; min-width: 0; }
  .need-nm { font-weight: 700; font-size: 14.5px; }
  .need-step { font-size: 13.5px; color: #6f675a; margin-top: 2px; }

  /* board */
  .row {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 11px 0 10px;
    border-top: 1px solid #f0ece3;
  }
  .row:first-of-type { border-top: none; }
  .ic { font-size: 15px; flex: 0 0 auto; width: 22px; text-align: center; line-height: 1.5; }
  .body { flex: 1; min-width: 0; }
  .top { font-size: 14px; }
  .nm { font-weight: 700; }
  .st { color: #6f675a; }
  .step { font-size: 13px; color: #8a8175; margin-top: 3px; }

  .legend { font-size: 11.5px; color: #9a9183; margin-top: 12px; padding-top: 11px; border-top: 1px solid #f0ece3; line-height: 1.9; }
  .legend span { white-space: nowrap; margin-right: 10px; display: inline-block; }

  .msg { font-size: 14px; color: #6f675a; padding: 6px 0; }

  footer { font-size: 11.5px; color: #a89f8f; text-align: center; margin-top: 18px; line-height: 1.7; }
  footer code {
    background: #ece7dd; border-radius: 4px; padding: 1px 5px;
    font-size: 11px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Project Command Center</h1>
    <div class="updated" id="updated">Loading&hellip;</div>
  </header>

  <div id="content">
    <div class="card"><div class="msg">Loading the board&hellip;</div></div>
  </div>

  <footer>
    Live status &mdash; this page renders from <code>status.json</code>.<br>
    Private page &mdash; unlisted URL, not indexed.
  </footer>

</div>

<script>
(function () {
  var STATES = {
    "waiting-on-jeremy": { icon: "❗️", label: "Needs you" },
    "in-progress":       { icon: "⚙️", label: "In progress" },
    "parked":            { icon: "⏸️", label: "Parked" },
    "done":              { icon: "✅",       label: "Done" }
  };

  function el(tag, cls, text) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }

  function render(data) {
    document.getElementById("updated").textContent =
      "Last updated: " + (data.lastUpdated || "unknown");

    var content = document.getElementById("content");
    content.innerHTML = "";
    var projects = (data && data.projects) || [];

    var needs = projects.filter(function (p) { return p.state === "waiting-on-jeremy"; });
    if (needs.length) {
      var c1 = el("div", "card");
      c1.appendChild(el("h2", null, "Your to-do — highest-leverage first"));
      needs.forEach(function (p, i) {
        var n = el("div", "need");
        n.appendChild(el("span", "need-num", "CC" + (i + 1)));
        var nb = el("div", "need-body");
        nb.appendChild(el("div", "need-nm", p.name));
        if (p.nextStep) nb.appendChild(el("div", "need-step", p.nextStep));
        n.appendChild(nb);
        c1.appendChild(n);
      });
      content.appendChild(c1);
    }

    var c2 = el("div", "card");
    c2.appendChild(el("h2", null, "The board"));
    projects.forEach(function (p) {
      var s = STATES[p.state] || { icon: "•", label: p.state || "" };
      var row = el("div", "row");
      row.appendChild(el("span", "ic", s.icon));
      var body = el("div", "body");
      var top = el("div", "top");
      top.appendChild(el("span", "nm", p.name));
      if (p.note) {
        top.appendChild(document.createTextNode(" "));
        top.appendChild(el("span", "st", p.note));
      }
      body.appendChild(top);
      if (p.nextStep) body.appendChild(el("div", "step", p.nextStep));
      row.appendChild(body);
      c2.appendChild(row);
    });
    var legend = el("div", "legend");
    ["waiting-on-jeremy", "in-progress", "parked", "done"].forEach(function (k) {
      legend.appendChild(el("span", null, STATES[k].icon + " " + STATES[k].label));
    });
    c2.appendChild(legend);
    content.appendChild(c2);
  }

  function fail(message) {
    document.getElementById("updated").textContent = "";
    var content = document.getElementById("content");
    content.innerHTML = "";
    var card = el("div", "card");
    card.appendChild(el("div", "msg", message));
    content.appendChild(card);
  }

  fetch("status.json?t=" + Date.now(), { cache: "no-store" })
    .then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    })
    .then(render)
    .catch(function (e) {
      fail("Could not load the status board (" + e.message +
           "). It will appear here once status.json is published.");
    });
})();
</script>
</body>
</html>
