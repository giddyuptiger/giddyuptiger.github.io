<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#b07d3a">
<title>Jeremy Irons</title>
<meta name="description" content="Jeremy Irons — indie builder. Mindful apps and thoughtful websites.">
<meta property="og:title" content="Jeremy Irons">
<meta property="og:description" content="Indie builder. Mindful apps and thoughtful websites.">
<meta property="og:type" content="website">
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #2a2620;
    background: #efe9dd;
    background:
      radial-gradient(1100px 520px at 50% -8%, #fbf7ef 0%, rgba(251,247,239,0) 70%),
      linear-gradient(176deg, #f4eee2 0%, #ece4d4 52%, #e3d9c6 100%);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    min-height: 100%;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 52px 22px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .avatar {
    width: 96px; height: 96px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 33px; font-weight: 700; letter-spacing: 0.02em;
    color: #fffdf8;
    background: linear-gradient(150deg, #c8924a 0%, #b07d3a 48%, #8f6228 100%);
    box-shadow: 0 10px 26px rgba(120,84,30,0.32), inset 0 1px 1px rgba(255,255,255,0.35);
    border: 3px solid rgba(255,255,255,0.7);
  }

  h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; margin-top: 16px; }
  .tagline {
    font-size: 13.5px; color: #8a8175; margin-top: 5px;
    text-align: center; max-width: 300px; line-height: 1.55;
  }

  .links { width: 100%; margin-top: 26px; display: flex; flex-direction: column; gap: 12px; }

  .link {
    display: flex; align-items: center; gap: 13px;
    background: #fffdf9;
    border: 1px solid #e6e0d4;
    border-radius: 15px;
    padding: 15px 15px;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 2px 5px rgba(60,48,24,0.05);
    transition: transform 0.13s ease, box-shadow 0.13s ease, border-color 0.13s ease;
    opacity: 0;
    transform: translateY(10px);
    animation: rise 0.5s ease forwards;
  }
  .link:active { transform: scale(0.985); }
  @media (hover: hover) {
    .link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(60,48,24,0.1);
      border-color: #d8ad6f;
    }
  }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  .ic {
    flex: 0 0 auto;
    width: 42px; height: 42px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    background: #f4ecdc;
  }
  .meta { flex: 1; min-width: 0; }
  .t { font-size: 15px; font-weight: 650; font-weight: 600; }
  .s { font-size: 12.5px; color: #948a7b; margin-top: 1px; }
  .chev { flex: 0 0 auto; color: #c4bba8; font-size: 17px; }

  footer {
    margin-top: 30px;
    font-size: 11.5px; color: #a89f8d; text-align: center; line-height: 1.7;
  }
  footer a { color: #b07d3a; text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">

  <div class="avatar" id="avatar">JI</div>
  <h1 id="name">Jeremy Irons</h1>
  <div class="tagline" id="tagline">Indie builder. Mindful apps and thoughtful websites.</div>

  <div class="links" id="links"></div>

  <footer>&copy; <span id="yr"></span> Jeremy Irons</footer>

</div>

<script>
/* =======================================================================
   EDIT YOUR LINKS HERE.
   Each entry: { icon, title, subtitle, url }
   icon is any emoji. Order top-to-bottom is the order shown.
   ======================================================================= */
var LINKS = [
  {
    icon: "🌱",
    title: "GRDN",
    subtitle: "Mindful productivity & focus app",
    url: "https://grdnapp.com"
  },
  {
    icon: "📲",
    title: "Get GRDN on the App Store",
    subtitle: "iOS download",
    url: "https://apps.apple.com/us/app/grdn-mindful-productivity/id6748244016"
  },
  {
    icon: "🌐",
    title: "jeremyirons.la",
    subtitle: "My site",
    url: "https://jeremyirons.la"
  }
];

/* Optional: set a profile photo URL here to replace the "JI" initials. */
var PHOTO_URL = "";

(function () {
  document.getElementById("yr").textContent = new Date().getFullYear();

  if (PHOTO_URL) {
    var a = document.getElementById("avatar");
    a.textContent = "";
    a.style.background = "#fffdf9 url('" + PHOTO_URL + "') center/cover no-repeat";
  }

  var box = document.getElementById("links");
  LINKS.forEach(function (l, i) {
    var a = document.createElement("a");
    a.className = "link";
    a.href = l.url;
    a.target = "_blank";
    a.rel = "noopener";
    a.style.animationDelay = (0.06 * i + 0.05) + "s";

    var ic = document.createElement("div");
    ic.className = "ic";
    ic.textContent = l.icon || "🔗";

    var meta = document.createElement("div");
    meta.className = "meta";
    var t = document.createElement("div");
    t.className = "t";
    t.textContent = l.title;
    meta.appendChild(t);
    if (l.subtitle) {
      var s = document.createElement("div");
      s.className = "s";
      s.textContent = l.subtitle;
      meta.appendChild(s);
    }

    var chev = document.createElement("div");
    chev.className = "chev";
    chev.textContent = "›";

    a.appendChild(ic);
    a.appendChild(meta);
    a.appendChild(chev);
    box.appendChild(a);
  });
})();
</script>
</body>
</html>
