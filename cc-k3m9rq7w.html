<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Command Center">
<meta name="theme-color" content="#131313">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Project Command Center</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#f2ca50",
          "primary-container": "#d4af37",
          "on-primary": "#3c2f00",
          "on-primary-container": "#554300",
          "secondary": "#c8c6c5",
          "on-surface": "#e5e2e1",
          "on-surface-variant": "#d0c5af",
          "surface": "#131313",
          "background": "#131313",
          "surface-container": "#201f1f",
          "surface-container-low": "#1c1b1b",
          "surface-container-lowest": "#0e0e0e",
          "surface-container-high": "#2a2a2a",
          "surface-variant": "#353534",
          "outline": "#99907c",
          "outline-variant": "#4d4635",
          "error-container": "#93000a",
          "on-error-container": "#ffdad6"
        },
        fontFamily: {
          "sans": ["Inter", "system-ui", "sans-serif"]
        }
      }
    }
  };
</script>
<style>
  html, body { background-color: #131313; }
  body {
    font-family: 'Inter', sans-serif;
    color: #e5e2e1;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    display: inline-block;
    vertical-align: middle;
    user-select: none;
  }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  details[open] > summary .chev { transform: rotate(90deg); }
  .chev { transition: transform 0.18s ease; display: inline-block; }
  .pulse-dot { animation: pulseFade 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  @keyframes pulseFade {
    0%, 100% { opacity: 1; }
    50% { opacity: .45; }
  }
</style>
</head>
<body class="bg-surface text-on-surface flex flex-col min-h-screen">

<header class="bg-surface-container border-b border-outline-variant flex justify-between items-center w-full px-5 h-16 sticky top-0 z-50 shadow-lg">
  <div class="flex flex-col">
    <h1 class="text-[22px] leading-tight tracking-tight text-primary font-bold">COMMAND</h1>
    <p class="text-[11.5px] text-secondary flex items-center gap-1.5 mt-0.5">
      <span class="w-1.5 h-1.5 rounded-full bg-primary pulse-dot"></span>
      <span id="updated-text">Loading…</span>
    </p>
  </div>
  <div class="hidden sm:flex gap-1.5" id="pulse-desktop"></div>
</header>

<main class="flex-1 px-5 py-6 max-w-screen-sm mx-auto w-full space-y-6">

  <div class="flex sm:hidden justify-between items-center bg-surface-container-low border border-outline-variant rounded-xl px-3 py-2.5" id="pulse-mobile"></div>

  <div id="content" class="space-y-6">
    <div class="bg-surface-container rounded-xl p-4 text-secondary">Loading…</div>
  </div>

</main>

<footer class="border-t border-outline-variant/30 flex flex-col items-center gap-1.5 py-6 text-secondary/70">
  <span class="text-[11px] font-semibold tracking-widest text-primary/70">COMMAND CENTER</span>
  <p class="text-[11px]">Live status from <code class="bg-surface-container px-1.5 py-0.5 rounded text-primary/80">status.json</code> · unlisted, not indexed</p>
</footer>

<script>
(function () {
  var STATES = {
    "waiting-on-jeremy": { label: "Needs you", pill: "amber" },
    "in-progress":       { label: "In progress", pill: "blue" },
    "parked":            { label: "Parked", pill: "gray" },
    "done":              { label: "Done", pill: "green" }
  };

  function el(tag, cls, text) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }
  function html(parent, tag, cls, text) {
    var e = el(tag, cls, text);
    parent.appendChild(e);
    return e;
  }
  function icon(name, cls) {
    var s = document.createElement("span");
    s.className = "material-symbols-outlined " + (cls || "");
    s.textContent = name;
    return s;
  }

  function formatUpdated(raw) {
    if (!raw) return "unknown";
    var d = new Date(raw);
    if (isNaN(d.getTime())) return raw;
    return d.toLocaleString(undefined, {
      month: "short", day: "numeric",
      hour: "numeric", minute: "2-digit"
    });
  }
  function shortDate(s) {
    if (!s) return "";
    var d = new Date(s);
    if (isNaN(d.getTime())) return s;
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }

  function dotClass(c) {
    return ({
      amber: "bg-amber-500",
      blue:  "bg-blue-500",
      green: "bg-green-500",
      gray:  "bg-gray-500"
    })[c] || "bg-gray-500";
  }
  function pillClasses(state) {
    if (state === "waiting-on-jeremy") return "bg-amber-500/10 text-amber-500 border-amber-500/20";
    if (state === "in-progress")       return "bg-blue-500/10 text-blue-400 border-blue-500/20";
    if (state === "done")              return "bg-green-500/10 text-green-400 border-green-500/20";
    return "bg-gray-500/10 text-gray-400 border-gray-500/20";
  }

  function pulseStrip(projects) {
    var counts = { needs: 0, moving: 0, done: 0 };
    projects.forEach(function (p) {
      if (p.state === "waiting-on-jeremy") counts.needs++;
      else if (p.state === "in-progress")  counts.moving++;
      else if (p.state === "done")         counts.done++;
    });
    var items = [
      { dot: "amber", n: counts.needs,  label: "need you" },
      { dot: "blue",  n: counts.moving, label: "moving" },
      { dot: "green", n: counts.done,   label: "done" }
    ];

    var desk = document.getElementById("pulse-desktop");
    desk.innerHTML = "";
    items.forEach(function (it) {
      var chip = el("div", "flex items-center gap-1.5 bg-surface-container-high px-2.5 py-1 rounded-full");
      html(chip, "span", "w-2 h-2 rounded-full " + dotClass(it.dot));
      html(chip, "span", "text-[12px] text-on-surface font-medium", String(it.n));
      desk.appendChild(chip);
    });

    var mob = document.getElementById("pulse-mobile");
    mob.innerHTML = "";
    html(mob, "span", "text-[10.5px] font-bold tracking-widest text-secondary", "STATUS");
    var inner = el("div", "flex gap-3");
    items.forEach(function (it) {
      var item = el("div", "flex items-center gap-1.5");
      html(item, "span", "w-2 h-2 rounded-full " + dotClass(it.dot));
      html(item, "span", "text-[12px] text-on-surface", it.n + " " + it.label);
      inner.appendChild(item);
    });
    mob.appendChild(inner);
  }

  function urgencyPill(urgency) {
    if (!urgency) return null;
    var p = el("span", "");
    if (/asap/i.test(urgency)) {
      p.className = "bg-error-container text-on-error-container font-bold text-[10px] px-2 py-0.5 rounded-full tracking-widest uppercase whitespace-nowrap";
    } else {
      p.className = "bg-primary/15 text-primary font-bold text-[10px] px-2 py-0.5 rounded-full tracking-wider whitespace-nowrap";
    }
    p.textContent = urgency;
    return p;
  }

  // ───── Snooze (per-device, localStorage) ─────
  var SNOOZE_KEY = "cc_snoozes_v2";
  function snoozeRead() {
    try { return JSON.parse(localStorage.getItem(SNOOZE_KEY) || "{}"); }
    catch (e) { return {}; }
  }
  function snoozeWrite(obj) {
    try { localStorage.setItem(SNOOZE_KEY, JSON.stringify(obj)); } catch (e) {}
  }
  function snoozeActive(name) {
    var s = snoozeRead();
    var until = s[name];
    if (!until) return null;
    if (Date.now() >= until) {
      delete s[name];
      snoozeWrite(s);
      return null;
    }
    return until;
  }
  function snoozeSet(name, ms) {
    var s = snoozeRead();
    s[name] = Date.now() + ms;
    snoozeWrite(s);
  }
  function snoozeUntil(name, ts) {
    var s = snoozeRead();
    s[name] = ts;
    snoozeWrite(s);
  }
  function snoozeClear(name) {
    var s = snoozeRead();
    delete s[name];
    snoozeWrite(s);
  }
  function snoozeOptions() {
    var now = new Date();
    var tomorrow8 = new Date(now);
    tomorrow8.setDate(tomorrow8.getDate() + 1);
    tomorrow8.setHours(8, 0, 0, 0);
    return [
      { label: "1 hour",     ms: 60*60*1000 },
      { label: "4 hours",    ms: 4*60*60*1000 },
      { label: "Tomorrow 8a", ts: tomorrow8.getTime() },
      { label: "3 days",     ms: 3*24*60*60*1000 },
      { label: "1 week",     ms: 7*24*60*60*1000 }
    ];
  }
  function formatWake(ts) {
    var d = new Date(ts);
    var diff = ts - Date.now();
    if (diff < 60*60*1000) return "in " + Math.max(1, Math.round(diff/60000)) + "m";
    if (diff < 24*60*60*1000) return "in " + Math.round(diff/3600000) + "h";
    return d.toLocaleString(undefined, { weekday: "short", month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
  }

  function attachSnoozeSwipe(rowEl, itemName, onSnoozed) {
    var startX = 0, currentX = 0, dragging = false, opened = false;
    var actions = null;

    function ensureActions() {
      if (actions) return actions;
      actions = el("div", "absolute inset-y-0 right-0 flex items-center pr-2 gap-1 opacity-0 transition-opacity pointer-events-none");
      snoozeOptions().forEach(function (opt) {
        var b = el("button", "bg-primary/15 text-primary text-[11px] font-bold px-2 py-1 rounded-full whitespace-nowrap hover:bg-primary/25");
        b.textContent = opt.label;
        b.addEventListener("click", function (e) {
          e.stopPropagation();
          if (opt.ts) snoozeUntil(itemName, opt.ts);
          else snoozeSet(itemName, opt.ms);
          if (onSnoozed) onSnoozed();
        });
        actions.appendChild(b);
      });
      rowEl.appendChild(actions);
      return actions;
    }

    rowEl.style.position = "relative";
    rowEl.style.touchAction = "pan-y";

    function open() {
      ensureActions();
      rowEl.style.transition = "transform 0.2s ease";
      rowEl.style.transform = "translateX(-72%)";
      actions.style.opacity = "1";
      actions.style.pointerEvents = "auto";
      opened = true;
    }
    function close() {
      rowEl.style.transition = "transform 0.2s ease";
      rowEl.style.transform = "translateX(0)";
      if (actions) {
        actions.style.opacity = "0";
        actions.style.pointerEvents = "none";
      }
      opened = false;
    }

    rowEl.addEventListener("touchstart", function (e) {
      startX = e.touches[0].clientX;
      currentX = startX;
      dragging = true;
      rowEl.style.transition = "";
    }, { passive: true });
    rowEl.addEventListener("touchmove", function (e) {
      if (!dragging) return;
      currentX = e.touches[0].clientX;
      var dx = currentX - startX;
      if (dx < 0) {
        ensureActions();
        actions.style.opacity = Math.min(1, Math.abs(dx)/80);
        actions.style.pointerEvents = Math.abs(dx) > 30 ? "auto" : "none";
        rowEl.style.transform = "translateX(" + Math.max(dx, -300) + "px)";
      } else if (opened && dx > 0) {
        rowEl.style.transform = "translateX(" + Math.min(dx - rowEl.offsetWidth*0.72, 0) + "px)";
      }
    }, { passive: true });
    rowEl.addEventListener("touchend", function () {
      if (!dragging) return;
      dragging = false;
      var dx = currentX - startX;
      if (!opened && dx < -50) open();
      else if (opened && dx > 50) close();
      else if (opened) open();
      else close();
    });

    // Tap outside to close (clicking the row itself when opened)
    rowEl.addEventListener("click", function () {
      if (opened) close();
    });
  }

  function renderDoNext(content, items, onSnoozeChange) {
    if (!items.length) return;
    var sec = el("section", "space-y-2");
    html(sec, "h2", "text-[11px] font-bold tracking-widest text-primary pl-1", "DO NEXT");
    var card = el("div", "space-y-2");

    items.forEach(function (it, i) {
      if (i === 0) {
        var hero = el("div", "bg-surface-container-lowest rounded-xl p-4 border border-primary/40 shadow-xl flex justify-between items-start gap-3 overflow-hidden");
        var body = el("div", "space-y-1 flex-1 min-w-0");
        html(body, "p", "text-[11px] font-bold tracking-widest text-primary uppercase truncate", it.name);
        html(body, "h3", "text-[18px] font-bold text-on-surface leading-snug", it.todo || "");
        hero.appendChild(body);
        var ut = urgencyPill(it.urgency);
        if (ut) hero.appendChild(ut);
        attachSnoozeSwipe(hero, it.name, onSnoozeChange);
        card.appendChild(hero);
      } else {
        var row = el("div", "bg-surface-container-lowest rounded-lg p-3 border border-outline-variant/30 flex items-center justify-between gap-3 overflow-hidden");
        var left = el("div", "flex items-center gap-3 flex-1 min-w-0");
        var iconBox = el("div", "w-9 h-9 rounded-md bg-surface-container-high flex items-center justify-center flex-shrink-0 text-[17px]");
        iconBox.textContent = it.icon || "•";
        left.appendChild(iconBox);
        var meta = el("div", "min-w-0 flex-1");
        html(meta, "p", "text-[11px] font-bold tracking-widest text-primary uppercase truncate", it.name);
        html(meta, "p", "text-[14px] font-semibold text-on-surface leading-snug", it.todo || "");
        left.appendChild(meta);
        row.appendChild(left);

        var ut = urgencyPill(it.urgency);
        if (ut) {
          var right = el("div", "flex items-center flex-shrink-0");
          right.appendChild(ut);
          row.appendChild(right);
        }
        attachSnoozeSwipe(row, it.name, onSnoozeChange);
        card.appendChild(row);
      }
    });
    sec.appendChild(card);

    // Hint (only show first time)
    if (!localStorage.getItem("cc_snooze_hint_seen")) {
      var hint = el("p", "text-[11px] text-on-surface-variant/60 italic pl-2 pt-1", "Swipe left on any item to snooze it.");
      sec.appendChild(hint);
      setTimeout(function () { localStorage.setItem("cc_snooze_hint_seen", "1"); }, 5000);
    }
    content.appendChild(sec);
  }

  function renderSnoozed(content, snoozedItems, onWake) {
    if (!snoozedItems.length) return;
    var sec = el("section", "space-y-2 opacity-90");
    html(sec, "h2", "text-[11px] font-bold tracking-widest text-secondary pl-1", "SNOOZED (" + snoozedItems.length + ")");
    var card = el("div", "bg-surface-container rounded-xl border border-outline-variant/40 divide-y divide-outline-variant/20 overflow-hidden");
    snoozedItems.forEach(function (it) {
      var row = el("div", "px-4 py-3 flex items-center justify-between gap-3");
      var left = el("div", "flex items-center gap-2 flex-1 min-w-0");
      html(left, "span", "text-[15px] flex-shrink-0", it.icon || "💤");
      var meta = el("div", "min-w-0 flex-1");
      html(meta, "p", "text-[11px] font-bold tracking-widest text-secondary uppercase truncate", it.name);
      html(meta, "p", "text-[13px] text-on-surface-variant truncate", it.todo || "");
      left.appendChild(meta);
      row.appendChild(left);

      var right = el("div", "flex items-center gap-2 flex-shrink-0");
      html(right, "span", "text-[11px] text-on-surface-variant", formatWake(it.snoozedUntil));
      var wake = el("button", "text-[11px] text-primary font-bold hover:underline px-1", "Wake");
      wake.addEventListener("click", function (e) {
        e.stopPropagation();
        snoozeClear(it.name);
        if (onWake) onWake();
      });
      right.appendChild(wake);
      row.appendChild(right);
      card.appendChild(row);
    });
    sec.appendChild(card);
    content.appendChild(sec);
  }

  function renderBoardRow(p) {
    var st = STATES[p.state] || { label: p.state || "", pill: "gray" };
    var row = document.createElement("details");
    var summary = document.createElement("summary");
    summary.className = "px-4 py-4 flex items-center justify-between gap-3 hover:bg-surface-container-high transition-colors";

    var left = el("div", "space-y-1 flex-1 min-w-0");
    html(left, "h4", "text-[15px] font-bold text-on-surface truncate", p.name);
    if (p.shortStatus) html(left, "p", "text-[12px] text-secondary truncate", p.shortStatus);
    summary.appendChild(left);

    var right = el("div", "flex items-center gap-2 flex-shrink-0");
    var pill = el("span", "px-2.5 py-1 rounded-full font-bold text-[10px] uppercase tracking-wider whitespace-nowrap border " + pillClasses(p.state), st.label);
    right.appendChild(pill);
    right.appendChild(icon("chevron_right", "text-outline text-[20px] chev"));
    summary.appendChild(right);
    row.appendChild(summary);

    var detail = el("div", "px-4 pb-4 text-[13px] text-on-surface-variant space-y-2 leading-relaxed");
    if (p.note) html(detail, "p", null, p.note);
    if (p.nextStep) {
      var ns = el("p", null);
      var lbl = el("span", "text-primary font-bold", "Next: ");
      ns.appendChild(lbl);
      ns.appendChild(document.createTextNode(p.nextStep));
      detail.appendChild(ns);
    }
    row.appendChild(detail);
    return row;
  }

  function renderBoard(content, active) {
    if (!active.length) return;
    var sec = el("section", "space-y-2");
    html(sec, "h2", "text-[11px] font-bold tracking-widest text-secondary pl-1", "THE BOARD");
    var card = el("div", "bg-surface-container rounded-xl border border-outline-variant divide-y divide-outline-variant/30 overflow-hidden");
    active.forEach(function (p) { card.appendChild(renderBoardRow(p)); });
    sec.appendChild(card);
    content.appendChild(sec);
  }

  function renderShipped(content, ships) {
    if (!ships || !ships.length) return;
    var sec = el("section", "space-y-2 opacity-90");
    html(sec, "h2", "text-[11px] font-bold tracking-widest text-secondary pl-1", "RECENTLY SHIPPED");
    var card = el("div", "bg-surface-container-low rounded-xl border border-outline-variant divide-y divide-outline-variant/20");
    ships.forEach(function (s) {
      var row = el("div", "px-4 py-3 flex items-start gap-3");
      var check = icon("check_circle", "text-green-500 text-[17px] flex-shrink-0 mt-0.5");
      check.style.fontVariationSettings = "'FILL' 1";
      row.appendChild(check);
      var body = el("div", "flex-1 min-w-0 text-[13px] text-on-surface-variant leading-snug");
      var b = el("span", "text-on-surface font-bold");
      b.textContent = s.project;
      body.appendChild(b);
      body.appendChild(document.createTextNode(": " + s.what));
      if (s.date) {
        var d = el("span", "text-secondary/70 text-[11px] ml-2 whitespace-nowrap");
        d.textContent = shortDate(s.date);
        body.appendChild(d);
      }
      row.appendChild(body);
      card.appendChild(row);
    });
    sec.appendChild(card);
    content.appendChild(sec);
  }

  function renderCurious(content, items) {
    if (!items || !items.length) return;
    var sec = el("section", "space-y-2");
    html(sec, "h2", "text-[11px] font-bold tracking-widest text-primary pl-1", "CURIOUS?");
    var card = el("div", "bg-surface-container rounded-xl border border-outline-variant divide-y divide-outline-variant/30 overflow-hidden");
    items.forEach(function (it) {
      var a = document.createElement("a");
      a.href = it.url || "#";
      a.className = "flex items-center justify-between gap-3 px-4 py-4 hover:bg-surface-container-high transition-colors";
      a.style.textDecoration = "none";
      var left = el("div", "space-y-1 flex-1 min-w-0");
      html(left, "h4", "text-[15px] font-bold text-primary truncate", it.title || "");
      if (it.blurb) html(left, "p", "text-[12.5px] text-secondary leading-snug", it.blurb);
      a.appendChild(left);
      a.appendChild(icon("chevron_right", "text-outline text-[20px] flex-shrink-0"));
      card.appendChild(a);
    });
    sec.appendChild(card);
    content.appendChild(sec);
  }

  function renderDrawer(content, rest) {
    if (!rest.length) return;
    var drawer = document.createElement("details");
    drawer.className = "bg-surface-container rounded-xl border border-outline-variant overflow-hidden";
    var summary = document.createElement("summary");
    summary.className = "w-full flex items-center justify-between px-4 py-4 hover:bg-surface-container-high transition-colors text-secondary";
    html(summary, "span", "text-[12px] font-semibold tracking-wider", "Parked and done (" + rest.length + ")");
    summary.appendChild(icon("chevron_right", "chev text-[20px]"));
    drawer.appendChild(summary);
    var inner = el("div", "divide-y divide-outline-variant/30 border-t border-outline-variant/30");
    rest.forEach(function (p) { inner.appendChild(renderBoardRow(p)); });
    drawer.appendChild(inner);
    content.appendChild(drawer);
  }

  function compareP(a, b) {
    var ap = typeof a.priority === "number" ? a.priority : 999;
    var bp = typeof b.priority === "number" ? b.priority : 999;
    return ap - bp;
  }

  var lastData = null;
  function render(data) {
    lastData = data;
    document.getElementById("updated-text").textContent =
      "Updated " + formatUpdated(data.lastUpdated);

    var content = document.getElementById("content");
    content.innerHTML = "";
    var projects = (data && data.projects) || [];
    var personal = (data && data.personal) || [];
    var shipped  = (data && data.recentlyShipped) || [];

    pulseStrip(projects);

    var doItems = [];
    projects.forEach(function (p) {
      if (p.state === "waiting-on-jeremy") {
        doItems.push({ name: p.name, icon: "❗", todo: p.todo || p.nextStep, urgency: p.urgency, priority: p.priority });
      }
    });
    personal.forEach(function (p) {
      if (p.todo || p.nextStep) {
        doItems.push({ name: p.name, icon: p.icon || "•", todo: p.todo || p.nextStep, urgency: p.urgency, priority: p.priority });
      }
    });
    doItems.sort(compareP);
    var activeItems = [];
    var snoozedItems = [];
    doItems.forEach(function (it) {
      var until = snoozeActive(it.name);
      if (until) snoozedItems.push(Object.assign({}, it, { snoozedUntil: until }));
      else activeItems.push(it);
    });
    function onSnoozeChange() {
      // Re-render the page after a snooze action
      render(data);
    }
    renderDoNext(content, activeItems, onSnoozeChange);

    var active = projects.filter(function (p) {
      return p.state === "waiting-on-jeremy" || p.state === "in-progress";
    });
    active.sort(function (a, b) {
      var sa = a.state === "waiting-on-jeremy" ? 0 : 1;
      var sb = b.state === "waiting-on-jeremy" ? 0 : 1;
      if (sa !== sb) return sa - sb;
      return compareP(a, b);
    });
    renderBoard(content, active);

    renderSnoozed(content, snoozedItems, onSnoozeChange);

    renderShipped(content, shipped);

    var curious = (data && data.curious) || [];
    renderCurious(content, curious);

    var rest = projects.filter(function (p) {
      return p.state === "parked" || p.state === "done";
    });
    rest.sort(function (a, b) {
      var sa = a.state === "done" ? 0 : 1;
      var sb = b.state === "done" ? 0 : 1;
      return sa - sb;
    });
    renderDrawer(content, rest);
  }

  function fail(msg) {
    var content = document.getElementById("content");
    content.innerHTML = "";
    var card = el("div", "bg-surface-container rounded-xl p-4 text-secondary", msg);
    content.appendChild(card);
  }

  fetch("status.json?t=" + Date.now(), { cache: "no-store" })
    .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
    .then(render)
    .catch(function (e) {
      fail("Could not load the status board (" + e.message + ").");
    });
})();
</script>

</body>
</html>
