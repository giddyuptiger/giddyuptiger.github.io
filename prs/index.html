  function renderGroup(group, groupItems) {
    var counts = groupCounts(group, groupItems);
    var allDone = counts.total > 0 && counts.done === counts.total;

    // Section is a <details> so it can collapse. The auto-rule collapses
    // 100%-complete sections by default; the user can override per section.
    var section = document.createElement("details");
    section.className = "section bg-surface-container rounded-xl border border-outline-variant overflow-hidden" + (allDone ? " complete" : "");
    section.open = shouldSectionBeOpen(group, groupItems);

    var summary = document.createElement("summary");
    summary.className = "flex items-center justify-between px-4 py-3";

    var left = el("div", "flex items-center gap-2.5 min-w-0");
    left.appendChild(icon(ROLE_ICONS[group] || "task_alt", "text-primary text-[20px] flex-shrink-0"));
    html(left, "h2", "text-[12px] font-bold tracking-widest text-primary uppercase whitespace-nowrap", group);
    var owner = OWNERS[group];
    if (owner) html(left, "span", "owner-chip", owner);
    summary.appendChild(left);

    var right = el("div", "flex items-center gap-2 flex-shrink-0");
    if (allDone) {
      var badge = el("span", "section-done-badge");
      badge.appendChild(icon("check", ""));
      html(badge, "span", null, counts.done + " / " + counts.total);
      right.appendChild(badge);
    } else if (counts.total > 0) {
      html(right, "span", "text-[11px] text-secondary font-medium", counts.done + " / " + counts.total);
    } else {
      html(right, "span", "text-[11px] text-secondary/60 font-medium", "empty");
    }
    right.appendChild(icon("chevron_right", "chev text-outline text-[18px]"));
    summary.appendChild(right);

    // Track user expand/collapse intent. <details> auto-toggles its own
    // [open] state on click; we record the new value after the toggle.
    summary.addEventListener("click", function () {
      setTimeout(function () { sectionUserState[group] = section.open; }, 0);
    });

    section.appendChild(summary);

    groupItems.forEach(function (it) { section.appendChild(renderItem(it)); });

    // Sponsor rows live inside the Sponsorship section, below "Input Sponsors".
    if (group === "Sponsorship" && sponsors.length) {
      sponsors.forEach(function (s) { section.appendChild(renderSponsorRow(s)); });
    }

    var addBtn = el("button", "w-full px-4 py-3 text-left text-[12px] text-secondary hover:bg-surface-container-high hover:text-primary transition-colors flex items-center gap-2 border-t border-outline-variant/30");
    addBtn.appendChild(icon("add", "text-[18px]"));
    html(addBtn, "span", null, "Add an item");
    addBtn.addEventListener("click", function (e) { e.preventDefault(); addItem(group); });
    section.appendChild(addBtn);

    return section;
  }

  // ============================================================
  // Per-episode render
  // ============================================================
  function render() {
    setHeaderForEpisode();
    setProgress();

    var c = document.getElementById("content");
    c.innerHTML = "";
    // Per-episode view: drop the home-view top padding flag.
    var mainEl = document.querySelector("main");
    if (mainEl) mainEl.classList.remove("is-home");

    // Episode actions — edit core fields / delete the episode (anon client; RLS-gated).
    var actionBar = el("div", "flex items-center justify-end gap-2 mb-3");
    var editBtn = el("button", "inline-flex items-center gap-1.5 px-3 py-1.5 text-[12px] font-semibold rounded-lg bg-surface-container-high text-on-surface-variant hover:text-primary border border-outline-variant transition-colors");
    editBtn.type = "button"; editBtn.appendChild(icon("edit", "text-[15px]")); html(editBtn, "span", null, "Edit");
    editBtn.addEventListener("click", openEditEpisodeModal);
    actionBar.appendChild(editBtn);
    var delBtn = el("button", "inline-flex items-center gap-1.5 px-3 py-1.5 text-[12px] font-semibold rounded-lg bg-surface-container-high text-error hover:text-on-error-container border border-outline-variant hover:border-error/40 transition-colors");
    delBtn.type = "button"; delBtn.appendChild(icon("delete", "text-[15px]")); html(delBtn, "span", null, "Delete");
    delBtn.addEventListener("click", deleteEpisode);
    actionBar.appendChild(delBtn);
    c.appendChild(actionBar);

    renderEpProgress(c);
    if (ep) renderMetricsCard(c);
    renderPastEpisodesStrip(c);

    var byGroup = {};
    items.forEach(function (it) {
      var g = it.role_group || "Other";
      if (!byGroup[g]) byGroup[g] = [];
      byGroup[g].push(it);
    });
    // Ensure Sponsorship section renders even if no checklist item exists (so sponsor rows show).
    if (sponsors.length && !byGroup["Sponsorship"]) byGroup["Sponsorship"] = [];

    var rendered = {};
    ROLE_GROUPS.forEach(function (g) {
      if (byGroup[g]) { c.appendChild(renderGroup(g, byGroup[g])); rendered[g] = true; }
    });
    Object.keys(byGroup).forEach(function (g) {
      if (!rendered[g]) c.appendChild(renderGroup(g, byGroup[g]));
    });

    if (!items.length && !sponsors.length) {
      var card = el("div", "bg-surface-container rounded-xl border border-outline-variant p-6 space-y-3");
      html(card, "h2", "text-[14px] font-bold text-primary uppercase tracking-widest", "No items yet");
      html(card, "p", "text-[13px] text-on-surface-variant", "This episode's checklist is empty.");
      c.appendChild(card);
    }
  }

  // ============================================================
  // Mutations
  // ============================================================
  function toggleItem(item) {
    var newDone = !item.done;
    var nowIso = new Date().toISOString();
    item.done = newDone;
    item.done_at = newDone ? nowIso : null;
    // Clear explicit user expand-state on this section so the auto-rule
    // re-applies (e.g., auto-collapse when the section transitions to 100%).
    if (item.role_group) delete sectionUserState[item.role_group];
    // Single source of truth: the Transcript task drives the episode's transcript_received
    // flag. Update the local episode state BEFORE render() so the badge flips immediately,
    // then persist the flag alongside the item write below.
    var isTr = isTranscriptTask(item);
    if (isTr && ep) {
      ep.transcript_received = newDone;
      ep.transcript_received_at = newDone ? nowIso : null;
    }
    render();
    sb.from("prs_checklist_items").update({
      done: newDone,
      done_at: newDone ? nowIso : null
    }).eq("id", item.id).then(function (r) {
      if (r.error) { console.error(r.error); alert("Toggle failed: " + r.error.message); load(); }
    });
    if (isTr) {
      sb.from("prs_episodes").update({
        transcript_received: newDone,
        transcript_received_at: newDone ? nowIso : null
      }).eq("id", ep.id).then(function (r) {
        if (r.error) console.error(r.error);
      });
    }
  }
  function deleteSponsor(s) {
    if (!confirm("Delete this sponsor?\n\n" + s.name +
      "\n\nThis also removes its verification task from Jerry's checklist.")) return;
    sb.from("prs_sponsors").delete().eq("id", s.id).then(function (r) {
      if (r.error) { alert("Delete failed: " + r.error.message); return; }
      // Remove the matching per-sponsor verify task so the two stay in sync.
      sb.from("prs_checklist_items").delete()
        .eq("episode_id", ep.id)
        .eq("role_group", SPONSOR_VERIFY_GROUP)
        .eq("title", sponsorVerifyTitle(s.name))
        .then(function () {
          Promise.all([loadSponsors(), loadItems()]).then(render);
        });
    });
  }
  function addItem(group) {
    var title = prompt("New item for " + group + ":");
    if (!title || !title.trim()) return;
    var groupItems = items.filter(function (it) { return it.role_group === group; });
    var maxSort = groupItems.reduce(function (m, it) { return Math.max(m, it.sort_order || 0); }, 0);
    // A new item makes the section no longer 100% — re-apply the auto-rule.
    delete sectionUserState[group];
    sb.from("prs_checklist_items").insert({
      episode_id: ep.id, role_group: group, title: title.trim(),
      sort_order: maxSort + 10, done: false
    }).then(function (r) { if (r.error) alert("Add failed: " + r.error.message); });
  }
  function deleteItem(item) {
    if (!confirm("Delete this item?\n\n" + item.title)) return;
    sb.from("prs_checklist_items").delete().eq("id", item.id).then(function (r) {
      if (r.error) alert("Delete failed: " + r.error.message);
    });
  }

  // ── Episode-level edit / delete (anon client; RLS allows UPDATE + DELETE) ──
  // NOTE: prs_episodes has no separate `title` column — the title shown everywhere IS
  // `guest_name`, so the "Episode title" field below edits guest_name. The slug (URL key)
  // is intentionally kept stable on edit so existing ?episode= links never break.
  function epDateVal(v) { return v ? String(v).slice(0, 10) : ""; }
  function openEditEpisodeModal() {
    if (!ep) return;
    var root = document.getElementById("modal-root");
    root.innerHTML = "";
    var bd = el("div", "modal-bd");
    bd.addEventListener("click", function (e) { if (e.target === bd) closeModal(); });
    var card = el("div", "modal-card");
    html(card, "h3", null, "Edit episode");

    var form = document.createElement("form");
    form.className = "ne-form";
    function field(labelText, name, type, value) {
      var wrap = document.createElement("div");
      var lbl = el("label", null, labelText);
      lbl.setAttribute("for", "ee-" + name);
      wrap.appendChild(lbl);
      var inp = document.createElement("input");
      inp.id = "ee-" + name; inp.name = name; inp.type = type;
      if (value != null) inp.value = value;
      wrap.appendChild(inp);
      return wrap;
    }
    form.appendChild(field("Episode title (guest name)", "guest", "text", ep.guest_name || ""));
    var dates = el("div", "ne-dates");
    dates.appendChild(field("Shooting date", "shoot", "date", epDateVal(ep.shooting_date)));
    dates.appendChild(field("Airing date", "air", "date", epDateVal(ep.airing_date)));
    form.appendChild(dates);

    // STATUS dropdown — set any of the four lifecycle states directly. Writing status here
    // stamps status_manual_at so the daily auto-ship never overrides a state the user set
    // on purpose (manual override always wins).
    var stWrap = document.createElement("div");
    var stLbl = el("label", null, "Status"); stLbl.setAttribute("for", "ee-status"); stWrap.appendChild(stLbl);
    var stSel = document.createElement("select");
    stSel.id = "ee-status"; stSel.name = "status";
    STATUS_ORDER.forEach(function (key) {
      var opt = document.createElement("option");
      opt.value = key; opt.textContent = STATUS_LABELS[key];
      if (key === statusOf(ep)) opt.selected = true;
      stSel.appendChild(opt);
    });
    stWrap.appendChild(stSel);
    form.appendChild(stWrap);
    var showPremiere = (ep.status === "shipped") || !!ep.premiere_at;
    if (showPremiere) form.appendChild(field("Premiere / aired date", "premiere", "date", epDateVal(ep.premiere_at)));

    // Transcript status — READ-ONLY mirror of the "Upload Transcript to Drive" checklist task,
    // which is the single source of truth. There is no writable checkbox here anymore; to change
    // transcript status, check/uncheck that task in the episode checklist. We read the task's own
    // done-state when available (it stays in lock-step with transcript_received), falling back to
    // the episode flag.
    var trTask = transcriptTask();
    var trReceived = trTask ? !!trTask.done : !!ep.transcript_received;
    var trWrap = el("div", "ee-readonly");
    var trBadge = el("span", "pill " + (trReceived ? "tr-ok" : "tr-pending"));
    trBadge.textContent = trReceived ? "Transcript ✓" : "Transcript pending";
    var trHint = el("span", "ee-readonly-hint",
      "Managed by the “Upload Transcript to Drive” task");
    trWrap.appendChild(trBadge);
    trWrap.appendChild(trHint);
    form.appendChild(trWrap);

    var err = el("p", "text-[12px] text-error", ""); err.style.display = "none"; form.appendChild(err);

    var actions = el("div", "flex justify-end gap-2 mt-4");
    var cancel = el("button", "px-4 py-2 text-[12px] font-semibold text-secondary hover:text-on-surface transition-colors");
    cancel.type = "button"; cancel.textContent = "Cancel"; cancel.addEventListener("click", closeModal);
    actions.appendChild(cancel);
    var save = el("button", "px-4 py-2 text-[12px] font-bold bg-primary text-on-primary rounded-lg hover:opacity-90 transition-opacity");
    save.type = "submit"; save.textContent = "Save"; actions.appendChild(save);
    form.appendChild(actions);

    form.addEventListener("submit", function (e) {
      e.preventDefault(); err.style.display = "none";
      var guest = form.querySelector('input[name="guest"]').value.trim();
      if (!guest) { err.textContent = "Episode title (guest name) can't be empty."; err.style.display = "block"; return; }
      var patch = {
        guest_name: guest,
        shooting_date: form.querySelector('input[name="shoot"]').value || null,
        airing_date: form.querySelector('input[name="air"]').value || null
      };
      // Status: only write (and stamp the manual-override timestamp) when it actually changed,
      // so we don't reset status_manual_at on unrelated edits.
      var newStatus = form.querySelector('select[name="status"]').value;
      if (newStatus && newStatus !== statusOf(ep)) {
        patch.status = newStatus;
        patch.status_manual_at = new Date().toISOString();
      }
      if (showPremiere) {
        var pv = form.querySelector('input[name="premiere"]').value;
        patch.premiere_at = pv ? new Date(pv + "T12:00:00").toISOString() : null;
      }
      // NOTE: transcript_received is intentionally NOT written here. It is owned solely by the
      // "Upload Transcript to Drive" checklist task (see toggleItem); the modal shows a read-only mirror.
      save.disabled = true; save.textContent = "Saving…";
      sb.from("prs_episodes").update(patch).eq("id", ep.id).select().single().then(function (r) {
        if (r.error) { err.textContent = "Save failed: " + r.error.message; err.style.display = "block"; save.disabled = false; save.textContent = "Save"; return; }
        ep = r.data; closeModal(); render(); loadPastEpisodes();
      });
    });

    card.appendChild(form); bd.appendChild(card); root.appendChild(bd);
  }
  function deleteEpisodeChildren(epId) {
    // Remove FK children first so the parent row can be deleted (RLS allows these deletes).
    return sb.from("prs_checklist_items").delete().eq("episode_id", epId).then(function () {
      return sb.from("prs_sponsors").delete().eq("episode_id", epId);
    });
  }
  function deleteEpisode() {
    if (!ep) return;
    if (!confirm("Delete this episode permanently?\n\n" + (ep.guest_name || ep.slug) +
      "\n\nThis removes the episode and its checklist items. This cannot be undone.")) return;
    deleteEpisodeChildren(ep.id)
      .then(function () { return sb.from("prs_episodes").delete().eq("id", ep.id); })
      .then(function (r) {
        if (r && r.error) { alert("Delete failed: " + r.error.message); return; }
        window.location.href = "/prs/";
      })
      .catch(function (e) { alert("Delete failed: " + (e && e.message ? e.message : String(e))); });
  }
  // Junk placeholder rows seeded earlier (slugs not-set / not-set-2 / not-yet-set, name "Not set").
  function placeholderEps(eps) {
    var junkSlugs = { "not-set": 1, "not-set-2": 1, "not-yet-set": 1 };
    return (eps || []).filter(function (e) {
      if (junkSlugs[e.slug]) return true;
      var g = (e.guest_name || "").trim().toLowerCase();
      return g === "not set" || g === "not yet set";
    });
  }
  function cleanupPlaceholders(eps) {
    var junk = placeholderEps(eps);
    if (!junk.length) return;
    if (!confirm("Remove " + junk.length + " placeholder episode" + (junk.length > 1 ? "s" : "") +
      " (" + junk.map(function (e) { return e.slug; }).join(", ") + ")?\n\nThis deletes them and their checklist items.")) return;
    var chain = Promise.resolve();
    junk.forEach(function (e) {
      chain = chain.then(function () { return deleteEpisodeChildren(e.id); })
                   .then(function () { return sb.from("prs_episodes").delete().eq("id", e.id); });
    });
    chain.then(function () {
      return loadAllEpisodes().then(function (r) { if (r && !r.error) renderHome(r.data); });
    }).catch(function (err) { alert("Cleanup failed: " + (err && err.message ? err.message : String(err))); });
  }

  // ============================================================
  // Load + realtime
  // ============================================================
  function loadItems() {
    return sb.from("prs_checklist_items")
      .select("*").eq("episode_id", ep.id).order("sort_order", { ascending: true })
      .then(function (r) {
        if (r.error) { console.error(r.error); showMessage("Error", r.error.message); return; }
        items = r.data || [];
      });
  }
  function loadSponsors() {
    return sb.from("prs_sponsors")
      .select("*").eq("episode_id", ep.id).order("entered_at", { ascending: true })
      .then(function (r) {
        if (r.error) { console.error(r.error); sponsors = []; return; }
        sponsors = r.data || [];
      });
  }
  function loadPastEpisodes() {
    return sb.from("prs_episodes")
      .select("*")
      .order("premiere_at", { ascending: false, nullsFirst: false })
      .limit(8)
      .then(function (r) {
        if (r.error) { console.error(r.error); pastEps = []; return; }
        pastEps = r.data || [];
      });
  }
  function loadAllEpisodes() {
    return sb.from("prs_episodes")
      .select("*")
      .order("premiere_at", { ascending: false, nullsFirst: false })
      .order("created_at", { ascending: false, nullsFirst: false })
      .then(function (r) {
        if (r.error) {
          console.error("loadAllEpisodes error:", r.error);
          return { error: r.error, data: [] };
        }
        return { error: null, data: r.data || [] };
      });
  }
  function subscribeRealtime() {
    sb.channel("prs-items-" + ep.id)
      .on("postgres_changes",
          { event: "*", schema: "public", table: "prs_checklist_items", filter: "episode_id=eq." + ep.id },
          function () { loadItems().then(render); })
      .subscribe();
    sb.channel("prs-ep-" + ep.id)
      .on("postgres_changes",
          { event: "UPDATE", schema: "public", table: "prs_episodes", filter: "id=eq." + ep.id },
          function (payload) { if (payload && payload.new) { ep = payload.new; render(); } })
      .subscribe();
    sb.channel("prs-sp-" + ep.id)
      .on("postgres_changes",
          { event: "*", schema: "public", table: "prs_sponsors", filter: "episode_id=eq." + ep.id },
          function () { loadSponsors().then(render); })
      .subscribe();
  }

  // ============================================================
  // Init
  // ============================================================
  function init() {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    var params = new URLSearchParams(window.location.search);
    var slug = params.get("episode");

    if (!slug) {
      // HOME VIEW
      setHeaderForHome();
      var c = document.getElementById("content");
      c.innerHTML = "";
      html(c, "div", "text-[13px] text-secondary/70 px-1", "Loading episodes…");
      // Load episodes + strategy in parallel. Strategy is non-fatal:
      // if its tables don't exist yet (migration not run), we still render
      // the home view and the Strategy card will show a "run migration" hint.
      Promise.all([loadAllEpisodes(), loadStrategy()]).then(function (results) {
        var epsResult = results[0];
        if (epsResult.error) {
          showMessage("Could not load episodes", epsResult.error.message + " — if you just added new schema columns, run the migration in Supabase first.");
          return;
        }
        renderHome(epsResult.data);
        subscribeStrategyRealtime();
      });
      return;
    }

    // PER-EPISODE VIEW
    sb.from("prs_episodes").select("*").eq("slug", slug).single().then(function (r) {
      if (r.error || !r.data) {
        document.getElementById("back-btn").classList.remove("hidden");
        document.getElementById("ep-line").textContent = "Episode not found";
        showMessage("Episode not found",
          "We couldn't find that episode. Head back to the dashboard to pick one.");
        return;
      }
      ep = r.data;
      Promise.all([loadItems(), loadSponsors(), loadPastEpisodes()]).then(function () {
        // If there are sponsors but the Input Sponsors task is still pending, fix it.
        // Also backfill any missing per-sponsor verify tasks (idempotent self-heal for
        // episodes whose sponsors were entered before this flow existed).
        autoCompleteInputSponsors();
        render();
        subscribeRealtime();
        syncSponsorVerifyTasks().then(function () { loadItems().then(render); });
      });
    });
  }

  init();
})();
</script>
</body>
</html>
