<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PRS Command">
<meta name="theme-color" content="#131313">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>PRS Command Center</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#f2ca50",
          "primary-container": "#d4af37",
          "on-primary": "#3c2f00",
          "on-primary-container": "#554300",
          "secondary": "#c8c6c5",
          "on-surface": "#e5e2e1",
          "on-surface-variant": "#d0c5af",
          "surface": "#131313",
          "background": "#131313",
          "surface-container": "#201f1f",
          "surface-container-low": "#1c1b1b",
          "surface-container-lowest": "#0e0e0e",
          "surface-container-high": "#2a2a2a",
          "outline": "#99907c",
          "outline-variant": "#4d4635",
          "error": "#ffb4ab",
          "error-container": "#93000a",
          "on-error-container": "#ffdad6"
        },
        fontFamily: { "sans": ["Inter", "system-ui", "sans-serif"] }
      }
    }
  };
</script>
<style>
  html, body { touch-action: manipulation; }
  html, body { background-color: #131313; }
  body {
    font-family: 'Inter', sans-serif;
    color: #e5e2e1;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
  }
  /* iPhone notch / home-indicator safe-area handling.
     viewport-fit=cover is set in <meta>; these rules push the chrome
     past the status-bar inset and home-indicator inset. */
  .app-header {
    padding-top: env(safe-area-inset-top);
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    /* base 64px content area + room for the notch */
    height: calc(64px + env(safe-area-inset-top));
  }
  .app-main {
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
  }
  .app-footer {
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
  }
  /* Home view: extra top breathing room on the iPhone notch.
     viewport-fit=cover lets the page render under the status bar; this
     ensures the first content element ("Dashboard" topBar) clears it. */
  main.is-home {
    padding-top: max(1.5rem, env(safe-area-inset-top));
  }

  /* Rendered-markdown styling. Applied to anything that comes through
     renderMarkdown(): checklist item instructions, sponsor notes, etc.
     Tuned to match the dark/gold theme — bold goes brighter, blockquote
     gets a gold left bar, lists use gold bullet dots. */
  .md-body { color: #d0c5af; line-height: 1.55; }
  .md-body > *:first-child { margin-top: 0; }
  .md-body > *:last-child { margin-bottom: 0; }
  .md-body p { margin: 0 0 0.6em; }
  .md-body strong { color: #e5e2e1; font-weight: 700; }
  .md-body em { font-style: italic; }
  .md-body a { color: #f2ca50; text-decoration: underline; text-decoration-color: rgba(242, 202, 80, 0.45); text-underline-offset: 2px; }
  .md-body a:hover { text-decoration-color: #f2ca50; }
  .md-body code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.9em;
    background: #2a2a2a;
    color: #e5e2e1;
    padding: 1px 6px;
    border-radius: 4px;
  }
  .md-body pre {
    background: #0e0e0e;
    border: 1px solid #4d4635;
    border-radius: 8px;
    padding: 10px 12px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 0.92em;
    line-height: 1.4;
  }
  .md-body pre code { background: none; padding: 0; border-radius: 0; font-size: 1em; }
  .md-body blockquote {
    border-left: 3px solid #d4af37;
    padding: 2px 0 2px 12px;
    margin: 6px 0;
    font-style: italic;
    color: #d0c5af;
  }
  .md-body blockquote > *:first-child { margin-top: 0; }
  .md-body blockquote > *:last-child { margin-bottom: 0; }
  .md-body ul, .md-body ol { padding-left: 1.25em; margin: 0 0 0.6em; }
  .md-body ul { list-style: none; padding-left: 0.5em; }
  .md-body ul li { position: relative; padding-left: 1em; }
  .md-body ul li::before {
    content: "";
    position: absolute;
    left: 0; top: 0.6em;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #d4af37;
  }
  .md-body ol { list-style-type: decimal; }
  .md-body ol::marker, .md-body ol li::marker { color: #d4af37; }
  .md-body li { margin: 0.15em 0; }
  .md-body li > p { margin: 0; }
  .md-body hr { border: 0; border-top: 1px solid #4d4635; margin: 12px 0; }
  .md-body h1, .md-body h2, .md-body h3, .md-body h4 {
    color: #f2ca50; font-weight: 700;
    margin: 12px 0 6px;
    letter-spacing: 0.01em;
  }
  .md-body h1 { font-size: 1.15em; }
  .md-body h2 { font-size: 1.08em; }
  .md-body h3 { font-size: 1.02em; }
  .md-body h4 { font-size: 0.98em; }

  /* Responsive 16:9 YouTube embed inside the "THIS EPISODE" card. */
  .video-embed {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border-bottom: 1px solid rgba(77, 70, 53, 0.3);
  }
  /* aspect-ratio is well-supported on iOS Safari 15+ / Android Chrome 88+ */
  .video-embed iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }
  .video-empty {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(77, 70, 53, 0.3);
    background: #0e0e0e;
  }
  .video-empty .msg {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: #c8c6c5;
  }
  /* "Watch" pill on home episode cards. */
  .watch-pill {
    display: inline-flex; align-items: center; gap: 3px;
    background: rgba(242, 202, 80, 0.1);
    border: 1px solid rgba(242, 202, 80, 0.35);
    color: #f2ca50;
    padding: 2px 8px 2px 6px;
    border-radius: 999px;
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.02em;
    cursor: pointer;
    line-height: 1.4;
  }
  .watch-pill:hover { background: rgba(242, 202, 80, 0.18); }
  .watch-pill .material-symbols-outlined {
    font-variation-settings: 'FILL' 1, 'wght' 700;
    font-size: 13px !important;
  }

  /* Per-episode prominent progress bar (in content, below header). */
  .ep-progress {
    display: flex; align-items: center; gap: 12px;
    padding: 4px 2px 2px;
  }
  .ep-progress .bar {
    flex: 1; height: 6px;
    background: rgba(77, 70, 53, 0.4);
    border-radius: 999px;
    overflow: hidden;
  }
  .ep-progress .bar .fill {
    height: 100%;
    background: linear-gradient(90deg, #d4af37, #f2ca50);
    transition: width 0.35s ease;
  }
  .ep-progress .txt {
    font-size: 12px; font-weight: 600; color: #c8c6c5;
    white-space: nowrap;
  }
  .ep-progress .txt .pct { color: #f2ca50; font-weight: 700; margin-left: 2px; }

  /* Section-level completion badge: gold filled pill with checkmark.
     Replaces the muted "X / N" count chip when a section is 100% done. */
  .section-done-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px 3px 6px;
    border-radius: 999px;
    background: #f2ca50;
    color: #3c2f00;
    font-size: 10px; font-weight: 800; letter-spacing: 0.04em;
    line-height: 1.3;
  }
  .section-done-badge .material-symbols-outlined {
    font-variation-settings: 'FILL' 1, 'wght' 700;
    font-size: 14px !important;
  }
  /* Section as a <details> — hide native marker, fade out the summary
     bottom-border when collapsed so the rounded card looks clean. */
  details.section > summary {
    list-style: none;
    cursor: pointer;
    border-bottom: 1px solid rgba(77, 70, 53, 0.3);
    transition: background 0.15s, border-color 0.15s;
  }
  details.section > summary::-webkit-details-marker { display: none; }
  details.section:not([open]) > summary { border-bottom-color: transparent; }
  details.section[open] > summary .chev { transform: rotate(90deg); }
  details.section > summary:hover { background: #2a2a2a; }
  /* Slight visual de-emphasis when a section is fully complete + collapsed. */
  details.section.complete:not([open]) {
    border-color: rgba(77, 70, 53, 0.5);
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    display: inline-block; vertical-align: middle; user-select: none;
  }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  details[open] > summary .chev { transform: rotate(90deg); }
  .chev { transition: transform 0.18s ease; display: inline-block; }
  .cb {
    appearance: none; -webkit-appearance: none;
    width: 20px; height: 20px;
    border: 1.5px solid #99907c;
    border-radius: 5px;
    background: transparent;
    cursor: pointer; flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cb:checked { background: #f2ca50; border-color: #f2ca50; }
  .cb:checked::after {
    content: ""; width: 6px; height: 10px;
    border: solid #131313; border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px,-1px);
  }
  /* Owner chip next to role-group section title */
  .owner-chip {
    display: inline-flex; align-items: center;
    margin-left: 8px;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(212, 175, 55, 0.08);
    border: 1px solid rgba(212, 175, 55, 0.35);
    color: #d4af37;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.02em; text-transform: none;
    line-height: 1.4; white-space: nowrap;
  }
  /* Per-row owner chip — smaller, used when an item's owner differs from section owner */
  .row-owner-chip {
    display: inline-flex; align-items: center;
    padding: 1px 7px;
    border-radius: 999px;
    background: rgba(200, 198, 197, 0.08);
    border: 1px solid rgba(200, 198, 197, 0.3);
    color: #c8c6c5;
    font-size: 9.5px; font-weight: 600;
    line-height: 1.4; white-space: nowrap;
    margin-left: 6px;
  }
  /* Header back arrow (per-episode view only) */
  .back-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px;
    border-radius: 8px;
    color: #c8c6c5;
    transition: background 0.15s, color 0.15s;
    text-decoration: none;
    margin-right: 4px;
  }
  .back-btn:hover { background: #2a2a2a; color: #f2ca50; }
  /* Per-episode metrics tile grid */
  .metric-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
  @media (min-width: 640px) { .metric-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); } }
  .metric-tile {
    background: #0e0e0e;
    border: 1px solid rgba(77,70,53,0.6);
    border-radius: 10px;
    padding: 10px 11px;
    display: flex; flex-direction: column; gap: 2px;
    min-width: 0;
  }
  .metric-tile .lbl {
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.08em;
    color: #c8c6c5; text-transform: uppercase;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .metric-tile .val { font-size: 17px; font-weight: 700; color: #e5e2e1; line-height: 1.15; }
  .metric-tile .val.empty { color: #6f675a; font-weight: 500; }
  /* Past episodes horizontal strip (per-episode view) */
  .past-strip { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
  .past-strip::-webkit-scrollbar { height: 6px; }
  .past-strip::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  .past-card {
    flex: 0 0 220px;
    background: #1c1b1b;
    border: 1px solid #4d4635;
    border-radius: 10px;
    padding: 11px 12px;
    text-decoration: none; color: inherit;
    transition: border-color 0.15s, background 0.15s;
  }
  .past-card:hover { border-color: #d4af37; background: #201f1f; }
  /* Home view aggregate strip */
  .agg-strip { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
  .agg-tile {
    background: #1c1b1b;
    border: 1px solid #4d4635;
    border-radius: 12px;
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 4px;
    min-width: 0;
  }
  .agg-tile .lbl {
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    color: #c8c6c5; text-transform: uppercase;
  }
  .agg-tile .val { font-size: 22px; font-weight: 800; color: #f2ca50; line-height: 1.1; }
  .agg-tile .val.empty { color: #6f675a; font-weight: 600; font-size: 18px; }
  /* Home view episode grid */
  .ep-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 640px) { .ep-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  .ep-card {
    background: #201f1f;
    border: 1px solid #4d4635;
    border-radius: 14px;
    padding: 16px 18px;
    text-decoration: none; color: inherit;
    transition: border-color 0.15s, background 0.15s, transform 0.15s;
    display: flex; flex-direction: column; gap: 12px;
    min-width: 0;   /* respect the grid track (1fr); was overflowing to the screen edge */
  }
  .ep-card:hover { border-color: #d4af37; background: #262524; transform: translateY(-1px); }
  .ep-card .head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .ep-card .name { font-size: 17px; font-weight: 700; color: #e5e2e1; line-height: 1.2; }
  .ep-card .meta { font-size: 11px; color: rgba(200,198,197,0.7); margin-top: 4px; display: flex; flex-wrap: wrap; gap: 4px 10px; align-items: center; }
  .ep-card .meta .sep { color: rgba(200,198,197,0.35); }
  .ep-card .metrics { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
  .ep-card .metrics > div { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .ep-card .metrics .ml { font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em; color: #c8c6c5; text-transform: uppercase; }
  .ep-card .metrics .mv { font-size: 14px; font-weight: 700; color: #e5e2e1; }
  /* Color-code metrics relative to all-episode averages.
     Green = above avg (+10%), red = below avg (-10%), gray = within ±10%. */
  .ep-card .metrics .mv.cmp-above { color: #5dd39e; }
  .ep-card .metrics .mv.cmp-below { color: #ff8b8b; }
  .ep-card .metrics .mv.cmp-equal { color: #c8c6c5; }

  .ep-card .metrics .mv.empty { color: #6f675a; font-weight: 500; }
  /* Status pill (also reused for transcript pill style) */
  .pill {
    display: inline-flex; align-items: center;
    padding: 3px 9px; border-radius: 999px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; white-space: nowrap;
  }
  .pill.in_production { background: rgba(242, 202, 80, 0.12); color: #f2ca50; border: 1px solid rgba(242, 202, 80, 0.4); }
  .pill.airing { background: rgba(141, 219, 162, 0.14); color: #8ddba2; border: 1px solid rgba(141, 219, 162, 0.45); }
  .pill.planned { background: rgba(116, 192, 252, 0.12); color: #8fc8ff; border: 1px solid rgba(116, 192, 252, 0.4); }
  .pill.shipped { background: rgba(200, 198, 197, 0.08); color: #c8c6c5; border: 1px solid rgba(200, 198, 197, 0.25); }
  .pill.tr-ok { background: rgba(141, 219, 162, 0.1); color: #8ddba2; border: 1px solid rgba(141, 219, 162, 0.3); font-weight: 600; letter-spacing: 0.02em; text-transform: none; }
  .pill.tr-pending { background: rgba(200, 198, 197, 0.06); color: rgba(200, 198, 197, 0.7); border: 1px solid rgba(200, 198, 197, 0.18); font-weight: 600; letter-spacing: 0.02em; text-transform: none; }
  /* Inline "+ New episode" button on home */
  .new-ep-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    border-radius: 999px;
    background: #f2ca50; color: #3c2f00;
    font-size: 12px; font-weight: 700;
    border: none; cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
  }
  .new-ep-btn:hover { opacity: 0.92; transform: translateY(-1px); }
  /* Inline call-to-action button used in the expanded "Input Sponsors" item */
  .cta-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    border-radius: 8px;
    background: #f2ca50; color: #3c2f00;
    font-size: 12px; font-weight: 700;
    border: none; cursor: pointer;
    transition: opacity 0.15s;
  }
  .cta-btn:hover { opacity: 0.92; }
  /* Sponsor row (in Sponsorship section, below "Input Sponsors") */
  .sponsor-row {
    border-top: 1px solid rgba(77, 70, 53, 0.3);
    padding: 12px 16px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .sponsor-row .body { flex: 1; min-width: 0; }
  .sponsor-row .name { font-size: 14px; font-weight: 600; color: #e5e2e1; line-height: 1.2; }
  .sponsor-row .name.cut { color: #c8c6c5; text-decoration: line-through; }
  .sponsor-row .sub { font-size: 11.5px; color: rgba(200, 198, 197, 0.7); margin-top: 3px; display: flex; flex-wrap: wrap; gap: 4px 8px; align-items: center; }
  .sponsor-row .sub .sep { color: rgba(200, 198, 197, 0.35); }
  .sponsor-row .notes { font-size: 12.5px; color: #d0c5af; margin-top: 6px; line-height: 1.5; }
  .sponsor-row .actions { font-size: 11px; color: #c8c6c5; }
  .sponsor-row .del-btn { color: rgba(200, 198, 197, 0.55); cursor: pointer; padding: 2px 6px; font-size: 11px; background: none; border: none; }
  .sponsor-row .del-btn:hover { color: #ffb4ab; }
  /* Modal */
  .modal-bd {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: flex-start; justify-content: center;
    z-index: 100; overflow-y: auto;
    backdrop-filter: blur(4px);
    /* Safe-area-aware padding so modals don't sit under the iPhone notch. */
    padding-top: calc(24px + env(safe-area-inset-top));
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
    padding-left: max(16px, env(safe-area-inset-left));
    padding-right: max(16px, env(safe-area-inset-right));
  }
  .modal-card {
    background: #201f1f;
    border: 1px solid #4d4635;
    border-radius: 14px;
    width: 100%; max-width: 480px;
    padding: 22px 22px 20px;
    color: #e5e2e1;
  }
  .modal-card h3 {
    font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
    color: #f2ca50; text-transform: uppercase; margin-bottom: 18px;
  }
  .modal-card label { font-size: 11px; color: #c8c6c5; display: block; margin-bottom: 6px; font-weight: 600; }
  .modal-card input, .modal-card select, .modal-card textarea {
    width: 100%; background: #131313; border: 1px solid #4d4635; border-radius: 8px;
    padding: 10px 12px; color: #e5e2e1; font-size: 14px;
    transition: border-color 0.15s;
    font-family: inherit;
    min-height: 40px;
    box-sizing: border-box;
  }
  .modal-card input:focus, .modal-card select:focus, .modal-card textarea:focus {
    outline: none; border-color: #f2ca50;
  }
  .modal-card textarea { resize: vertical; min-height: 60px; }
  /* New-episode modal: dates grid that stacks on narrow screens. */
  .ne-dates {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  /* Let grid children shrink so native date inputs (esp. iOS Safari, which keeps a wide
     intrinsic min-width) can never blow out their track and overlap the adjacent field. */
  .ne-dates > * { min-width: 0; }
  .ne-dates input { width: 100%; min-width: 0; box-sizing: border-box; }
  /* Two columns only once the modal is comfortably wide enough for two date inputs;
     phones (incl. Pro Max ~430px) stack cleanly with no overlap. minmax(0,1fr) — not a
     bare 1fr — so a track can never be forced wider than its share (matches the other grids). */
  @media (min-width: 480px) {
    .ne-dates { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
  }
  /* The form rows themselves get a bit more vertical space than the global space-y-3. */
  .ne-form > * + * { margin-top: 16px; }
  /* Transcript-received toggle row in the edit-episode modal. */
  .ee-toggle-lbl {
    display: flex; align-items: center; gap: 10px;

  }
  function fmtHrs(h) { return (h == null || isNaN(h)) ? null : Math.round(Number(h)) + "h"; }
  function fmtUsd(n) { return (n == null || isNaN(n)) ? null : "$" + Math.round(Number(n)).toLocaleString(); }
  function fmtUsd2(n) { return (n == null || isNaN(n)) ? null : "$" + Number(n).toFixed(2); }
  function fmtMetric(def, value) {
    switch (def.fmt) {
      case "n":    return fmtN(value);
      case "pct":  return fmtPct(value);
      case "dur":  return fmtDur(value);
      case "hrs":  return fmtHrs(value);
      case "usd":  return fmtUsd(value);
      case "usd2": return fmtUsd2(value);
      default:     return value == null ? null : String(value);
    }
  }

  function formatUpdated(raw) {
    if (!raw) return "unknown";
    var d = new Date(raw);
    if (isNaN(d.getTime())) return raw;
    return d.toLocaleString(undefined, {
      month: "short", day: "numeric", hour: "numeric", minute: "2-digit"
    });
  }
  // Parse a value to a Date in LOCAL time. Date-only strings (YYYY-MM-DD, as stored
  // in airing_date / shooting_date) must be built from local Y/M/D components — passing
  // them to `new Date()` parses them as UTC midnight, which then renders a day early in
  // any behind-UTC timezone (the "Air Jun 4" for a 2026-06-05 date bug). Full timestamps
  // (premiere_at / created_at, which carry a time + offset) are parsed normally.
  function parseLocalDate(s) {
    if (!s) return null;
    var str = String(s).trim();
    var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(str);
    var d = m ? new Date(+m[1], +m[2] - 1, +m[3]) : new Date(str);
    return isNaN(d.getTime()) ? null : d;
  }
  function shortDate(s) {
    if (!s) return "";
    var d = parseLocalDate(s);
    if (!d) return s;
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }

  function metricsHasAnyValue(m) {
    if (!m || typeof m !== "object") return false;
    return METRIC_DEFS.some(function (def) {
      var v = m[def.key];
      return v != null && v !== "" && !(typeof v === "number" && isNaN(v));
    });
  }

  // Canonical four-state lifecycle: planned -> in_production -> airing -> shipped.
  // Legacy/loose values (in-progress / in progress / active / upcoming / live / aired)
  // are folded onto the canonical set so older rows keep rendering cleanly.
  function statusOf(e) {
    var s = e && e.status ? String(e.status).toLowerCase().replace(/[\s-]+/g, "_") : "";
    if (s === "planned" || s === "upcoming") return "planned";
    if (s === "in_production" || s === "in_progress" || s === "active" || s === "production") return "in_production";
    if (s === "airing" || s === "live" || s === "aired") return "airing";
    return "shipped";
  }
  // "Active pipeline" = anything between planned and shipped.
  function isInProgress(e) { var s = statusOf(e); return s === "in_production" || s === "airing"; }
  var STATUS_ORDER = ["planned", "in_production", "airing", "shipped"];
  var STATUS_LABELS = { planned: "Planned", in_production: "In Production", airing: "Airing", shipped: "Shipped" };
  function statusLabel(e) { return STATUS_LABELS[statusOf(e)] || "Shipped"; }

  function slugify(s) {
    return String(s || "").toLowerCase().trim()
      .replace(/['"`’]/g, "")
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-+|-+$/g, "");
  }

  // Render markdown → sanitized HTML. Returns null if the libraries
  // failed to load (caller should then fall back to textContent).
  function renderMarkdown(md) {
    if (md == null || md === "") return "";
    var hasMarked = typeof window.marked !== "undefined";
    var hasPurify = typeof window.DOMPurify !== "undefined";
    if (!hasMarked || !hasPurify) return null;
    // breaks: true → single newlines become <br>, matching the source's
    // intended layout (the seed text was authored that way).
    var raw = window.marked.parse(String(md), { breaks: true, gfm: true });
    return window.DOMPurify.sanitize(raw, {
      USE_PROFILES: { html: true },
      ADD_ATTR: ["target", "rel"]
    });
  }
  // Helper: drop rendered markdown into a node, falling back to plain text.
  function setMarkdownInto(node, md) {
    if (md == null || md === "") { node.textContent = ""; return; }
    var html = renderMarkdown(md);
    if (html === null) {
      node.style.whiteSpace = "pre-wrap";
      node.textContent = md;
    } else {
      node.innerHTML = html;
      // Force external-safe links: open in new tab + drop referrer.
      var anchors = node.querySelectorAll("a");
      for (var i = 0; i < anchors.length; i++) {
        anchors[i].setAttribute("target", "_blank");
        anchors[i].setAttribute("rel", "noopener noreferrer");
      }
    }
  }

  // Pull the 11-char YouTube video ID out of any form of YouTube URL the
  // team might paste: watch, share-short, embed, shorts, live, or a bare ID.
  // Returns null if the input doesn't look like a YouTube URL/ID.
  function parseYouTubeId(input) {
    if (!input) return null;
    var s = String(input).trim();
    var m;
    if ((m = s.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/))) return m[1];
    if ((m = s.match(/[?&]v=([a-zA-Z0-9_-]{11})/))) return m[1];
    if ((m = s.match(/youtube\.com\/(?:embed|shorts|v|live)\/([a-zA-Z0-9_-]{11})/))) return m[1];
    if ((m = s.match(/^([a-zA-Z0-9_-]{11})$/))) return m[1];
    return null;
  }

  // Counts for a given role-group, including sponsor "Cut into show" rows
  // for the Sponsorship section.
  function groupCounts(group, groupItems) {
    // Sponsors are a displayed list under Sponsorship, not tasks themselves.
    // Verification progress is tracked by the real per-sponsor tasks in the
    // Jerry-owned "Sponsor Verification" group (counted via groupItems there).
    var total = groupItems.length;
    var done = groupItems.filter(function (it) { return it.done; }).length;
    return { total: total, done: done };
  }
  // Whether a section should render expanded. Respects explicit user
  // intent if set; otherwise auto-rule: collapsed iff 100% complete.
  function shouldSectionBeOpen(group, groupItems) {
    if (sectionUserState.hasOwnProperty(group)) return sectionUserState[group];
    var c = groupCounts(group, groupItems);
    if (c.total === 0) return true;
    return c.done < c.total;
  }

  // ============================================================

  // ============================================================
  function renderStrategyCard() {
    var card = document.createElement("details");
    card.className = "strategy-card";
    card.open = !!strategyCardOpen;

    var total = strategyItems.length;
    var done = strategyItems.filter(function (i) { return i.done; }).length;
    var allDone = total > 0 && done === total;

    // ---- Summary row (always visible)
    var summary = document.createElement("summary");

    var left = el("div", "strat-head-left");
    left.appendChild(icon("rocket_launch", "text-primary text-[22px] flex-shrink-0"));
    var titles = el("div", "min-w-0");
    html(titles, "div", "strat-title", "Strategy");
    var subText = total
      ? "Growth playbook · " + done + " / " + total + " action items done"
      : "Growth playbook · run the migration + seed to populate";
    html(titles, "div", "strat-sub", subText);
    left.appendChild(titles);
    summary.appendChild(left);

    var right = el("div", "flex items-center gap-2 flex-shrink-0");
    if (total > 0) {
      var prog = el("span", "strat-prog" + (allDone ? " done" : ""));

      right.appendChild(prog);
    }
    right.appendChild(icon("chevron_right", "chev text-outline text-[20px]"));
    summary.appendChild(right);

    // Track outer expand intent so re-renders don't snap it shut.
    summary.addEventListener("click", function () {
      setTimeout(function () { strategyCardOpen = card.open; }, 0);
    });

    card.appendChild(summary);

    // ---- Expanded body
    var body = el("div", "strat-body");

    // Principles (top, read-only)
    var principlesWrap = el("div");
    var pHead = el("div", "strat-section-head");
    pHead.appendChild(icon("auto_awesome", "text-[16px]"));
    html(pHead, "span", null, "Core principles");
    principlesWrap.appendChild(pHead);
    var principlesList = el("div", "principles");
    STRATEGY_PRINCIPLES.forEach(function (p) {
      var b = el("div", "principle");
      html(b, "div", "pname", p.name);
      var body = el("div", "pbody md-body");
      setMarkdownInto(body, p.body_md);
      b.appendChild(body);
      principlesList.appendChild(b);
    });
    principlesWrap.appendChild(principlesList);
    body.appendChild(principlesWrap);

    // Goals (operator-editable)
    var goalsWrap = el("div");
    var gHead = el("div", "strat-section-head");
    gHead.appendChild(icon("flag", "text-[16px]"));
    html(gHead, "span", null, "Goals to track");
    goalsWrap.appendChild(gHead);

    var goalsStrip = el("div", "goals-strip");
    STRATEGY_GOALS.forEach(function (g) {
      var tile = document.createElement("button");
      tile.type = "button";
      tile.className = "goal-tile";
      var lbl = el("div", "glbl");
      lbl.appendChild(icon("edit", "text-[13px]"));
      html(lbl, "span", null, g.label);
      tile.appendChild(lbl);
      html(tile, "div", "gtgt", g.target);
      var val = strategyState ? strategyState[g.key] : null;
      var valEl = el("div", "gval" + ((val == null || val === "") ? " empty" : ""));
      if (val == null || val === "") {
        valEl.textContent = "Tap to set";
      } else {
        setMarkdownInto(valEl, val);
      }
      tile.appendChild(valEl);
      tile.addEventListener("click", function () { openEditGoalModal(g); });
      goalsStrip.appendChild(tile);
    });
    goalsWrap.appendChild(goalsStrip);
    body.appendChild(goalsWrap);

    // Action items by category
    var catsWrap = el("div");
    var cHead = el("div", "strat-section-head");
    cHead.appendChild(icon("checklist", "text-[16px]"));
    html(cHead, "span", null, "Action items");
    catsWrap.appendChild(cHead);

    if (!strategyItems.length) {
      var empty = el("div", "text-[12.5px] text-secondary/70 px-1 py-2");
      empty.textContent = "No action items yet. Run the migration + seed_strategy.sql in Supabase to populate.";
      catsWrap.appendChild(empty);
    } else {
      var byCat = {};
      strategyItems.forEach(function (it) {
        var c = it.category || "Other";
        if (!byCat[c]) byCat[c] = [];
        byCat[c].push(it);
      });
      var catsList = el("div", "strat-cats");
      var renderedCats = {};
      STRATEGY_CATEGORIES.forEach(function (cat) {
        if (byCat[cat]) { catsList.appendChild(renderStrategyCategory(cat, byCat[cat])); renderedCats[cat] = true; }
      });
      Object.keys(byCat).forEach(function (cat) {
        if (!renderedCats[cat]) catsList.appendChild(renderStrategyCategory(cat, byCat[cat]));
      });
      catsWrap.appendChild(catsList);
    }
    body.appendChild(catsWrap);

    // Source documents footer
    var docs = el("div", "source-docs");

      a.target = "_blank";
      a.rel = "noopener";
      a.appendChild(icon(d.icon, ""));
      html(a, "span", null, d.label);
      docsRow.appendChild(a);
    });
    docs.appendChild(docsRow);
    body.appendChild(docs);

    card.appendChild(body);
    return card;
  }

  function renderStrategyCategory(category, catItems) {
    var done = catItems.filter(function (i) { return i.done; }).length;
    var total = catItems.length;
    var allDone = total > 0 && done === total;

    var d = document.createElement("details");
    d.className = "strat-cat" + (allDone ? " complete" : "");
    // Auto-rule: open unless 100% done. User override persists for the session.
    if (strategyCatState.hasOwnProperty(category)) {
      d.open = strategyCatState[category];
    } else {
      d.open = !allDone;
    }

    var s = document.createElement("summary");
    var l = el("div", "cat-head-left");
    l.appendChild(icon(STRATEGY_CAT_ICONS[category] || "task_alt", "text-primary text-[18px] flex-shrink-0"));
    html(l, "span", "cat-name", category);
    s.appendChild(l);

    var r = el("div", "flex items-center gap-2 flex-shrink-0");
    if (allDone) {
      var b = el("span", "section-done-badge");
      b.appendChild(icon("check", ""));

    s.addEventListener("click", function () {

  function renderStrategyItem(item) {
    var row = document.createElement("details");

      "flex-1 min-w-0 text-[13.5px] " + (item.done ? "text-secondary line-through" : "text-on-surface"),

      setMarkdownInto(noteBody, item.notes);

  // ============================================================
  // Strategy mutations
  // ============================================================
  function toggleStrategyItem(item) {
    var newDone = !item.done;
    var nowIso = new Date().toISOString();
    item.done = newDone;
    item.done_at = newDone ? nowIso : null;
    if (item.category) delete strategyCatState[item.category];
    renderHome(window.__lastEpsForHome || []);
    sb.from("prs_strategy_items").update({
      done: newDone,
      done_at: newDone ? nowIso : null,
      updated_at: nowIso
    }).eq("id", item.id).then(function (r) {
      if (r.error) { console.error(r.error); alert("Toggle failed: " + r.error.message); loadStrategy().then(function () { renderHome(window.__lastEpsForHome || []); }); }
    });
  }

  function openEditGoalModal(goalDef) {
    var root = document.getElementById("modal-root");

    var bd = el("div", "modal-bd");
    bd.addEventListener("click", function (e) { if (e.target === bd) closeModal(); });
    var card = el("div", "modal-card");

    form.addEventListener("submit", function (e) {
      e.preventDefault();

        .update(patch).eq("id", 1).select().single()

  function loadStrategy() {
    var p1 = sb.from("prs_strategy_items")
      .select("*").order("sort_order", { ascending: true })
      .then(function (r) {
        if (r.error) { console.error("loadStrategy items:", r.error); strategyItems = []; return; }
        strategyItems = r.data || [];
      });
    var p2 = sb.from("prs_strategy_state")
      .select("*").eq("id", 1).maybeSingle()
      .then(function (r) {
        if (r.error) { console.error("loadStrategy state:", r.error); return; }
        if (r.data) strategyState = r.data;
      });
    return Promise.all([p1, p2]);
  }

  function subscribeStrategyRealtime() {
    sb.channel("prs-strategy-items")
      .on("postgres_changes",
          { event: "*", schema: "public", table: "prs_strategy_items" },
          function () { loadStrategy().then(function () { renderHome(window.__lastEpsForHome || []); }); })
      .subscribe();
    sb.channel("prs-strategy-state")
      .on("postgres_changes",
          { event: "*", schema: "public", table: "prs_strategy_state" },
          function () { loadStrategy().then(function () { renderHome(window.__lastEpsForHome || []); }); })
      .subscribe();
  }

  // ============================================================
  // Home view
  // ============================================================
  function renderHome(allEps) {
    // Cache the episode list so strategy mutations can re-render the home
    // view without re-fetching episodes.
    window.__lastEpsForHome = allEps;
    var c = document.getElementById("content");
    c.innerHTML = "";
    // Flag the main element so the home view gets safe-area top padding.
    var mainEl = document.querySelector("main");
    if (mainEl) mainEl.classList.add("is-home");

    // Top action bar with the "+ New episode" button.
    var topBar = el("div", "flex items-center justify-between");
    var topLeft = el("div", "flex items-center gap-2");
    topLeft.appendChild(icon("home", "text-primary text-[22px]"));
    html(topLeft, "h2", "text-[13px] font-bold tracking-widest text-primary uppercase", "Dashboard");
    topBar.appendChild(topLeft);
    var newBtn = el("button", "new-ep-btn");
    newBtn.appendChild(icon("add", "text-[16px]"));
    html(newBtn, "span", null, "New episode");
    newBtn.addEventListener("click", openNewEpisodeModal);
    topBar.appendChild(newBtn);
    c.appendChild(topBar);

    // Aggregate strip + per-metric averages (used for color-coding episode cards).
    var total = allEps.length;
    var inProg = allEps.filter(isInProgress).length;
    var avgs = {}; // { metric_key: average }
    var sums = {}, ns = {};
    METRIC_DEFS.forEach(function (def) { sums[def.key] = 0; ns[def.key] = 0; });
    allEps.forEach(function (e) {
      var m = e.metrics || {};
      METRIC_DEFS.forEach(function (def) {
        var v = m[def.key];
        if (typeof v === "number" && !isNaN(v) && v !== 0) { sums[def.key] += v; ns[def.key] += 1; }
      });
    });
    METRIC_DEFS.forEach(function (def) {
      if (ns[def.key] > 0) avgs[def.key] = sums[def.key] / ns[def.key];
    });
    var aggDefs = [
      { lbl: "Avg views",   val: avgs.views        != null ? fmtN(avgs.views)          : null },
      { lbl: "Avg CTR",     val: avgs.ctr_pct      != null ? fmtPct(avgs.ctr_pct)      : null },
      { lbl: "Avg view %",  val: avgs.avg_view_pct != null ? fmtPct(avgs.avg_view_pct) : null }
    ];
    var agg = el("section", "agg-strip");
    aggDefs.forEach(function (a) {
      var tile = el("div", "agg-tile");
      html(tile, "span", "lbl", a.lbl);
      var v = el("span", "val" + (a.val == null ? " empty" : ""));
      v.textContent = a.val == null ? "—" : a.val;
      tile.appendChild(v);
      agg.appendChild(tile);
    });
    c.appendChild(agg);

    // Strategy card — Johnny's growth playbook. Sits between the aggregate
    // metrics and the Episodes list, collapsed by default.
    c.appendChild(renderStrategyCard());

    // Episodes section header
    var section = el("section", "space-y-3");
    var head = el("div", "flex items-center justify-between px-1");
    var headLeft = el("div", "flex items-center gap-2");
    headLeft.appendChild(icon("podcasts", "text-primary text-[20px]"));
    html(headLeft, "h2", "text-[12px] font-bold tracking-widest text-primary uppercase", "Episodes");
    head.appendChild(headLeft);
    var headRight = el("div", "flex items-center gap-2");
    var junk = placeholderEps(allEps);
    if (junk.length) {
      var cleanBtn = el("button", "inline-flex items-center gap-1 px-2.5 py-1 text-[11px] font-semibold rounded-full bg-surface-container-high text-secondary hover:text-error border border-outline-variant hover:border-error/40 transition-colors");
      cleanBtn.type = "button";
      cleanBtn.appendChild(icon("mop", "text-[14px]"));
      html(cleanBtn, "span", null, "Remove " + junk.length + " placeholder" + (junk.length > 1 ? "s" : ""));
      cleanBtn.addEventListener("click", function () { cleanupPlaceholders(allEps); });
      headRight.appendChild(cleanBtn);
    }
    html(headRight, "span", "text-[11px] text-secondary font-medium", total + " total");
    head.appendChild(headRight);
    section.appendChild(head);

    if (!allEps.length) {
      var empty = el("div", "bg-surface-container rounded-xl border border-outline-variant p-6 text-center space-y-3");
      html(empty, "p", "text-[13px] text-on-surface-variant", "No episodes yet.");
      var emptyBtn = el("button", "new-ep-btn");
      emptyBtn.appendChild(icon("add", "text-[16px]"));
      html(emptyBtn, "span", null, "Create your first episode");
      emptyBtn.addEventListener("click", openNewEpisodeModal);
      empty.appendChild(emptyBtn);
      section.appendChild(empty);
      c.appendChild(section);
      return;
    }

    // Single flat sort by airing date, DESCENDING — latest/upcoming first, so an
    // upcoming planned episode (e.g. Lorenzo Lamas, airing Jun 15) sits at the top
    // and the back catalogue trails off by air date.
    // Sort key falls back so undated rows still order naturally:
    //   airing_date → premiere_at (the real air date for shipped eps)
    //              → shooting_date → created_at.
    // Rows with no usable date at all sink to the bottom, so dated upcoming
    // episodes always sit above undated ones.
    function sortTs(e) {
      var raw = e.airing_date || e.premiere_at || e.shooting_date || e.created_at;
      var d = parseLocalDate(raw);
      return d ? d.getTime() : null;
    }
    var sorted = allEps.slice().sort(function (a, b) {
      var aT = sortTs(a), bT = sortTs(b);
      if (aT == null && bT == null) return 0;
      if (aT == null) return 1;   // undated sink to the bottom
      if (bT == null) return -1;
      return bT - aT;             // descending: latest/upcoming first
    });

    var grid = el("div", "ep-grid");
    sorted.forEach(function (e) {
      var card = document.createElement("a");
      card.className = "ep-card";
      card.href = "?episode=" + encodeURIComponent(e.slug);

      var headRow = el("div", "head");
      var nameWrap = el("div", "min-w-0 flex-1");
      html(nameWrap, "div", "name truncate", e.guest_name || "Untitled");

      // Meta line: dates + transcript chip.
      // Date priority:
      //   - shipped:    "Aired May 5" (premiere_at)
      //   - planned:    "Shoot Apr 27 · Air May 5" (shoot + airing dates)
      //   - other:      created_at fallback
      var meta = el("div", "meta");
      var ep_status = statusOf(e);
      var anyDate = false;
      if ((ep_status === "shipped" || ep_status === "airing") && (e.premiere_at || e.airing_date)) {
        var pd = el("span"); pd.textContent = "Aired " + shortDate(e.premiere_at || e.airing_date); meta.appendChild(pd);
        anyDate = true;
      } else if (ep_status === "planned") {
        if (e.shooting_date) {
          var s2 = el("span"); s2.textContent = "Shoot " + shortDate(e.shooting_date); meta.appendChild(s2);
          anyDate = true;
        }
        if (e.shooting_date && e.airing_date) html(meta, "span", "sep", "·");
        if (e.airing_date) {
          var ad = el("span"); ad.textContent = "Air " + shortDate(e.airing_date); meta.appendChild(ad);
          anyDate = true;
        }
      } else {
        // in-progress or other: show whichever dates exist
        if (e.shooting_date) {
          var s3 = el("span"); s3.textContent = "Shoot " + shortDate(e.shooting_date); meta.appendChild(s3);
          anyDate = true;
        }
        if (e.shooting_date && e.airing_date) html(meta, "span", "sep", "·");
        if (e.airing_date) {
          var ad2 = el("span"); ad2.textContent = "Air " + shortDate(e.airing_date); meta.appendChild(ad2);
          anyDate = true;
        }
        if (!anyDate && e.premiere_at) {
          var pd2 = el("span"); pd2.textContent = shortDate(e.premiere_at); meta.appendChild(pd2);
          anyDate = true;
        }
        if (!anyDate && e.created_at) {
          var cd2 = el("span"); cd2.textContent = "Added " + shortDate(e.created_at); meta.appendChild(cd2);
          anyDate = true;
        }
      }
      if (anyDate) html(meta, "span", "sep", "·");
      var trChip = el("span", "pill " + (e.transcript_received ? "tr-ok" : "tr-pending"));
      trChip.textContent = e.transcript_received ? "Transcript ✓" : "Transcript pending";
      meta.appendChild(trChip);
      // "Watch" pill — opens YouTube in a new tab without navigating
      // away from the home dashboard.
      if (e.video_url) {
        var watchBtn = el("button", "watch-pill");
        watchBtn.type = "button";
        watchBtn.appendChild(icon("play_arrow", ""));
        html(watchBtn, "span", null, "Watch");
        watchBtn.addEventListener("click", function (ev) {
          ev.preventDefault(); ev.stopPropagation();
          window.open(e.video_url, "_blank", "noopener");
        });
        meta.appendChild(watchBtn);
      }
      nameWrap.appendChild(meta);
      headRow.appendChild(nameWrap);

      var pill = el("span", "pill " + statusOf(e));
      pill.textContent = statusLabel(e);
      headRow.appendChild(pill);
      card.appendChild(headRow);

      var m = e.metrics || {};
      // Skip metric tiles for planned episodes (no data yet — empty cells are noise).
      if (ep_status === "planned") {
        grid.appendChild(card);
        return;
      }
      var mGrid = el("div", "metrics");
      HEADLINE_KEYS.forEach(function (key) {
        var def = METRIC_DEFS.find(function (x) { return x.key === key; });
        var cell = el("div");
        html(cell, "span", "ml truncate", def.label);
        var rawV = m[key];
        var v = fmtMetric(def, rawV);
        // Color vs. average: ±10% band = equal (gray), above = green, below = red.
        var cmpClass = "";
        if (typeof rawV === "number" && !isNaN(rawV) && avgs[key] != null && avgs[key] > 0) {
          var ratio = rawV / avgs[key];
          if (ratio > 1.10) cmpClass = " cmp-above";
          else if (ratio < 0.90) cmpClass = " cmp-below";
          else cmpClass = " cmp-equal";
        }
        var mv = el("span", "mv" + (v == null ? " empty" : "") + cmpClass);
        mv.textContent = v == null ? "—" : v;
        cell.appendChild(mv);
        mGrid.appendChild(cell);
      });
      card.appendChild(mGrid);

      grid.appendChild(card);
    });
    section.appendChild(grid);
    c.appendChild(section);
  }

  // ============================================================
  // New-episode modal (home view)
  // ============================================================
  function openNewEpisodeModal() {
    var root = document.getElementById("modal-root");
    root.innerHTML = "";
    var bd = el("div", "modal-bd");
    bd.addEventListener("click", function (e) { if (e.target === bd) closeModal(); });
    var card = el("div", "modal-card");
    html(card, "h3", null, "New episode");

    var form = document.createElement("form");
    form.className = "ne-form";

    function field(labelText, name, type, required) {
      var wrap = document.createElement("div");
      var lbl = el("label", null, labelText + (required ? " *" : ""));
      lbl.setAttribute("for", "ne-" + name);
      wrap.appendChild(lbl);
      var inp = document.createElement("input");
      inp.id = "ne-" + name; inp.name = name; inp.type = type;
      if (required) inp.required = true;
      wrap.appendChild(inp);
      return wrap;
    }
    form.appendChild(field("Guest name", "guest", "text", true));
    var dates = el("div", "ne-dates");
    dates.appendChild(field("Shooting date", "shoot", "date", false));
    dates.appendChild(field("Airing date", "air", "date", false));
    form.appendChild(dates);

    var err = el("p", "text-[12px] text-error", "");
    err.style.display = "none";
    form.appendChild(err);

    var actions = el("div", "flex justify-end gap-2 mt-4");
    var cancel = el("button", "px-4 py-2 text-[12px] font-semibold text-secondary hover:text-on-surface transition-colors");
    cancel.type = "button"; cancel.textContent = "Cancel";
    cancel.addEventListener("click", closeModal);
    actions.appendChild(cancel);
    var save = el("button", "px-4 py-2 text-[12px] font-bold bg-primary text-on-primary rounded-lg hover:opacity-90 transition-opacity");
    save.type = "submit"; save.textContent = "Create episode";
    actions.appendChild(save);
    form.appendChild(actions);

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      err.style.display = "none";
      var guest = form.querySelector('input[name="guest"]').value.trim();
      var shoot = form.querySelector('input[name="shoot"]').value || null;
      var air = form.querySelector('input[name="air"]').value || null;
      if (!guest) {
        err.textContent = "Guest name is required.";
        err.style.display = "block";
        return;
      }
      save.disabled = true; save.textContent = "Creating…";
      createEpisode({ guest: guest, shooting_date: shoot, airing_date: air })
        .then(function (slug) {
          window.location.href = "?episode=" + encodeURIComponent(slug);
        })
        .catch(function (e) {
          err.textContent = "Could not create: " + (e && e.message ? e.message : String(e));
          err.style.display = "block";
          save.disabled = false; save.textContent = "Create episode";
        });
    });

    card.appendChild(form);
    bd.appendChild(card);
    root.appendChild(bd);
  }

  function createEpisode(payload) {
    var baseSlug = slugify(payload.guest);
    if (!baseSlug) return Promise.reject(new Error("Could not derive a slug from that guest name."));
    return ensureUniqueSlug(baseSlug).then(function (slug) {
      var row = {
        slug: slug,
        guest_name: payload.guest,
        status: "planned",
        shooting_date: payload.shooting_date || null,
        airing_date: payload.airing_date || null,
        transcript_received: false
      };
      return sb.from("prs_episodes").insert(row).select().single().then(function (r) {
        if (r.error) throw r.error;
        return seedDefaultChecklist(r.data.id).then(function () { return slug; });
      });
    });
  }
  function ensureUniqueSlug(base) {
    return sb.from("prs_episodes").select("slug").like("slug", base + "%").then(function (r) {
      if (r.error) throw r.error;
      var existing = (r.data || []).map(function (x) { return x.slug; });
      if (existing.indexOf(base) === -1) return base;
      var i = 2;
      while (existing.indexOf(base + "-" + i) !== -1) i++;
      return base + "-" + i;
    });
  }
  function seedDefaultChecklist(episodeId) {
    var rows = DEFAULT_TEMPLATE.map(function (t) {
      return {
        episode_id: episodeId,
        role_group: t.role_group,
        title: t.title,
        instructions_md: t.instructions_md,
        sort_order: t.sort_order,
        done: false
      };
    });
    return sb.from("prs_checklist_items").insert(rows).then(function (r) {
      if (r.error) throw r.error;
    });
  }

  // ============================================================
  // Per-episode: overall progress bar (prominent, in content)
  // ============================================================
  function renderEpProgress(content) {
    var total = items.length;
    var done = items.filter(function (it) { return it.done; }).length;
    if (!total) return;
    var pct = Math.round(done * 100 / total);
    var block = el("section", "ep-progress");
    var bar = el("div", "bar");
    var fill = el("div", "fill");
    fill.style.width = pct + "%";
    bar.appendChild(fill);
    block.appendChild(bar);
    var txt = el("div", "txt");
    txt.textContent = done + " of " + total + " done · ";
    var pctSpan = el("span", "pct", pct + "%");
    txt.appendChild(pctSpan);
    block.appendChild(txt);
    content.appendChild(block);
  }

  // ============================================================
  // Per-episode: metrics card
  // ============================================================
  function renderMetricsCard(content) {
    var section = el("section", "bg-surface-container rounded-xl border border-outline-variant overflow-hidden");
    var head = el("div", "flex items-center justify-between px-4 py-3 border-b border-outline-variant/30");
    var left = el("div", "flex items-center gap-2.5");
    left.appendChild(icon("insights", "text-primary text-[20px]"));
    html(left, "h2", "text-[12px] font-bold tracking-widest text-primary uppercase", "This Episode");
    head.appendChild(left);

    var headBtns = el("div", "flex items-center gap-3");
    var vidBtn = el("button", "text-[11px] text-secondary hover:text-primary transition-colors flex items-center gap-1");
    vidBtn.appendChild(icon(ep && ep.video_id ? "smart_display" : "videocam", "text-[14px]"));
    html(vidBtn, "span", null, ep && ep.video_id ? "Video" : "Set video");
    vidBtn.addEventListener("click", openEditVideoUrl);
    headBtns.appendChild(vidBtn);

    var editBtn = el("button", "text-[11px] text-secondary hover:text-primary transition-colors flex items-center gap-1");
    editBtn.appendChild(icon("edit", "text-[14px]"));
    html(editBtn, "span", null, "Edit");
    editBtn.addEventListener("click", openEditMetrics);
    headBtns.appendChild(editBtn);

    head.appendChild(headBtns);
    section.appendChild(head);

    // Mini player embed (or empty-state prompt) sits between the header and
    // the metrics grid. Auto-syncs with whatever video_id Jeremy/Tyler sets.
    if (ep && ep.video_id) {
      var embedWrap = el("div", "video-embed");
      var iframe = document.createElement("iframe");
      iframe.src = "https://www.youtube.com/embed/" + encodeURIComponent(ep.video_id);
      iframe.title = (ep.guest_name || "PRS") + " — YouTube video player";
      iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
      iframe.allowFullscreen = true;
      iframe.referrerPolicy = "strict-origin-when-cross-origin";
      embedWrap.appendChild(iframe);
      section.appendChild(embedWrap);
    } else {
      var empty = el("div", "video-empty");
      var msg = el("div", "msg");
      msg.appendChild(icon("videocam", "text-secondary/70 text-[18px]"));
      html(msg, "span", null, "No video attached yet.");
      empty.appendChild(msg);
      var add = el("button", "text-[12px] font-semibold text-primary hover:underline");
      add.textContent = "Add video URL";
      add.addEventListener("click", openEditVideoUrl);
      empty.appendChild(add);
      section.appendChild(empty);
    }

    var body = el("div", "px-4 py-3");
    var m = ep && ep.metrics ? ep.metrics : {};

    if (!metricsHasAnyValue(m)) {
      var empty = el("div", "flex items-center justify-between gap-3 py-1");
      var msg = el("div", "flex items-center gap-2 text-[13px] text-secondary");
      msg.appendChild(icon("auto_graph", "text-secondary/70 text-[18px]"));
      html(msg, "span", null, "No metrics yet for this episode.");
      empty.appendChild(msg);
      var add = el("button", "text-[12px] font-semibold text-primary hover:underline");
      add.textContent = "Add metrics";
      add.addEventListener("click", openEditMetrics);
      empty.appendChild(add);
      body.appendChild(empty);
    } else {
      var grid = el("div", "metric-grid");
      METRIC_DEFS.forEach(function (def) {
        var tile = el("div", "metric-tile");
        html(tile, "span", "lbl", def.label);
        var val = fmtMetric(def, m[def.key]);
        var valEl = el("span", "val" + (val == null ? " empty" : ""));
        valEl.textContent = val == null ? "—" : val;
        tile.appendChild(valEl);
        grid.appendChild(tile);
      });
      body.appendChild(grid);
      if (ep.metrics_updated_at) {
        html(body, "p", "text-[10.5px] text-secondary/60 mt-2",
          "Updated " + formatUpdated(ep.metrics_updated_at));
      }
    }
    section.appendChild(body);
    content.appendChild(section);
  }

  // ============================================================
  // Per-episode: past episodes strip
  // ============================================================
  function renderPastEpisodesStrip(content) {
    var prior = (pastEps || []).filter(function (e) { return ep && e.slug !== ep.slug; });
    if (!prior.length) return;
    var section = el("section", "space-y-2");
    var head = el("div", "flex items-center gap-2 px-1");
    head.appendChild(icon("history", "text-secondary text-[18px]"));
    html(head, "h2", "text-[11px] font-bold tracking-widest text-secondary uppercase", "Past Episodes");
    section.appendChild(head);

    var strip = el("div", "past-strip");
    prior.forEach(function (e) {
      var card = document.createElement("a");
      card.className = "past-card";
      card.href = "?episode=" + encodeURIComponent(e.slug);
      var top = el("div", "flex items-center justify-between mb-2");
      html(top, "div", "text-[13px] font-bold text-on-surface truncate flex-1 min-w-0", e.guest_name);
      var d = e.premiere_at || e.airing_date || e.created_at;
      if (d) html(top, "span", "text-[10.5px] text-secondary/70 ml-2 whitespace-nowrap", shortDate(d));
      card.appendChild(top);

      var m = e.metrics || {};
      var hasAny = metricsHasAnyValue(m);
      if (hasAny) {
        var row = el("div", "flex justify-between gap-2");

          var def = METRIC_DEFS.find(function (x) { return x.key === key; });
          var cell = el("div", "flex flex-col min-w-0");
          html(cell, "span", "text-[9.5px] font-bold tracking-wider text-secondary uppercase truncate", def.label);
          var v = fmtMetric(def, m[key]);
          html(cell, "span", "text-[13px] font-semibold text-on-surface", v == null ? "—" : v);
          row.appendChild(cell);
        });
        card.appendChild(row);
      } else {
        html(card, "p", "text-[11.5px] text-secondary/70", "No metrics yet");
      }
      strip.appendChild(card);
    });
    section.appendChild(strip);
    content.appendChild(section);
  }

  // ============================================================
  // Edit metrics modal
  // ============================================================
  function openEditMetrics() {
    var root = document.getElementById("modal-root");
    root.innerHTML = "";
    var bd = el("div", "modal-bd");
    bd.addEventListener("click", function (e) { if (e.target === bd) closeModal(); });

    var form = document.createElement("form");
    form.className = "space-y-3";
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var payload = {};
      METRIC_DEFS.forEach(function (def) {
        var inp = form.querySelector('input[name="' + def.key + '"]');
        var raw = inp.value.trim();
        if (raw === "") return;
        var n = Number(raw);
        if (!isNaN(n)) payload[def.key] = n;
      });
      saveMetrics(payload);
    });

    var grid = el("div", "grid grid-cols-2 gap-3");
    var m = ep && ep.metrics ? ep.metrics : {};
    METRIC_DEFS.forEach(function (def) {
      var field = document.createElement("div");
      var lbl = el("label", null, def.label);
      lbl.setAttribute("for", "mf-" + def.key);
      field.appendChild(lbl);
      var inp = document.createElement("input");
      inp.id = "mf-" + def.key;
      inp.name = def.key;
      inp.type = "number";
      inp.step = (def.fmt === "pct" || def.fmt === "usd2") ? "0.01" : "any";
      inp.placeholder = "—";
      if (m[def.key] != null) inp.value = m[def.key];
      field.appendChild(inp);
      grid.appendChild(field);
    });
    form.appendChild(grid);

    var actions = el("div", "flex justify-end gap-2 mt-4");
    var cancel = el("button", "px-4 py-2 text-[12px] font-semibold text-secondary hover:text-on-surface transition-colors");
    cancel.type = "button"; cancel.textContent = "Cancel";

  function openSponsorsModal() {
    var root = document.getElementById("modal-root");

    var rowsWrap = el("div", "space-y-3");
    card.appendChild(rowsWrap);

    function addRow(prefill) {
      var row = el("div", "sponsor-input-row");
      var rm = el("button", "remove-row", "×");
      rm.type = "button";
      rm.title = "Remove this sponsor";
      rm.addEventListener("click", function () { row.remove(); });

      nameInp.type = "text"; nameInp.name = "name";
      nameInp.placeholder = "e.g., BetterHelp";

      nameWrap.appendChild(nameInp);
      row.appendChild(nameWrap);

      var notesWrap = el("div", "full");

      var notesTa = document.createElement("textarea");
      notesTa.name = "notes"; notesTa.rows = 2;
      notesTa.placeholder = "Optional — slot, timestamp, discount code, script anchor, etc.";
      if (prefill && prefill.notes) notesTa.value = prefill.notes;
      notesWrap.appendChild(notesTa);
      row.appendChild(notesWrap);

      rowsWrap.appendChild(row);
    }

    // Always start with at least one empty row
    addRow();

    var addBtn = el("button", "text-[12px] font-semibold text-primary hover:underline mt-2");
    addBtn.type = "button"; addBtn.textContent = "+ Add another sponsor";
    addBtn.addEventListener("click", function () { addRow(); });
    card.appendChild(addBtn);

    var err = el("p", "text-[12px] text-error mt-3"); err.style.display = "none";
    card.appendChild(err);

    var actions = el("div", "flex justify-end gap-2 mt-4");
    var cancel = el("button", "px-4 py-2 text-[12px] font-semibold text-secondary hover:text-on-surface transition-colors");
    cancel.type = "button"; cancel.textContent = "Cancel";
    cancel.addEventListener("click", closeModal);
    actions.appendChild(cancel);
    var save = el("button", "px-4 py-2 text-[12px] font-bold bg-primary text-on-primary rounded-lg hover:opacity-90 transition-opacity");
    save.type = "button"; save.textContent = "Save sponsors";
    save.addEventListener("click", function () {
      err.style.display = "none";
      var rows = Array.from(rowsWrap.querySelectorAll(".sponsor-input-row"));
      var entered = [];
      var seen = {};
      rows.forEach(function (r) {
        var name = r.querySelector('input[name="name"]').value.trim();
        if (!name) return;
        var key = name.toLowerCase();
        if (seen[key]) return;            // de-dup within this submission
        seen[key] = true;
        entered.push({
          name: name,
          notes: r.querySelector('textarea[name="notes"]').value.trim() || null
        });
      });
      if (!entered.length) {
        err.textContent = "Enter at least one sponsor name.";
        err.style.display = "block";
        return;
      }
      // Idempotent: skip any name already saved on this episode (case-insensitive).
      var existingNames = {};
      sponsors.forEach(function (s) { existingNames[(s.name || "").trim().toLowerCase()] = true; });
      var fresh = entered.filter(function (e) { return !existingNames[e.name.toLowerCase()]; });

      save.disabled = true; save.textContent = "Saving…";

      // Insert only the new sponsors. If everything entered already exists we still
      // reconcile verify-tasks below (self-heal) so nothing is silently missing.
      var insertProm = fresh.length
        ? sb.from("prs_sponsors").insert(fresh.map(function (e) {
            return { episode_id: ep.id, name: e.name, notes: e.notes, entered_by: "Josh", cut_into_show: false };
          }))
        : Promise.resolve({ error: null });

      insertProm.then(function (r) {
        if (r.error) {
          err.textContent = "Save failed: " + r.error.message;
          err.style.display = "block";
          save.disabled = false; save.textContent = "Save sponsors";
          return;
        }
        closeModal();
        // Reload sponsors → mark Input Sponsors done → create any missing per-sponsor
        // verify tasks in Jerry's group → reload items → render. Everything shows at once.
        loadSponsors()
          .then(function () { return autoCompleteInputSponsors(); })
          .then(function () { return syncSponsorVerifyTasks(); })
          .then(function () { return loadItems(); })
          .then(function () { render(); });
      });
    });
    actions.appendChild(save);
    card.appendChild(actions);

    bd.appendChild(card);
    root.appendChild(bd);
  }

  // Deterministic verify-task title for a sponsor — used both to create the task
  // and to detect (idempotently) whether it already exists.
  function sponsorVerifyTitle(name) {
    return 'Confirm "' + name + '" is added to the episode';
  }

  // Ensure every sponsor on this episode has exactly one verification task in the
  // Jerry-owned "Sponsor Verification" group. Idempotent: only inserts the tasks
  // that are missing, so re-saving or adding more sponsors never duplicates.
  function syncSponsorVerifyTasks() {
    if (!ep || !sponsors.length) return Promise.resolve();
    var existing = {};
    var maxSort = 0;
    items.forEach(function (it) {
      if (it.role_group === SPONSOR_VERIFY_GROUP) {
        existing[(it.title || "").trim().toLowerCase()] = true;
        if (typeof it.sort_order === "number" && it.sort_order > maxSort) maxSort = it.sort_order;
      }
    });
    var toInsert = [];
    sponsors.forEach(function (s) {
      var title = sponsorVerifyTitle(s.name);
      var key = title.trim().toLowerCase();
      if (existing[key]) return;
      existing[key] = true;             // guard against same-named sponsors in one pass
      maxSort += 1;
      toInsert.push({
        episode_id: ep.id,
        role_group: SPONSOR_VERIFY_GROUP,
        title: title,
        instructions_md: "Auto-created from the Sponsorship section. Confirm the sponsor **" +
          s.name + "** is actually placed in this episode." + (s.notes ? "\n\n" + s.notes : ""),
        sort_order: maxSort,
        done: false
      });
    });
    if (!toInsert.length) return Promise.resolve();
    return sb.from("prs_checklist_items").insert(toInsert).then(function (r) {
      if (r.error) console.error("verify-task insert failed:", r.error);
    });
  }

  // Auto-complete the "Input Sponsors" task once ≥1 sponsor is entered.
  function autoCompleteInputSponsors() {
    if (!sponsors.length) return Promise.resolve();
    var inp = items.find(function (it) {
      return it.role_group === "Sponsorship" && it.title === "Input Sponsors";
    });
    if (!inp || inp.done) return Promise.resolve();
    var nowIso = new Date().toISOString();
    inp.done = true; inp.done_at = nowIso;
    return sb.from("prs_checklist_items").update({ done: true, done_at: nowIso }).eq("id", inp.id).then(function (r) {
      if (r.error) console.error(r.error);
    });
  }
