<style>

  .app-header {
    padding-top: env(safe-area-inset-top);
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));

  // ============================================================
  // State + helpers
  // ============================================================
  var sb = null;
  var ep = null;
  var items = [];
  var sponsors = [];
  var pastEps = [];

  function el(tag, cls, text) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }
  function html(parent, tag, cls, text) {
    var e = el(tag, cls, text); parent.appendChild(e); return e;
  }
  function icon(name, cls) {
    var s = document.createElement("span");
    s.className = "material-symbols-outlined " + (cls || "");
    s.textContent = name; return s;
  }

  function fmtN(n) {
    if (n == null || isNaN(n)) return null;
    if (n >= 1000000) return (n / 1000000).toFixed(n >= 10000000 ? 0 : 1) + "M";
    if (n >= 10000)   return Math.round(n / 1000) + "k";
    return Number(n).toLocaleString();
  }
  function fmtPct(n) { return (n == null || isNaN(n)) ? null : Number(n).toFixed(1) + "%"; }
  function fmtDur(s) {
    if (s == null || isNaN(s)) return null;
    var m = Math.floor(s / 60), r = Math.floor(s % 60);
    return m + ":" + (r < 10 ? "0" + r : r);
  }
  function fmtHrs(h) { return (h == null || isNaN(h)) ? null : Math.round(Number(h)) + "h"; }
  function fmtUsd(n) { return (n == null || isNaN(n)) ? null : "$" + Math.round(Number(n)).toLocaleString(); }
  function fmtUsd2(n) { return (n == null || isNaN(n)) ? null : "$" + Number(n).toFixed(2); }
  function fmtMetric(def, value) {
    switch (def.fmt) {
      case "n":    return fmtN(value);
      case "pct":  return fmtPct(value);
      case "dur":  return fmtDur(value);
      case "hrs":  return fmtHrs(value);
      case "usd":  return fmtUsd(value);
      case "usd2": return fmtUsd2(value);
      default:     return value == null ? null : String(value);
    }
  }

  function formatUpdated(raw) {
    if (!raw) return "unknown";
    var d = new Date(raw);
    if (isNaN(d.getTime())) return raw;
    return d.toLocaleString(undefined, {
      month: "short", day: "numeric", hour: "numeric", minute: "2-digit"
    });
  }
  function shortDate(s) {
    if (!s) return "";
    var d = new Date(s);
    if (isNaN(d.getTime())) return s;
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }

  function metricsHasAnyValue(m) {
    if (!m || typeof m !== "object") return false;
    return METRIC_DEFS.some(function (def) {
      var v = m[def.key];
      return v != null && v !== "" && !(typeof v === "number" && isNaN(v));
    });
  }

  function statusOf(e) {
    var s = e && e.status ? String(e.status).toLowerCase() : "";
    if (s === "planned" || s === "upcoming") return "planned";
    if (s === "in-progress" || s === "in_progress" || s === "active") return "in-progress";
    return "shipped";
  }
  function isInProgress(e) { return statusOf(e) === "in-progress"; }
  function statusLabel(e) {
    switch (statusOf(e)) {
      case "planned": return "Planned";
      case "in-progress": return "In progress";
      default: return "Shipped";
    }
  }

  function slugify(s) {
    return String(s || "").toLowerCase().trim()
      .replace(/['"`’]/g, "")
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-+|-+$/g, "");
  }

  function showMessage(title, body) {

  function setProgress() {
    // Count both checklist items and sponsor "cut into show" rows.
    var totalItems = items.length;
    var doneItems = items.filter(function (it) { return it.done; }).length;
    var totalSp = sponsors.length;
    var doneSp = sponsors.filter(function (s) { return !!s.cut_into_show; }).length;
    var total = totalItems + totalSp;
    var done = doneItems + doneSp;
    var pct = total > 0 ? Math.round(done * 100 / total) : 0;
    var p = document.getElementById("progress");
    p.innerHTML = "";
    p.appendChild(el("span", "text-[12px] text-secondary", done + " / " + total));
    var bar = el("div", "w-32 h-1.5 bg-surface-container-high rounded-full overflow-hidden");
    var fill = el("div", "h-full bg-primary transition-all duration-300");
    fill.style.width = pct + "%";
    bar.appendChild(fill);
    p.appendChild(bar);
  }

  // Home view
  // ============================================================
  function renderHome(allEps) {
    var c = document.getElementById("content");
    c.innerHTML = "";

    // Top action bar with the "+ New episode" button.
    var topBar = el("div", "flex items-center justify-between");
    var topLeft = el("div", "flex items-center gap-2");
    topLeft.appendChild(icon("home", "text-primary text-[22px]"));
    html(topLeft, "h2", "text-[13px] font-bold tracking-widest text-primary uppercase", "Dashboard");
    topBar.appendChild(topLeft);
    var newBtn = el("button", "new-ep-btn");
    newBtn.appendChild(icon("add", "text-[16px]"));
    html(newBtn, "span", null, "New episode");
    newBtn.addEventListener("click", openNewEpisodeModal);
    topBar.appendChild(newBtn);
    c.appendChild(topBar);

    // Aggregate strip
    var total = allEps.length;
    var inProg = allEps.filter(isInProgress).length;
    var totalViews = 0, ctrSum = 0, ctrN = 0, avgVwSum = 0, avgVwN = 0;
    allEps.forEach(function (e) {
      var m = e.metrics || {};
      if (typeof m.views === "number" && !isNaN(m.views)) totalViews += m.views;
      if (typeof m.ctr_pct === "number" && !isNaN(m.ctr_pct)) { ctrSum += m.ctr_pct; ctrN++; }
      if (typeof m.avg_view_pct === "number" && !isNaN(m.avg_view_pct)) { avgVwSum += m.avg_view_pct; avgVwN++; }
    });
    var aggDefs = [
      { lbl: "Episodes",    val: total > 0 ? String(total) : null },
      { lbl: "In progress", val: inProg > 0 ? String(inProg) : null },
      { lbl: "Total views", val: totalViews > 0 ? fmtN(totalViews) : null },
      { lbl: "Avg CTR",     val: ctrN > 0 ? fmtPct(ctrSum / ctrN) : null },
      { lbl: "Avg view %",  val: avgVwN > 0 ? fmtPct(avgVwSum / avgVwN) : null }
    ];
    var agg = el("section", "agg-strip");
    aggDefs.forEach(function (a) {
      var tile = el("div", "agg-tile");
      html(tile, "span", "lbl", a.lbl);
      var v = el("span", "val" + (a.val == null ? " empty" : ""));
      v.textContent = a.val == null ? "—" : a.val;
      tile.appendChild(v);
      agg.appendChild(tile);
    });
    c.appendChild(agg);

    // Episodes section header
    var section = el("section", "space-y-3");
    var head = el("div", "flex items-center justify-between px-1");
    var headLeft = el("div", "flex items-center gap-2");
    headLeft.appendChild(icon("podcasts", "text-primary text-[20px]"));
    html(headLeft, "h2", "text-[12px] font-bold tracking-widest text-primary uppercase", "Episodes");
    head.appendChild(headLeft);
    html(head, "span", "text-[11px] text-secondary font-medium", total + " total");
    section.appendChild(head);

    if (!allEps.length) {
      var empty = el("div", "bg-surface-container rounded-xl border border-outline-variant p-6 text-center space-y-3");
      html(empty, "p", "text-[13px] text-on-surface-variant", "No episodes yet.");
      var emptyBtn = el("button", "new-ep-btn");
      emptyBtn.appendChild(icon("add", "text-[16px]"));
      html(emptyBtn, "span", null, "Create your first episode");
      emptyBtn.addEventListener("click", openNewEpisodeModal);
      empty.appendChild(emptyBtn);
      section.appendChild(empty);
      c.appendChild(section);
      return;
    }

    // Sort: in-progress first, then by airing_date asc (nulls last), then created_at desc.
    var sorted = allEps.slice().sort(function (a, b) {
      var aIp = isInProgress(a), bIp = isInProgress(b);
      if (aIp !== bIp) return aIp ? -1 : 1;
      var aAir = a.airing_date ? new Date(a.airing_date).getTime() : null;
      var bAir = b.airing_date ? new Date(b.airing_date).getTime() : null;
      if (aAir !== bAir) {
        if (aAir == null) return 1;
        if (bAir == null) return -1;
        return aAir - bAir;
      }
      var aCr = new Date(a.created_at || 0).getTime();
      var bCr = new Date(b.created_at || 0).getTime();
      return bCr - aCr;
    });

    var grid = el("div", "ep-grid");
    sorted.forEach(function (e) {
      var card = document.createElement("a");
      card.className = "ep-card";
      card.href = "?episode=" + encodeURIComponent(e.slug);

      var headRow = el("div", "head");
      var nameWrap = el("div", "min-w-0 flex-1");
      html(nameWrap, "div", "name truncate", e.guest_name || "Untitled");

      // Meta line: dates + transcript chip
      var meta = el("div", "meta");
      var hasShoot = !!e.shooting_date;
      var hasAir = !!e.airing_date;
      var hasCreated = !hasShoot && !hasAir && e.created_at;
      if (hasShoot) {
        var s = el("span"); s.textContent = "Shoot " + shortDate(e.shooting_date); meta.appendChild(s);
      }
      if (hasShoot && hasAir) html(meta, "span", "sep", "·");
      if (hasAir) {
        var ad = el("span"); ad.textContent = "Air " + shortDate(e.airing_date); meta.appendChild(ad);
      }
      if (hasCreated) {
        var cd = el("span"); cd.textContent = shortDate(e.created_at); meta.appendChild(cd);
      }
      if (hasShoot || hasAir || hasCreated) html(meta, "span", "sep", "·");
      var trChip = el("span", "pill " + (e.transcript_received ? "tr-ok" : "tr-pending"));
      trChip.textContent = e.transcript_received ? "Transcript ✓" : "Transcript pending";
      meta.appendChild(trChip);
      nameWrap.appendChild(meta);
      headRow.appendChild(nameWrap);

      var pill = el("span", "pill " + statusOf(e));
      pill.textContent = statusLabel(e);
      headRow.appendChild(pill);
      card.appendChild(headRow);

      var m = e.metrics || {};
      var mGrid = el("div", "metrics");
      HEADLINE_KEYS.forEach(function (key) {
        var def = METRIC_DEFS.find(function (x) { return x.key === key; });
        var cell = el("div");
        html(cell, "span", "ml truncate", def.label);
        var v = fmtMetric(def, m[key]);
        var mv = el("span", "mv" + (v == null ? " empty" : ""));
        mv.textContent = v == null ? "—" : v;
        cell.appendChild(mv);
        mGrid.appendChild(cell);
      });
      card.appendChild(mGrid);

      grid.appendChild(card);
    });
    section.appendChild(grid);
    c.appendChild(section);
  }

  // ============================================================
  // New-episode modal (home view)

  function openNewEpisodeModal() {
    var root = document.getElementById("modal-root");
    root.innerHTML = "";
    var bd = el("div", "modal-bd");
    bd.addEventListener("click", function (e) { if (e.target === bd) closeModal(); });
    var card = el("div", "modal-card");
    html(card, "h3", null, "New episode");

    var form = document.createElement("form");
    form.className = "ne-form";

    function field(labelText, name, type, required) {
      var wrap = document.createElement("div");
      var lbl = el("label", null, labelText + (required ? " *" : ""));
      lbl.setAttribute("for", "ne-" + name);
      wrap.appendChild(lbl);
      var inp = document.createElement("input");
      inp.id = "ne-" + name; inp.name = name; inp.type = type;
      if (required) inp.required = true;
      wrap.appendChild(inp);
      return wrap;
    }
    form.appendChild(field("Guest name", "guest", "text", true));
    var dates = el("div", "ne-dates");
    dates.appendChild(field("Shooting date", "shoot", "date", false));
    dates.appendChild(field("Airing date", "air", "date", false));
    form.appendChild(dates);

    var err = el("p", "text-[12px] text-error", "");
    err.style.display = "none";
    form.appendChild(err);

    var actions = el("div", "flex justify-end gap-2 mt-4");
    var cancel = el("button", "px-4 py-2 text-[12px] font-semibold text-secondary hover:text-on-surface transition-colors");
    cancel.type = "button"; cancel.textContent = "Cancel";
    cancel.addEventListener("click", closeModal);
    actions.appendChild(cancel);
    var save = el("button", "px-4 py-2 text-[12px] font-bold bg-primary text-on-primary rounded-lg hover:opacity-90 transition-opacity");
    save.type = "submit"; save.textContent = "Create episode";
    actions.appendChild(save);
    form.appendChild(actions);

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      err.style.display = "none";
      var guest = form.querySelector('input[name="guest"]').value.trim();
      var shoot = form.querySelector('input[name="shoot"]').value || null;
      var air = form.querySelector('input[name="air"]').value || null;
      if (!guest) {
        err.textContent = "Guest name is required.";
        err.style.display = "block";
        return;
      }
      save.disabled = true; save.textContent = "Creating…";
      createEpisode({ guest: guest, shooting_date: shoot, airing_date: air })
        .then(function (slug) {
          window.location.href = "?episode=" + encodeURIComponent(slug);
        })
        .catch(function (e) {
          err.textContent = "Could not create: " + (e && e.message ? e.message : String(e));
          err.style.display = "block";
          save.disabled = false; save.textContent = "Create episode";
        });
    });

    card.appendChild(form);
    bd.appendChild(card);
    root.appendChild(bd);
  }

  function createEpisode(payload) {
    var baseSlug = slugify(payload.guest);
    if (!baseSlug) return Promise.reject(new Error("Could not derive a slug from that guest name."));
    return ensureUniqueSlug(baseSlug).then(function (slug) {
      var row = {
        slug: slug,
        guest_name: payload.guest,
        status: "planned",
        shooting_date: payload.shooting_date || null,
        airing_date: payload.airing_date || null,
        transcript_received: false
      };
      return sb.from("prs_episodes").insert(row).select().single().then(function (r) {
        if (r.error) throw r.error;
        return seedDefaultChecklist(r.data.id).then(function () { return slug; });
      });
    });
  }
  function ensureUniqueSlug(base) {
    return sb.from("prs_episodes").select("slug").like("slug", base + "%").then(function (r) {
      if (r.error) throw r.error;
      var existing = (r.data || []).map(function (x) { return x.slug; });
      if (existing.indexOf(base) === -1) return base;
      var i = 2;
      while (existing.indexOf(base + "-" + i) !== -1) i++;
      return base + "-" + i;
    });
  }
  function seedDefaultChecklist(episodeId) {
    var rows = DEFAULT_TEMPLATE.map(function (t) {
      return {
        episode_id: episodeId,
        role_group: t.role_group,
        title: t.title,
        instructions_md: t.instructions_md,
        sort_order: t.sort_order,
        done: false
      };
    });
    return sb.from("prs_checklist_items").insert(rows).then(function (r) {
      if (r.error) throw r.error;
    });
  }

  // Edit metrics modal
  // ============================================================
  function openEditMetrics() {
    var root = document.getElementById("modal-root");
    root.innerHTML = "";
    var bd = el("div", "modal-bd");
    bd.addEventListener("click", function (e) { if (e.target === bd) closeModal(); });
    var card = el("div", "modal-card");
    html(card, "h3", null, "Edit Episode Metrics");

    var form = document.createElement("form");
    form.className = "space-y-3";
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var payload = {};
      METRIC_DEFS.forEach(function (def) {
        var inp = form.querySelector('input[name="' + def.key + '"]');
        var raw = inp.value.trim();
        if (raw === "") return;
        var n = Number(raw);
        if (!isNaN(n)) payload[def.key] = n;
      });
      saveMetrics(payload);
    });

    var grid = el("div", "grid grid-cols-2 gap-3");
    var m = ep && ep.metrics ? ep.metrics : {};
    METRIC_DEFS.forEach(function (def) {
      var field = document.createElement("div");
      var lbl = el("label", null, def.label);
      lbl.setAttribute("for", "mf-" + def.key);
      field.appendChild(lbl);
      var inp = document.createElement("input");
      inp.id = "mf-" + def.key;
      inp.name = def.key;
      inp.type = "number";
      inp.step = (def.fmt === "pct" || def.fmt === "usd2") ? "0.01" : "any";
      inp.placeholder = "—";
      if (m[def.key] != null) inp.value = m[def.key];
      field.appendChild(inp);
      grid.appendChild(field);
    });
    form.appendChild(grid);

    var actions = el("div", "flex justify-end gap-2 mt-4");
    var cancel = el("button", "px-4 py-2 text-[12px] font-semibold text-secondary hover:text-on-surface transition-colors");
    cancel.type = "button"; cancel.textContent = "Cancel";
    cancel.addEventListener("click", closeModal);
    actions.appendChild(cancel);
    var save = el("button", "px-4 py-2 text-[12px] font-bold bg-primary text-on-primary rounded-lg hover:opacity-90 transition-opacity");
    save.type = "submit"; save.textContent = "Save";
    actions.appendChild(save);
    form.appendChild(actions);

    card.appendChild(form);
    bd.appendChild(card);
    root.appendChild(bd);
  }
  function closeModal() {
    var root = document.getElementById("modal-root");
    root.innerHTML = "";
  }
  function saveMetrics(payload) {
    sb.from("prs_episodes").update({
      metrics: payload,
      metrics_updated_at: new Date().toISOString()
    }).eq("id", ep.id).select().single().then(function (r) {
      if (r.error) { alert("Save failed: " + r.error.message); return; }
      ep = r.data;
      closeModal();
      render();
      loadPastEpisodes();
    });
  }

  // ============================================================
  // Sponsor input modal
  // ============================================================
  function openSponsorsModal() {
    var root = document.getElementById("modal-root");
    root.innerHTML = "";
    var bd = el("div", "modal-bd");
    bd.addEventListener("click", function (e) { if (e.target === bd) closeModal(); });
    var card = el("div", "modal-card");
    html(card, "h3", null, "Add sponsors");

    html(card, "p", "text-[12px] text-secondary mb-3",
      "One row per sponsor placement. Each one becomes a \"Cut into show\" task for Jerry below.");

    var rowsWrap = el("div", "space-y-3");
    card.appendChild(rowsWrap);

    function addRow(prefill) {
      var row = el("div", "sponsor-input-row");
      var rm = el("button", "remove-row", "×");
      rm.type = "button";
      rm.title = "Remove this sponsor";
      rm.addEventListener("click", function () { row.remove(); });
      row.appendChild(rm);

      var nameWrap = el("div", "full");
      var nameLbl = el("label", null, "Sponsor name *"); nameWrap.appendChild(nameLbl);
      var nameInp = document.createElement("input");
      nameInp.type = "text"; nameInp.name = "name";
      nameInp.placeholder = "e.g., BetterHelp";
      if (prefill && prefill.name) nameInp.value = prefill.name;
      nameWrap.appendChild(nameInp);
      row.appendChild(nameWrap);

      var slotWrap = document.createElement("div");
      var slotLbl = el("label", null, "Slot"); slotWrap.appendChild(slotLbl);
      var slotInp = document.createElement("input");
      slotInp.type = "text"; slotInp.name = "slot";
      slotInp.setAttribute("list", "sponsor-slots");
      slotInp.placeholder = "mid-roll / organic / pre-roll";
      slotWrap.appendChild(slotInp);
      row.appendChild(slotWrap);

      var tsWrap = document.createElement("div");
      var tsLbl = el("label", null, "Timestamp"); tsWrap.appendChild(tsLbl);
      var tsInp = document.createElement("input");
      tsInp.type = "text"; tsInp.name = "ts";
      tsInp.placeholder = "e.g., ~29:03";
      tsWrap.appendChild(tsInp);
      row.appendChild(tsWrap);

      var notesWrap = el("div", "full");
      var notesLbl = el("label", null, "Notes"); notesWrap.appendChild(notesLbl);
      var notesTa = document.createElement("textarea");
      notesTa.name = "notes"; notesTa.rows = 2;
      notesTa.placeholder = "Optional — script anchor, discount code, etc.";
      notesWrap.appendChild(notesTa);
      row.appendChild(notesWrap);

      rowsWrap.appendChild(row);
    }

    // Datalist for slot suggestions (shared across rows)
    var dl = document.createElement("datalist");
    dl.id = "sponsor-slots";
    SPONSOR_SLOTS.forEach(function (s) {
      var o = document.createElement("option"); o.value = s; dl.appendChild(o);
    });
    card.appendChild(dl);

    // Always start with at least one empty row
    addRow();

    var addBtn = el("button", "text-[12px] font-semibold text-primary hover:underline mt-2");
    addBtn.type = "button"; addBtn.textContent = "+ Add another sponsor";
    addBtn.addEventListener("click", function () { addRow(); });
    card.appendChild(addBtn);

    var err = el("p", "text-[12px] text-error mt-3"); err.style.display = "none";
    card.appendChild(err);

    var actions = el("div", "flex justify-end gap-2 mt-4");
    var cancel = el("button", "px-4 py-2 text-[12px] font-semibold text-secondary hover:text-on-surface transition-colors");
    cancel.type = "button"; cancel.textContent = "Cancel";
    cancel.addEventListener("click", closeModal);
    actions.appendChild(cancel);
    var save = el("button", "px-4 py-2 text-[12px] font-bold bg-primary text-on-primary rounded-lg hover:opacity-90 transition-opacity");
    save.type = "button"; save.textContent = "Save sponsors";
    save.addEventListener("click", function () {
      err.style.display = "none";
      var rows = Array.from(rowsWrap.querySelectorAll(".sponsor-input-row"));
      var payload = [];
      rows.forEach(function (r) {
        var name = r.querySelector('input[name="name"]').value.trim();
        if (!name) return;
        payload.push({
          episode_id: ep.id,
          name: name,
          slot: r.querySelector('input[name="slot"]').value.trim() || null,
          timestamp: r.querySelector('input[name="ts"]').value.trim() || null,
          notes: r.querySelector('textarea[name="notes"]').value.trim() || null,
          entered_by: "Josh",
          cut_into_show: false
        });
      });
      if (!payload.length) {
        err.textContent = "Enter at least one sponsor name.";
        err.style.display = "block";
        return;
      }
      save.disabled = true; save.textContent = "Saving…";
      sb.from("prs_sponsors").insert(payload).then(function (r) {
        if (r.error) {
          err.textContent = "Save failed: " + r.error.message;
          err.style.display = "block";
          save.disabled = false; save.textContent = "Save sponsors";
          return;
        }
        closeModal();
        loadSponsors().then(function () { autoCompleteInputSponsors(); render(); });
      });
    });
    actions.appendChild(save);
    card.appendChild(actions);

    bd.appendChild(card);
    root.appendChild(bd);
  }

  // Auto-complete the "Input Sponsors" task once ≥1 sponsor is entered.
  function autoCompleteInputSponsors() {
    if (!sponsors.length) return;
    var inp = items.find(function (it) {
      return it.role_group === "Sponsorship" && it.title === "Input Sponsors";
    });
    if (!inp || inp.done) return;
    var nowIso = new Date().toISOString();
    inp.done = true; inp.done_at = nowIso;
    sb.from("prs_checklist_items").update({ done: true, done_at: nowIso }).eq("id", inp.id).then(function (r) {
      if (r.error) console.error(r.error);
    });
  }

  // ============================================================
  // Checklist render
  // ============================================================
  function renderItem(item) {
    var row = document.createElement("details");
    row.className = "border-t border-outline-variant/30";

    var summary = document.createElement("summary");
    summary.className = "flex items-center gap-3 px-4 py-3 hover:bg-surface-container-high transition-colors";

    var cbWrap = el("label", "flex-shrink-0 cursor-pointer flex items-center");
    cbWrap.addEventListener("click", function (e) { e.stopPropagation(); });
    var cb = document.createElement("input");
    cb.type = "checkbox";
    cb.className = "cb";
    cb.checked = !!item.done;
    cb.addEventListener("change", function () { toggleItem(item); });
    cbWrap.appendChild(cb);
    summary.appendChild(cbWrap);

    var titleEl = el("span",
      "flex-1 min-w-0 text-[14px] " + (item.done ? "text-secondary line-through" : "text-on-surface"),
      item.title);
    summary.appendChild(titleEl);

    summary.appendChild(icon("chevron_right", "chev text-outline text-[20px] flex-shrink-0"));
    row.appendChild(summary);

    if (item.instructions_md) {
      var detail = el("div", "px-4 pb-3 pl-12 text-[13px] text-on-surface-variant leading-relaxed whitespace-pre-wrap");
      detail.textContent = item.instructions_md;
      row.appendChild(detail);
    }
    // Special CTA: "Input Sponsors" item gets a button to open the modal.
    if (item.role_group === "Sponsorship" && item.title === "Input Sponsors") {
      var cta = el("div", "px-4 pb-3 pl-12");
      var btn = el("button", "cta-btn");
      btn.appendChild(icon("add", "text-[16px]"));
      html(btn, "span", null, sponsors.length ? "Add more sponsors" : "Open input form");
      btn.addEventListener("click", function (e) { e.stopPropagation(); openSponsorsModal(); });
      cta.appendChild(btn);
      row.appendChild(cta);
    }
    var actions = el("div", "px-4 pb-3 pl-12 flex gap-3 items-center");
    var del = el("button", "text-[11px] text-secondary hover:text-error transition-colors", "Delete");
    del.addEventListener("click", function (e) { e.stopPropagation(); deleteItem(item); });
    actions.appendChild(del);
    if (item.done_at) {
      var done = el("span", "text-[11px] text-secondary/60");
      try { done.textContent = "checked " + new Date(item.done_at).toLocaleString(undefined, { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }); } catch (e) {}
      actions.appendChild(done);
    }
    row.appendChild(actions);

    return row;
  }
  function renderSponsorRow(s) {
    var row = document.createElement("details");
    row.className = "sponsor-row";

    var cbWrap = el("label", "flex-shrink-0 cursor-pointer flex items-center pt-0.5");
    cbWrap.addEventListener("click", function (e) { e.stopPropagation(); });
    var cb = document.createElement("input");
    cb.type = "checkbox"; cb.className = "cb"; cb.checked = !!s.cut_into_show;
    cb.addEventListener("change", function () { toggleSponsorCut(s); });
    cbWrap.appendChild(cb);
    row.appendChild(cbWrap);

    var body = el("div", "body");
    var nameRow = el("div", "flex items-center gap-2 flex-wrap");
    var nameSpan = el("span", "name" + (s.cut_into_show ? " cut" : ""), s.name);
    nameRow.appendChild(nameSpan);
    var jerry = el("span", "row-owner-chip", "Jerry");
    nameRow.appendChild(jerry);
    body.appendChild(nameRow);

    // Subtitle: slot · timestamp · cut-into-show meta
    var sub = el("div", "sub");
    if (s.slot) {
      var sl = el("span"); sl.textContent = s.slot; sub.appendChild(sl);
    }
    if (s.timestamp) {
      if (s.slot) html(sub, "span", "sep", "·");
      var ts = el("span"); ts.textContent = s.timestamp; sub.appendChild(ts);
    }
    if (!s.cut_into_show) {
      if (s.slot || s.timestamp) html(sub, "span", "sep", "·");
      var status = el("span"); status.textContent = "Cut into show — not yet verified"; sub.appendChild(status);
    } else if (s.cut_at) {
      if (s.slot || s.timestamp) html(sub, "span", "sep", "·");
      var ok = el("span"); ok.textContent = "Verified in cut · " + shortDate(s.cut_at); sub.appendChild(ok);
    }
    body.appendChild(sub);

    if (s.notes) html(body, "div", "notes", s.notes);

    var act = el("div", "mt-2 flex items-center gap-3");
    var del = el("button", "del-btn", "Delete");
    del.addEventListener("click", function (e) { e.stopPropagation(); deleteSponsor(s); });
    act.appendChild(del);
    body.appendChild(act);

    row.appendChild(body);
    return row;
  }
  function renderGroup(group, groupItems) {
    var section = el("section", "bg-surface-container rounded-xl border border-outline-variant overflow-hidden");
    var head = el("div", "flex items-center justify-between px-4 py-3 border-b border-outline-variant/30");
    var left = el("div", "flex items-center gap-2.5 min-w-0");
    left.appendChild(icon(ROLE_ICONS[group] || "task_alt", "text-primary text-[20px] flex-shrink-0"));
    html(left, "h2", "text-[12px] font-bold tracking-widest text-primary uppercase whitespace-nowrap", group);
    var owner = OWNERS[group];
    if (owner) html(left, "span", "owner-chip", owner);
    head.appendChild(left);

    // Count items + sponsor rows (for Sponsorship) for the section progress.
    var doneCount = groupItems.filter(function (it) { return it.done; }).length;
    var totalCount = groupItems.length;
    if (group === "Sponsorship") {
      doneCount += sponsors.filter(function (s) { return !!s.cut_into_show; }).length;
      totalCount += sponsors.length;
    }
    html(head, "span", "text-[11px] text-secondary font-medium flex-shrink-0", doneCount + " / " + totalCount);
    section.appendChild(head);

    groupItems.forEach(function (it) { section.appendChild(renderItem(it)); });

    // Sponsor rows live inside the Sponsorship section, below the "Input Sponsors" task.
    if (group === "Sponsorship" && sponsors.length) {
      sponsors.forEach(function (s) { section.appendChild(renderSponsorRow(s)); });
    }

    var addBtn = el("button", "w-full px-4 py-3 text-left text-[12px] text-secondary hover:bg-surface-container-high hover:text-primary transition-colors flex items-center gap-2 border-t border-outline-variant/30");
    addBtn.appendChild(icon("add", "text-[18px]"));
    html(addBtn, "span", null, "Add an item");
    addBtn.addEventListener("click", function () { addItem(group); });
    section.appendChild(addBtn);

    return section;
  }

  // ============================================================
  // Per-episode render
  // ============================================================
  function render() {
    setHeaderForEpisode();
    setProgress();

    var c = document.getElementById("content");
    c.innerHTML = "";

    if (ep) renderMetricsCard(c);
    renderPastEpisodesStrip(c);

    var byGroup = {};
    items.forEach(function (it) {
      var g = it.role_group || "Other";
      if (!byGroup[g]) byGroup[g] = [];
      byGroup[g].push(it);
    });
    // Ensure Sponsorship section renders even if no checklist item exists (so sponsor rows show).
    if (sponsors.length && !byGroup["Sponsorship"]) byGroup["Sponsorship"] = [];

    var rendered = {};
    ROLE_GROUPS.forEach(function (g) {
      if (byGroup[g]) { c.appendChild(renderGroup(g, byGroup[g])); rendered[g] = true; }
    });
    Object.keys(byGroup).forEach(function (g) {
      if (!rendered[g]) c.appendChild(renderGroup(g, byGroup[g]));
    });

    if (!items.length && !sponsors.length) {
      var card = el("div", "bg-surface-container rounded-xl border border-outline-variant p-6 space-y-3");
      html(card, "h2", "text-[14px] font-bold text-primary uppercase tracking-widest", "No items yet");
      html(card, "p", "text-[13px] text-on-surface-variant", "This episode's checklist is empty.");
      c.appendChild(card);
    }
  }

  // ============================================================
  // Mutations
  // ============================================================
  function toggleItem(item) {
    var newDone = !item.done;
    var nowIso = new Date().toISOString();
    item.done = newDone;
    item.done_at = newDone ? nowIso : null;
    render();
    sb.from("prs_checklist_items").update({
      done: newDone,
      done_at: newDone ? nowIso : null
    }).eq("id", item.id).then(function (r) {
      if (r.error) { console.error(r.error); alert("Toggle failed: " + r.error.message); load(); }
    });
    // Special side effect: the "Send transcript to Jeremy" task drives the episode's transcript_received flag.
    if (item.role_group === "Transcript" && item.title === "Send transcript to Jeremy") {
      var patch = {
        transcript_received: newDone,
        transcript_received_at: newDone ? nowIso : null
      };
      sb.from("prs_episodes").update(patch).eq("id", ep.id).then(function (r) {
        if (r.error) console.error(r.error);
        else if (ep) { ep.transcript_received = newDone; ep.transcript_received_at = patch.transcript_received_at; }
      });
    }
  }
  function toggleSponsorCut(s) {
    var newCut = !s.cut_into_show;
    var nowIso = new Date().toISOString();
    s.cut_into_show = newCut;
    s.cut_at = newCut ? nowIso : null;
    render();
    sb.from("prs_sponsors").update({
      cut_into_show: newCut,
      cut_at: newCut ? nowIso : null
    }).eq("id", s.id).then(function (r) {
      if (r.error) { console.error(r.error); alert("Toggle failed: " + r.error.message); loadSponsors().then(render); }
    });
  }
  function deleteSponsor(s) {
    if (!confirm("Delete this sponsor?\n\n" + s.name)) return;
    sb.from("prs_sponsors").delete().eq("id", s.id).then(function (r) {
      if (r.error) alert("Delete failed: " + r.error.message);
      else loadSponsors().then(render);
    });
  }
  function addItem(group) {
    var title = prompt("New item for " + group + ":");
    if (!title || !title.trim()) return;
    var groupItems = items.filter(function (it) { return it.role_group === group; });
    var maxSort = groupItems.reduce(function (m, it) { return Math.max(m, it.sort_order || 0); }, 0);
    sb.from("prs_checklist_items").insert({
      episode_id: ep.id, role_group: group, title: title.trim(),
      sort_order: maxSort + 10, done: false
    }).then(function (r) { if (r.error) alert("Add failed: " + r.error.message); });
  }
  function deleteItem(item) {
    if (!confirm("Delete this item?\n\n" + item.title)) return;
    sb.from("prs_checklist_items").delete().eq("id", item.id).then(function (r) {
      if (r.error) alert("Delete failed: " + r.error.message);
    });
  }

  // ============================================================
  // Load + realtime
  // ============================================================
  function loadItems() {
    return sb.from("prs_checklist_items")
      .select("*").eq("episode_id", ep.id).order("sort_order", { ascending: true })
      .then(function (r) {
        if (r.error) { console.error(r.error); showMessage("Error", r.error.message); return; }
        items = r.data || [];
      });
  }
  function loadSponsors() {
    return sb.from("prs_sponsors")
      .select("*").eq("episode_id", ep.id).order("entered_at", { ascending: true })
      .then(function (r) {
        if (r.error) { console.error(r.error); sponsors = []; return; }
        sponsors = r.data || [];
      });
  }
  function loadPastEpisodes() {
    return sb.from("prs_episodes")
      .select("*")
      .order("premiere_at", { ascending: false, nullsFirst: false })
      .limit(8)
      .then(function (r) {
        if (r.error) { console.error(r.error); pastEps = []; return; }
        pastEps = r.data || [];
      });
  }
  function loadAllEpisodes() {
    return sb.from("prs_episodes")
      .select("*")
      .order("created_at", { ascending: false, nullsFirst: false })
      .then(function (r) {
        if (r.error) {
          console.error("loadAllEpisodes error:", r.error);
          return { error: r.error, data: [] };
        }
        return { error: null, data: r.data || [] };
      });
  }
  function subscribeRealtime() {
    sb.channel("prs-items-" + ep.id)
      .on("postgres_changes",
          { event: "*", schema: "public", table: "prs_checklist_items", filter: "episode_id=eq." + ep.id },
          function () { loadItems().then(render); })
      .subscribe();
    sb.channel("prs-ep-" + ep.id)
      .on("postgres_changes",
          { event: "UPDATE", schema: "public", table: "prs_episodes", filter: "id=eq." + ep.id },
          function (payload) { if (payload && payload.new) { ep = payload.new; render(); } })
      .subscribe();
    sb.channel("prs-sp-" + ep.id)
      .on("postgres_changes",
          { event: "*", schema: "public", table: "prs_sponsors", filter: "episode_id=eq." + ep.id },
          function () { loadSponsors().then(render); })
      .subscribe();
  }

  // ============================================================
  // Init
  // ============================================================
  function init() {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    var params = new URLSearchParams(window.location.search);
    var slug = params.get("episode");

    if (!slug) {
      // HOME VIEW
      setHeaderForHome();
      var c = document.getElementById("content");
      c.innerHTML = "";
      html(c, "div", "text-[13px] text-secondary/70 px-1", "Loading episodes…");
      loadAllEpisodes().then(function (result) {
        if (result.error) {
          showMessage("Could not load episodes", result.error.message + " — if you just added new schema columns, run the migration in Supabase first.");
          return;
        }
        renderHome(result.data);
      });
      return;
    }

    // PER-EPISODE VIEW
    sb.from("prs_episodes").select("*").eq("slug", slug).single().then(function (r) {
      if (r.error || !r.data) {
        document.getElementById("back-btn").classList.remove("hidden");
        document.getElementById("ep-line").textContent = "Episode not found";
        showMessage("Episode not found",
          "We couldn't find that episode. Head back to the dashboard to pick one.");
        return;
      }
      ep = r.data;
      Promise.all([loadItems(), loadSponsors(), loadPastEpisodes()]).then(function () {
        // If there are sponsors but the Input Sponsors task is still pending, fix it.
        autoCompleteInputSponsors();
        render();
        subscribeRealtime();
      });
    });
  }

  init();
})();
</script>
</body>
