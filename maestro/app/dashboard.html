<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0d" />
    <title>Maestro — your dashboard</title>
    <meta name="description" content="Your Maestro command center — your day, your projects, your tasks. Yours alone." />
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Dashboard-specific layout (brand tokens come from styles.css). */
      body { align-items: flex-start; }
      .dash { width: 100%; max-width: 860px; }
      .dash-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
      .dash-top .right { display: flex; align-items: center; gap: 12px; }
      .sync-state { font-size: 12px; color: var(--muted); white-space: nowrap; }
      .grid { display: grid; gap: 16px; grid-template-columns: 1fr 1fr; }
      @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
      .panel { background: linear-gradient(180deg, var(--panel) 0%, var(--bg-2) 100%); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 18px 16px; }
      .panel.span2 { grid-column: 1 / -1; }
      .panel h3 { margin: 0 0 12px; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
      .brief { font-size: 16px; line-height: 1.5; color: var(--text); }
      .pulse { display: flex; gap: 22px; }
      .pulse .stat { display: flex; flex-direction: column; gap: 2px; }
      .pulse .n { font-size: 26px; font-weight: 700; color: var(--gold); line-height: 1; }
      .pulse .l { font-size: 12px; color: var(--muted); }
      ul.list { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
      ul.list li { padding: 11px 13px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel-2); }
      .ev { display: flex; gap: 12px; align-items: baseline; }
      .ev .when { flex: 0 0 92px; color: var(--gold); font-size: 12.5px; font-variant-numeric: tabular-nums; }
      .ev .what { flex: 1; min-width: 0; }
      .ev .what .t { font-size: 14px; }
      .ev .what .c { font-size: 12px; color: var(--muted); margin-top: 2px; }
      .empty { color: var(--muted); font-size: 13.5px; line-height: 1.5; }
      .empty .btn { max-width: 240px; }
      .day-head { font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); margin: 14px 0 8px; }
      .day-head:first-child { margin-top: 0; }
      #gate { color: var(--muted); text-align: center; padding: 60px 0; }
    </style>
  </head>
  <body>
    <!-- Until auth resolves, show nothing sensitive. -->
    <div id="gate" class="dash">Loading your dashboard…</div>

    <main id="dash" class="dash hidden">
      <div class="dash-top">
        <div class="wordmark">Maestro<span class="dot">.</span></div>
        <div class="right">
          <span class="sync-state" id="sync-state"></span>
          <button class="btn sm ghost" id="sync-now">Sync now</button>
          <a id="signout" class="back-link" style="margin: 0; cursor: pointer">Sign out</a>
        </div>
      </div>

      <h1 style="margin-top: 0" id="hello">Your command center</h1>
      <p class="tagline" id="acct" style="margin-top: 4px"></p>

      <div class="grid">
        <div class="panel span2">
          <h3>This morning</h3>
          <div class="brief" id="brief">—</div>
        </div>

        <div class="panel">
          <h3>Pulse</h3>
          <div class="pulse" id="pulse">
            <div class="stat"><span class="n" id="p-needs">0</span><span class="l">Needs you</span></div>
            <div class="stat"><span class="n" id="p-motion">0</span><span class="l">In motion</span></div>
            <div class="stat"><span class="n" id="p-shipped">0</span><span class="l">Shipped</span></div>
          </div>
        </div>

        <div class="panel">
          <h3>Pipeline</h3>
          <ul class="list" id="pipeline"></ul>
          <div class="empty hidden" id="pipeline-empty">Nothing in the pipeline yet.</div>
        </div>

        <div class="panel span2">
          <h3>Calendar — next 14 days <span id="cal-live" class="sync-state"></span></h3>
          <div id="calendar"></div>
          <div class="empty hidden" id="cal-empty"></div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
