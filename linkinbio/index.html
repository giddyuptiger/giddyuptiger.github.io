<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#b07d3a">
<title>Jeremy Irons</title>
<meta name="description" content="Jeremy Irons — indie builder. Mindful apps and thoughtful websites.">
<meta property="og:title" content="Jeremy Irons">
<meta property="og:description" content="Indie builder. Mindful apps and thoughtful websites.">
<meta property="og:type" content="website">
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #2a2620;
    background: #efe9dd;
    background:
      radial-gradient(1100px 520px at 50% -8%, #fbf7ef 0%, rgba(251,247,239,0) 70%),
      linear-gradient(176deg, #f4eee2 0%, #ece4d4 52%, #e3d9c6 100%);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    min-height: 100%;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 52px 22px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .avatar {
    width: 96px; height: 96px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 33px; font-weight: 700; letter-spacing: 0.02em;
    color: #fffdf8;
    background: linear-gradient(150deg, #c8924a 0%, #b07d3a 48%, #8f6228 100%);
    box-shadow: 0 10px 26px rgba(120,84,30,0.32), inset 0 1px 1px rgba(255,255,255,0.35);
    border: 3px solid rgba(255,255,255,0.7);
  }

  h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; margin-top: 16px; }
  .tagline {
    font-size: 13.5px; color: #8a8175; margin-top: 5px;
    text-align: center; max-width: 300px; line-height: 1.55;
  }

  .links { width: 100%; margin-top: 26px; display: flex; flex-direction: column; gap: 12px; }

  .link {
    display: flex; align-items: center; gap: 13px;
    background: #fffdf9;
    border: 1px solid #e6e0d4;
    border-radius: 15px;
    padding: 15px 15px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    box-shadow: 0 2px 5px rgba(60,48,24,0.05);
    transition: transform 0.13s ease, box-shadow 0.13s ease, border-color 0.13s ease;
    opacity: 0;
    transform: translateY(10px);
    animation: rise 0.5s ease forwards;
  }
  .link:active { transform: scale(0.985); }
  @media (hover: hover) {
    .link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(60,48,24,0.1);
      border-color: #d8ad6f;
    }
  }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  .ic {
    flex: 0 0 auto;
    width: 42px; height: 42px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    background: #f4ecdc;
  }
  .meta { flex: 1; min-width: 0; }
  .t { font-size: 15px; font-weight: 650; font-weight: 600; }
  .s { font-size: 12.5px; color: #948a7b; margin-top: 1px; }
  .chev { flex: 0 0 auto; color: #c4bba8; font-size: 17px; }

  footer {
    margin-top: 30px;
    font-size: 11.5px; color: #a89f8d; text-align: center; line-height: 1.7;
  }
  footer a { color: #b07d3a; text-decoration: none; }

  /* ── Chooser modal (apps available both on web and the App Store) ── */
  .sheet-overlay {
    position: fixed; inset: 0; z-index: 50;
    display: none;
    align-items: flex-end; justify-content: center;
    background: rgba(44, 38, 28, 0.46);
    -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
    opacity: 0; transition: opacity 0.2s ease;
    padding: 0 14px calc(18px + env(safe-area-inset-bottom));
  }
  .sheet-overlay.open { display: flex; opacity: 1; }
  @media (min-width: 520px) { .sheet-overlay { align-items: center; } }

  .sheet {
    width: 100%; max-width: 420px;
    background: #fffdf9;
    border: 1px solid #e6e0d4;
    border-radius: 20px;
    padding: 20px 18px 18px;
    box-shadow: 0 18px 50px rgba(60,48,24,0.28);
    transform: translateY(16px);
    transition: transform 0.22s cubic-bezier(0.2,0.8,0.2,1);
  }
  .sheet-overlay.open .sheet { transform: translateY(0); }

  .sheet-head { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .sheet-head .ic { width: 44px; height: 44px; font-size: 22px; }
  .sheet-title { font-size: 17px; font-weight: 700; }
  .sheet-sub { font-size: 12.5px; color: #948a7b; margin-top: 1px; }
  .sheet-q { font-size: 13px; color: #8a8175; margin: 14px 2px 12px; }

  .opt {
    display: flex; align-items: center; gap: 12px;
    width: 100%;
    background: #f8f1e3;
    border: 1px solid #e6dcc7;
    border-radius: 13px;
    padding: 13px 14px;
    text-decoration: none; color: inherit;
    font: inherit; cursor: pointer; text-align: left;
    margin-bottom: 10px;
    transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
  }
  .opt:active { transform: scale(0.985); }
  @media (hover: hover) { .opt:hover { border-color: #d8ad6f; background: #f5ecd9; } }
  .opt .opt-ic { flex: 0 0 auto; width: 30px; text-align: center; font-size: 20px; }
  .opt .opt-tx { flex: 1; }
  .opt .opt-t { font-size: 14.5px; font-weight: 600; }
  .opt .opt-s { font-size: 12px; color: #948a7b; margin-top: 1px; }
  .opt .chev { color: #c4bba8; font-size: 16px; }

  /* App Store option: shows the official badge instead of text */
  .opt-appstore { background: #111; border-color: #111; justify-content: center; padding: 12px 14px; }
  @media (hover: hover) { .opt-appstore:hover { background: #000; border-color: #000; } }
  .opt-appstore svg { display: block; height: 44px; width: auto; }

  .sheet-cancel {
    width: 100%; margin-top: 4px;
    background: transparent; border: none;
    color: #8a8175; font: inherit; font-size: 13.5px; font-weight: 600;
    padding: 11px; cursor: pointer; border-radius: 11px;
  }
  @media (hover: hover) { .sheet-cancel:hover { background: #f4ecdc; } }
</style>
</head>
<body>
<div class="wrap">

  <div class="avatar" id="avatar">JI</div>
  <h1 id="name">Jeremy Irons</h1>
  <div class="tagline" id="tagline">Indie builder. Mindful apps and thoughtful websites.</div>

  <div class="links" id="links"></div>

  <footer>&copy; <span id="yr"></span> Jeremy Irons</footer>

</div>

<!-- Chooser modal: built once, reused for any entry that has both web + App Store -->
<div class="sheet-overlay" id="chooser" aria-hidden="true" role="dialog" aria-modal="true">
  <div class="sheet" role="document">
    <div class="sheet-head">
      <div class="ic" id="ch-ic">🌱</div>
      <div>
        <div class="sheet-title" id="ch-title">App</div>
        <div class="sheet-sub" id="ch-sub"></div>
      </div>
    </div>
    <div class="sheet-q">How would you like to open this?</div>

    <a class="opt" id="ch-web" href="#" target="_blank" rel="noopener">
      <span class="opt-ic">🌐</span>
      <span class="opt-tx">
        <span class="opt-t">Open web app</span>
        <span class="opt-s">Runs in your browser — nothing to install</span>
      </span>
      <span class="chev">›</span>
    </a>

    <a class="opt opt-appstore" id="ch-ios" href="#" target="_blank" rel="noopener" aria-label="Download on the App Store">
      <!-- Official-style Apple "Download on the App Store" badge -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" role="img" aria-label="Download on the App Store">
        <rect width="120" height="40" rx="6.5" fill="#000"/>
        <rect x="0.5" y="0.5" width="119" height="39" rx="6" fill="none" stroke="#A6A6A6" stroke-opacity="0.5" stroke-width="0.6"/>
        <path fill="#fff" d="M24.77 20.3c-.02-2.05 1.68-3.04 1.76-3.09-.96-1.4-2.45-1.6-2.64-1.62-1.12-.11-2.19.66-2.76.66-.57 0-1.45-.64-2.39-.62-1.23.02-2.36.71-2.99 1.81-1.27 2.21-.33 5.48.91 7.27.61.88 1.34 1.86 2.29 1.82.92-.04 1.27-.59 2.38-.59 1.1 0 1.42.59 2.39.57.99-.02 1.61-.89 2.21-1.77.7-1.01.98-2 .99-2.05-.02-.01-1.9-.73-1.92-2.89zM22.95 14.4c.5-.61.84-1.45.75-2.29-.72.03-1.6.48-2.12 1.08-.46.53-.87 1.39-.76 2.21.8.06 1.62-.41 2.13-1z"/>
        <text x="34" y="15.5" fill="#fff" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="6.5" letter-spacing="0.4">Download on the</text>
        <text x="33" y="30" fill="#fff" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14.5" font-weight="600" letter-spacing="-0.4">App Store</text>
      </svg>
    </a>

    <button class="sheet-cancel" id="ch-cancel" type="button">Cancel</button>
  </div>
</div>

<script>
/* =======================================================================
   EDIT YOUR LINKS HERE.
   Each entry: { icon, title, subtitle, url, appStore? }
     icon     — any emoji
     url      — the web destination (required)
     appStore — OPTIONAL App Store URL. If present alongside `url`, clicking
                the card opens a small chooser ("Open web app" vs the App
                Store badge) instead of navigating straight to the web app.
   Order top-to-bottom is the order shown.
   ======================================================================= */
var LINKS = [
  {
    icon: "🌱",
    title: "GRDN",
    subtitle: "Mindful productivity & focus app",
    url: "https://grdnapp.com",
    appStore: "https://apps.apple.com/us/app/grdn-mindful-productivity/id6748244016"
  },
  {
    icon: "💞",
    title: "HD Love",
    subtitle: "Human Design relationship insight — web app",
    url: "https://giddyuptiger.github.io/HD-LOVE/app/"
    // iOS app not yet live. When it ships, add its App Store URL here to
    // turn this row into the same web / App Store chooser used by GRDN:
    // appStore: "https://apps.apple.com/us/app/.../idXXXXXXXXX"
  },
  {
    icon: "🎨",
    title: "irons | design",
    subtitle: "Design + engineering studio, Los Angeles",
    url: "https://irons.design"
  },
  {
    icon: "🌿",
    title: "irons | holistic",
    subtitle: "Holistic lifestyle & postural therapy",
    url: "https://irons.be"
  }
];

/* Optional: set a profile photo URL here to replace the "JI" initials. */
var PHOTO_URL = "";

(function () {
  document.getElementById("yr").textContent = new Date().getFullYear();

  if (PHOTO_URL) {
    var a = document.getElementById("avatar");
    a.textContent = "";
    a.style.background = "#fffdf9 url('" + PHOTO_URL + "') center/cover no-repeat";
  }

  /* ---- chooser modal wiring ---- */
  var overlay = document.getElementById("chooser");
  var chIc = document.getElementById("ch-ic");
  var chTitle = document.getElementById("ch-title");
  var chSub = document.getElementById("ch-sub");
  var chWeb = document.getElementById("ch-web");
  var chIos = document.getElementById("ch-ios");

  function openChooser(l) {
    chIc.textContent = l.icon || "🔗";
    chTitle.textContent = l.title;
    chSub.textContent = l.subtitle || "";
    chWeb.href = l.url;
    chIos.href = l.appStore;
    overlay.classList.add("open");
    overlay.setAttribute("aria-hidden", "false");
  }
  function closeChooser() {
    overlay.classList.remove("open");
    overlay.setAttribute("aria-hidden", "true");
  }
  overlay.addEventListener("click", function (e) {
    if (e.target === overlay) closeChooser();
  });
  document.getElementById("ch-cancel").addEventListener("click", closeChooser);
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") closeChooser();
  });
  /* close the sheet after the user picks an option */
  chWeb.addEventListener("click", closeChooser);
  chIos.addEventListener("click", closeChooser);

  var box = document.getElementById("links");
  LINKS.forEach(function (l, i) {
    var hasChooser = !!(l.url && l.appStore);

    var a = document.createElement(hasChooser ? "div" : "a");
    a.className = "link";
    if (hasChooser) {
      a.setAttribute("role", "button");
      a.setAttribute("tabindex", "0");
      a.addEventListener("click", function () { openChooser(l); });
      a.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openChooser(l); }
      });
    } else {
      a.href = l.url;
      a.target = "_blank";
      a.rel = "noopener";
    }
    a.style.animationDelay = (0.06 * i + 0.05) + "s";

    var ic = document.createElement("div");
    ic.className = "ic";
    ic.textContent = l.icon || "🔗";

    var meta = document.createElement("div");
    meta.className = "meta";
    var t = document.createElement("div");
    t.className = "t";
    t.textContent = l.title;
    meta.appendChild(t);
    if (l.subtitle) {
      var s = document.createElement("div");
      s.className = "s";
      s.textContent = l.subtitle;
      meta.appendChild(s);
    }

    var chev = document.createElement("div");
    chev.className = "chev";
    chev.textContent = hasChooser ? "⋯" : "›";

    a.appendChild(ic);
    a.appendChild(meta);
    a.appendChild(chev);
    box.appendChild(a);
  });
})();
</script>
</body>
</html>
